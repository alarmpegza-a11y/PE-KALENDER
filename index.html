                                        onClick={() => { if(isPasteTarget) pasteCopyToDay(dayStr); }}
                                        style={{ cursor:isPasteTarget?'copy':'default' }}>
                                        {dayEnt.length===0 && (
                                            <div style={{ height:40, display:'flex', alignItems:'center', justifyContent:'center' }}>
                                                {isPasteTarget
                                                    ? <span style={{ fontSize:9, color:'#f59e0b', fontWeight:900 }}>+ Hier einfügen</span>
                                                    : <span style={{ fontSize:9, color:'#cbd5e1', fontStyle:'italic' }}>—</span>
                                                }
                                            </div>
                                        )}
                                        {dayEnt.map((e) => {
                                            const ci = colorIndex[e.id] || 0;
                                            const pos = getMultiDayPosition(e, dayStr);
                                            const isStart = pos === 'start' || pos === 'single';
                                            const totalDays = e.isMultiDay && e.endDate ? daysBetween(e.deliveryDate.substring(0,10), e.endDate.substring(0,10)) : 1;
                                            const canMark = canMarkDoneForDay(e, dayStr);

                                            return (
                                                <CalCardContent
                                                    key={`${e.id}-${dayStr}`}
                                                    e={e}
                                                    dayStr={dayStr}
                                                    ci={ci}
                                                    isStart={isStart}
                                                    totalDays={totalDays}
                                                    pos={pos}
                                                    isAdminAccess={isAdminAccess}
                                                    toggleDone={toggleDone}
                                                    setCopyEntry={setCopyEntry}
                                                    deleteCalEntry={deleteCalEntry}
                                                    setEditCalEntry={setEditCalEntry}
                                                    canMarkDone={canMark}
                                                />
                                            );
                                        })}
                                        {isPasteTarget && dayEnt.length>0 && (
                                            <div style={{ margin:'4px 0', padding:'6px', background:'rgba(245,158,11,0.15)', border:'1px dashed #f59e0b', borderRadius:4, textAlign:'center', fontSize:9, color:'#f59e0b', fontWeight:900 }}>+ Hier einfügen</div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>

                {/* EDIT / NEU MODAL (Admin only) */}
                {editCalEntry && isAdminAccess && (
                    <div style={{ position:'fixed', inset:0, zIndex:50, background:'rgba(15,23,42,0.96)', display:'flex', alignItems:'center', justifyContent:'center', padding:16, overflowY:'auto' }}>
                        <div style={{ width:'100%', maxWidth:420, background:'rgba(51,65,85,0.98)', backdropFilter:'blur(12px)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:24, padding:24, display:'flex', flexDirection:'column', gap:12 }}>
                            <h3 style={{ color:'#fff', fontSize:11, fontWeight:900, textTransform:'uppercase', fontStyle:'italic', margin:0 }}>
                                {editCalEntry.isNew ? 'Neuer Eintrag' : 'Auftrag bearbeiten'}
                            </h3>
                            {!editCalEntry.isNew && (
                                <button onClick={() => triggerEntryPDF(editCalEntry)} style={{ alignSelf:'flex-start', background:'#3b82f6', border:'none', borderRadius:8, padding:'6px 12px', color:'#fff', fontSize:9, fontWeight:900, textTransform:'uppercase', cursor:'pointer', display:'flex', alignItems:'center', gap:6 }}>
                                    <Icon name="download" size={12}/>PDF exportieren
                                </button>
                            )}
                            <div style={{ display:'flex', gap:6 }}>
                                {[['montage','🔧 Montage','#2563eb'],['beplankung','🏗 Beplankung','#059669'],['ausflocken','❄️ Ausflocken','#b45309']].map(([ct,label,color]) => (
                                    <button key={ct} onClick={() => setEditCalEntry({...editCalEntry, calType:ct})}
                                        style={{ flex:1, padding:'8px 4px', borderRadius:8, border:'none', fontSize:8, fontWeight:900, textTransform:'uppercase', cursor:'pointer',
                                            background: editCalEntry.calType===ct ? color : '#1e293b',
                                            color: editCalEntry.calType===ct ? '#fff' : '#64748b' }}>
                                        {label}
                                    </button>
                                ))}
                            </div>
                            <input style={{ width:'100%', padding:'10px 12px', borderRadius:10, background:'#0f172a', border:'2px solid #3b82f6', color:'#60a5fa', fontSize:12, fontWeight:900, textTransform:'uppercase', letterSpacing:1, boxSizing:'border-box' }}
                                placeholder="Typ (z.B. LIEFERUNG)" value={editCalEntry.entryType||'LIEFERUNG'}
                                onChange={e => setEditCalEntry({...editCalEntry, entryType:e.target.value.toUpperCase()})}/>
                            <input style={{ width:'100%', padding:'10px 12px', borderRadius:10, background:'#1e293b', border:'1px solid rgba(255,255,255,0.1)', color:'#fff', fontSize:11, boxSizing:'border-box' }}
                                placeholder="Kunde *" value={editCalEntry.customer}
                                onChange={e => setEditCalEntry({...editCalEntry, customer:e.target.value})}/>
                            <input style={{ width:'100%', padding:'10px 12px', borderRadius:10, background:'#1e293b', border:'1px solid rgba(255,255,255,0.1)', color:'#fff', fontSize:11, boxSizing:'border-box' }}
                                placeholder="Adresse" value={editCalEntry.address}
                                onChange={e => setEditCalEntry({...editCalEntry, address:e.target.value})}/>
                            {/* MEMO — highlighted in edit modal too */}
                            <div style={{ position:'relative' }}>
                                <input style={{ width:'100%', padding:'10px 12px', paddingLeft:'36px', borderRadius:10, background:'#0f172a', border:'2px solid #f59e0b', color:'#fde68a', fontSize:12, fontWeight:800, boxSizing:'border-box' }}
                                    placeholder="📝 Memo / Hausinfo" value={editCalEntry.memo}
                                    onChange={e => setEditCalEntry({...editCalEntry, memo:e.target.value})}/>
                                <span style={{ position:'absolute', left:12, top:'50%', transform:'translateY(-50%)', fontSize:14 }}>📝</span>
                                <div style={{ color:'#f59e0b', fontSize:8, fontWeight:900, textTransform:'uppercase', letterSpacing:1, marginTop:3 }}>⚠ Memo erscheint gross im Kalender</div>
                            </div>
                            <input style={{ width:'100%', padding:'10px 12px', borderRadius:10, background:'#1e293b', border:'1px solid rgba(255,255,255,0.1)', color:'#fff', fontSize:11, boxSizing:'border-box' }}
                                placeholder="Auftragsnr." value={editCalEntry.auftragsNr}
                                onChange={e => setEditCalEntry({...editCalEntry, auftragsNr:e.target.value})}/>
                            <div style={{ display:'grid', gridTemplateColumns:'1fr', gap:8 }}>
                                <input type="number" style={{ padding:'10px 12px', borderRadius:10, background:'#1e293b', border:'1px solid rgba(255,255,255,0.1)', color:'#fff', fontSize:11, boxSizing:'border-box' }}
                                    placeholder="ELE" value={editCalEntry.target||''} onChange={e => setEditCalEntry({...editCalEntry, target:e.target.value})}/>
                            </div>
                            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
                                <div>
                                    <div style={{ color:'#64748b', fontSize:8, fontWeight:900, textTransform:'uppercase', marginBottom:4 }}>Start-Datum</div>
                                    <input type="date" style={{ width:'100%', padding:'10px 12px', borderRadius:10, background:'#1e293b', border:'1px solid rgba(255,255,255,0.1)', color:'#fff', fontSize:11, boxSizing:'border-box' }}
                                        value={editCalEntry.deliveryDate?.substring(0,10)||''}
                                        onChange={e => setEditCalEntry({...editCalEntry, deliveryDate:e.target.value})}/>
                                </div>
                                <div>
                                    <div style={{ color:'#f59e0b', fontSize:8, fontWeight:900, textTransform:'uppercase', marginBottom:4 }}>End-Datum (optional)</div>
                                    <input type="date" style={{ width:'100%', padding:'10px 12px', borderRadius:10, background:'#1e293b', border:'1px solid rgba(245,158,11,0.3)', color:'#fff', fontSize:11, boxSizing:'border-box' }}
                                        value={editCalEntry.endDate?.substring(0,10)||''}
                                        min={editCalEntry.deliveryDate?.substring(0,10)||''}
                                        onChange={e => setEditCalEntry({...editCalEntry, endDate:e.target.value})}/>
                                </div>
                            </div>
                            {editCalEntry.endDate && editCalEntry.endDate > editCalEntry.deliveryDate && (
                                <div style={{ background:'rgba(245,158,11,0.1)', border:'1px solid rgba(245,158,11,0.3)', borderRadius:8, padding:'8px 12px', fontSize:9, color:'#f59e0b', fontWeight:700 }}>
                                    📅 Mehrtägiger Auftrag: {formatDate(editCalEntry.deliveryDate)} – {formatDate(editCalEntry.endDate)} ({daysBetween(editCalEntry.deliveryDate, editCalEntry.endDate)} Tage) — Erster Tag zeigt „START"
                                </div>
                            )}
                            <div>
                                <input type="file" accept="image/*" className="hidden" id="cal-img-upload-modal"
                                    onChange={async(ev) => { if(!ev.target.files[0]) return; const b64 = await compressCalImage(ev.target.files[0]); setEditCalEntry(prev => ({...prev, image:b64})); ev.target.value=''; }}/>
                                <label htmlFor="cal-img-upload-modal" style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:6, padding:'10px', border:'1px dashed rgba(255,255,255,0.2)', borderRadius:10, color:'#94a3b8', cursor:'pointer', fontSize:9, fontWeight:700, textTransform:'uppercase' }}>
                                    <Icon name="camera" size={14}/>{editCalEntry.image?'Foto ersetzen':'Foto anhängen'}
                                </label>
                                {editCalEntry.image && (
                                    <div style={{ position:'relative', marginTop:6 }}>
                                        <img src={editCalEntry.image} style={{ width:'100%', height:80, objectFit:'cover', borderRadius:8, border:'1px solid rgba(255,255,255,0.1)' }}/>
                                        <button onClick={() => setEditCalEntry(p => ({...p, image:null}))} style={{ position:'absolute', top:4, right:4, background:'#ef4444', border:'none', borderRadius:'50%', width:18, height:18, cursor:'pointer', color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', fontSize:10 }}>✕</button>
                                    </div>
                                )}
                            </div>
                            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginTop:4 }}>
                                <button onClick={() => setEditCalEntry(null)} style={{ padding:'12px', background:'transparent', border:'none', color:'#64748b', fontWeight:900, fontSize:10, textTransform:'uppercase', cursor:'pointer' }}>Abbrechen</button>
                                <button onClick={() => { if(!editCalEntry.customer) return; if(editCalEntry.isNew) saveNewCalEntry(editCalEntry); else saveCalEntry(editCalEntry); }}
                                    style={{ padding:'12px', background:'#3b82f6', border:'none', borderRadius:12, color:'#fff', fontWeight:900, fontSize:10, textTransform:'uppercase', cursor:'pointer' }}>Speichern</button>
                            </div>
                        </div>
                    </div>
                )}

                {/* STANDBY PICKER MODAL */}
                {showStandbyPicker && isAdminAccess && (
                    <div style={{ position:'fixed', inset:0, zIndex:55, background:'rgba(15,23,42,0.99)', display:'flex', flexDirection:'column', padding:0 }}>
                        <div style={{ background:'#1e293b', padding:'12px 16px', display:'flex', justifyContent:'space-between', alignItems:'center', borderBottom:'2px solid #f59e0b44' }}>
                            <div>
                                <div style={{ color:'#f59e0b', fontSize:10, fontWeight:900, textTransform:'uppercase', letterSpacing:1 }}>📦 Standby — Auftrag auswählen</div>
                                <div style={{ color:'#94a3b8', fontSize:9, marginTop:2 }}>Auftrag wählen → Zeitraum als EINEN Eintrag einfügen</div>
                            </div>
                            <button onClick={() => { setShowStandbyPicker(null); setStandbySearch(''); }} style={{ background:'#334155', border:'none', borderRadius:8, width:32, height:32, cursor:'pointer', color:'#94a3b8', fontSize:16, display:'flex', alignItems:'center', justifyContent:'center' }}>✕</button>
                        </div>
                        <div style={{ padding:'10px 16px', background:'#0f172a', borderBottom:'1px solid #1e293b' }}>
                            <input value={standbySearch} onChange={e => setStandbySearch(e.target.value)} placeholder="🔍 Suchen..." autoFocus
                                style={{ width:'100%', background:'#1e293b', border:'1px solid #334155', borderRadius:8, padding:'9px 12px', color:'#fff', fontSize:11, boxSizing:'border-box' }}/>
                        </div>
                        <div style={{ flex:1, overflowY:'auto', padding:'10px 16px', display:'flex', flexDirection:'column', gap:8 }}>
                            {standbyItems.filter(s => !standbySearch || s.customer?.toLowerCase().includes(standbySearch.toLowerCase()) || s.address?.toLowerCase().includes(standbySearch.toLowerCase())).map(item => (
                                <div key={item.id} onClick={() => setStandbyDateModal({ item, startDate: showStandbyPicker.dayStr, endDate: showStandbyPicker.dayStr })}
                                    style={{ background:'#1e293b', border:'1px solid #334155', borderLeft:'3px solid #f59e0b', borderRadius:10, padding:'12px 14px', cursor:'pointer' }}
                                    onMouseEnter={e => e.currentTarget.style.background='#263348'} onMouseLeave={e => e.currentTarget.style.background='#1e293b'}>
                                    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
                                        <div>
                                            <div style={{ color:'#fff', fontSize:12, fontWeight:900, textTransform:'uppercase' }}>{item.customer}</div>
                                            {item.address && <div style={{ color:'#94a3b8', fontSize:10, marginTop:2 }}>{item.address}</div>}
                                        </div>
                                        <div style={{ background:'#f59e0b', color:'#fff', fontSize:8, fontWeight:900, padding:'4px 8px', borderRadius:6, textTransform:'uppercase', flexShrink:0, marginLeft:8 }}>Auswählen →</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                )}

                {/* STANDBY DATUM MODAL */}
                {standbyDateModal && (
                    <div style={{ position:'fixed', inset:0, zIndex:60, background:'rgba(15,23,42,0.97)', display:'flex', alignItems:'center', justifyContent:'center', padding:16 }}>
                        <div style={{ width:'100%', maxWidth:420, background:'#1e293b', border:'2px solid #f59e0b44', borderRadius:20, padding:24, display:'flex', flexDirection:'column', gap:16 }}>
                            <div>
                                <div style={{ color:'#f59e0b', fontSize:10, fontWeight:900, textTransform:'uppercase', letterSpacing:1, marginBottom:4 }}>Zeitraum festlegen</div>
                                <div style={{ color:'#fff', fontSize:14, fontWeight:900, textTransform:'uppercase' }}>{standbyDateModal.item.customer}</div>
                                {standbyDateModal.item.address && <div style={{ color:'#94a3b8', fontSize:10, marginTop:2 }}>{standbyDateModal.item.address}</div>}
                            </div>
                            <div style={{ background:'rgba(245,158,11,0.08)', border:'1px solid rgba(245,158,11,0.2)', borderRadius:10, padding:'10px 12px', fontSize:9, color:'#f59e0b', fontWeight:700 }}>
                                ℹ️ Der Auftrag wird als <strong>einzelner Eintrag</strong> im Kalender angelegt, der den gesamten Zeitraum überspannt.
                            </div>
                            <div style={{ background:'#0f172a', borderRadius:12, padding:16, display:'flex', flexDirection:'column', gap:12 }}>
                                <div>
                                    <div style={{ color:'#94a3b8', fontSize:9, fontWeight:900, textTransform:'uppercase', marginBottom:6 }}>Von (Startdatum)</div>
                                    <input type="date" value={standbyDateModal.startDate} onChange={e => setStandbyDateModal({...standbyDateModal, startDate: e.target.value, endDate: e.target.value})}
                                        style={{ width:'100%', background:'#1e293b', border:'1px solid #334155', borderRadius:8, padding:'10px 12px', color:'#fff', fontSize:12, boxSizing:'border-box' }}/>
                                </div>
                                <div>
                                    <div style={{ color:'#94a3b8', fontSize:9, fontWeight:900, textTransform:'uppercase', marginBottom:6 }}>Bis (Enddatum)</div>
                                    <input type="date" value={standbyDateModal.endDate} onChange={e => setStandbyDateModal({...standbyDateModal, endDate: e.target.value})} min={standbyDateModal.startDate}
                                        style={{ width:'100%', background:'#1e293b', border:'1px solid #334155', borderRadius:8, padding:'10px 12px', color:'#fff', fontSize:12, boxSizing:'border-box' }}/>
                                </div>
                                {standbyDateModal.startDate && standbyDateModal.endDate && standbyDateModal.endDate >= standbyDateModal.startDate && (
                                    <div style={{ background:'rgba(245,158,11,0.1)', border:'1px solid rgba(245,158,11,0.3)', borderRadius:8, padding:'8px 12px', fontSize:9, color:'#f59e0b', fontWeight:700 }}>
                                        ✓ {formatDate(standbyDateModal.startDate)} bis {formatDate(standbyDateModal.endDate)} — {daysBetween(standbyDateModal.startDate, standbyDateModal.endDate)} Tage
                                    </div>
                                )}
                            </div>
                            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
                                <button onClick={() => setStandbyDateModal(null)} style={{ padding:'12px', background:'transparent', border:'1px solid #334155', borderRadius:10, color:'#64748b', fontWeight:900, fontSize:10, textTransform:'uppercase', cursor:'pointer' }}>Zurück</button>
                                <button disabled={!standbyDateModal.endDate || standbyDateModal.endDate < standbyDateModal.startDate}
                                    onClick={() => insertStandbyItem(standbyDateModal.item, standbyDateModal.startDate, standbyDateModal.endDate)}
                                    style={{ padding:'12px', background: standbyDateModal.endDate >= standbyDateModal.startDate ? '#f59e0b' : '#334155', border:'none', borderRadius:10, color:'#fff', fontWeight:900, fontSize:10, textTransform:'uppercase', cursor:'pointer' }}>
                                    ✓ In Kalender einfügen
                                </button>
                            </div>
                        </div>
                    </div>
                )}

                {showCalImport && isAdminAccess && (
                    <ImportModal calWeek={calWeek} team={team} currentCalLabel={currentCalLabel} activeCalType={activeCalType} appId={appId} days={days}
                        onClose={() => setShowCalImport(false)} onDone={(count) => { setShowCalImport(false); setCalImportResult(count); }}/>
                )}

                {calImportResult !== null && (
                    <div style={{ position:'fixed', inset:0, zIndex:60, background:'rgba(15,23,42,0.95)', display:'flex', alignItems:'center', justifyContent:'center', padding:24 }}>
                        <div style={{ background:'rgba(51,65,85,0.98)', backdropFilter:'blur(12px)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:24, padding:32, width:'100%', maxWidth:300, display:'flex', flexDirection:'column', alignItems:'center', gap:20 }}>
                            <div style={{ width:64, height:64, background:'#10b981', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center' }}><Icon name="check" size={32} className="text-white"/></div>
                            <div style={{ textAlign:'center' }}>
                                <div style={{ color:'#fff', fontSize:48, fontWeight:900, fontStyle:'italic', lineHeight:1 }}>{calImportResult}</div>
                                <div style={{ color:'#10b981', fontSize:11, fontWeight:900, textTransform:'uppercase', marginTop:4 }}>Aufträge erfasst</div>
                            </div>
                            <button onClick={() => setCalImportResult(null)} style={{ width:'100%', padding:'14px', background:'#3b82f6', border:'none', borderRadius:12, color:'#fff', fontWeight:900, fontSize:10, textTransform:'uppercase', cursor:'pointer' }}>OK</button>
                        </div>
                    </div>
                )}
            </div>
        );
    }

    // ─────────────────────────────────────────────────────────────
    // STANDBY VIEW
    // ─────────────────────────────────────────────────────────────
    function StandbyView({ onBack, appId }) {
        const [standbyItems, setStandbyItems] = useState([]);
        const [search, setSearch] = useState('');
        const [showImport, setShowImport] = useState(false);
        const [importText, setImportText] = useState('');
        const [showAdd, setShowAdd] = useState(false);
        const [newItem, setNewItem] = useState({ customer:'', address:'', memo:'', auftragsNr:'', target:'' });

        useEffect(() => {
            const { db, collection, onSnapshot } = window.FirebaseSDK;
            const unsub = onSnapshot(collection(db, 'standby_items'), snap => {
                setStandbyItems(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (a.createdAt||'') < (b.createdAt||'') ? 1 : -1));
            });
            return unsub;
        }, []);

        const deleteItem = async (id) => {
            if (!confirm('Auftrag aus Standby entfernen?')) return;
            const { db, doc, deleteDoc } = window.FirebaseSDK;
            await deleteDoc(doc(db, 'standby_items', id));
        };

        const addItem = async () => {
            if (!newItem.customer) return;
            const { db, doc, setDoc } = window.FirebaseSDK;
            const id = 'sb-' + genId();
            await setDoc(doc(db, 'standby_items', id), { ...newItem, id, target: parseInt(newItem.target) || 0, createdAt: new Date().toISOString() });
            setNewItem({ customer:'', address:'', memo:'', auftragsNr:'', target:'' });
            setShowAdd(false);
        };

        const processImport = async () => {
            if (!importText.trim()) return;
            const lines = importText.split(/\r?\n/);
            const entries = [];
            const KNOWN_TYPES = ['LIEFERUNG','MONTAGE','DEMONTAGE','ABHOLUNG','BEPLANKUNG','AUSFLOCKEN','GIPSER','SERVICE'];
            for (const line of lines) {
                const trimmed = line.trim();
                if (!trimmed || !trimmed.includes('/')) continue;
                const p = trimmed.split('/').map(s => s.trim());
                let offset = 0;
                if (KNOWN_TYPES.includes(p[0].toUpperCase())) offset = 1;
                const customer = p[offset] || '';
                if (!customer) continue;
                const address = p[offset+1] || '', memo = p[offset+2] || '';
                const auftragsNr = cleanAuftragsNr(p.slice(offset+3).join('/').trim());
                const ele = (memo+' '+auftragsNr).match(/(\d+)\s*ELE/i);
                entries.push({ customer, address, memo, auftragsNr, target: ele ? parseInt(ele[1]) : 0 });
            }
            if (entries.length === 0) { alert('Keine Aufträge erkannt.'); return; }
            const { db, doc, setDoc } = window.FirebaseSDK;
            for (const e of entries) { const id = 'sb-' + genId(); await setDoc(doc(db, 'standby_items', id), { ...e, id, createdAt: new Date().toISOString() }); }
            setImportText(''); setShowImport(false);
            alert(entries.length + ' Aufträge in Standby importiert!');
        };

        const filtered = standbyItems.filter(s => !search || s.customer?.toLowerCase().includes(search.toLowerCase()) || s.address?.toLowerCase().includes(search.toLowerCase()));

        return (
            <div style={{ minHeight:'100vh', background:'#0f172a', display:'flex', flexDirection:'column' }}>
                <div style={{ background:'#1e293b', padding:'12px 20px', display:'flex', justifyContent:'space-between', alignItems:'center', borderBottom:'2px solid #334155', position:'sticky', top:0, zIndex:40 }}>
                    <div style={{ display:'flex', alignItems:'center', gap:12 }}>
                        <button onClick={onBack} style={{ background:'#334155', border:'none', borderRadius:10, width:34, height:34, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer' }}>
                            <Icon name="arrow-left" size={16} className="text-blue-400"/>
                        </button>
                        <div>
                            <div style={{ color:'#f59e0b', fontSize:9, fontWeight:900, textTransform:'uppercase', letterSpacing:2 }}>STANDBY — AUFTRAGS-POOL</div>
                            <div style={{ color:'#fff', fontSize:14, fontWeight:900, fontStyle:'italic' }}>{standbyItems.length} Aufträge bereit</div>
                        </div>
                    </div>
                    <div style={{ display:'flex', gap:8 }}>
                        <button onClick={() => setShowAdd(true)} style={{ background:'#10b981', border:'none', borderRadius:8, padding:'6px 14px', color:'#fff', fontSize:9, fontWeight:900, textTransform:'uppercase', cursor:'pointer', display:'flex', alignItems:'center', gap:4 }}>
                            <Icon name="plus" size={12}/>Manuell
                        </button>
                        <button onClick={() => setShowImport(true)} style={{ background:'#f59e0b', border:'none', borderRadius:8, padding:'6px 14px', color:'#fff', fontSize:9, fontWeight:900, textTransform:'uppercase', cursor:'pointer', display:'flex', alignItems:'center', gap:4 }}>
                            <Icon name="upload" size={12}/>Import
                        </button>
                    </div>
                </div>
                <div style={{ padding:'12px 16px', background:'#0f172a', borderBottom:'1px solid #1e293b' }}>
                    <input value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍 Suchen..."
                        style={{ width:'100%', background:'#1e293b', border:'1px solid #334155', borderRadius:10, padding:'10px 14px', color:'#fff', fontSize:11, boxSizing:'border-box' }}/>
                </div>
                <div style={{ flex:1, overflowY:'auto', padding:'12px 16px', display:'flex', flexDirection:'column', gap:8 }}>
                    {filtered.map(item => (
                        <div key={item.id} style={{ background:'#1e293b', border:'1px solid #334155', borderLeft:'3px solid #f59e0b', borderRadius:10, padding:'12px 14px', display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
                            <div style={{ flex:1 }}>
                                <div style={{ color:'#fff', fontSize:12, fontWeight:900, textTransform:'uppercase', marginBottom:2 }}>{item.customer}</div>
                                {item.address && <div style={{ color:'#94a3b8', fontSize:10 }}>{item.address}</div>}
                                {item.memo && <div style={{ color:'#fde68a', fontSize:10, fontWeight:800, marginTop:3, borderLeft:'2px solid #f59e0b', paddingLeft:6 }}>📝 {item.memo}</div>}
                                {item.auftragsNr && <div style={{ color:'#3b82f6', fontSize:9, marginTop:2 }}>#{cleanAuftragsNr(item.auftragsNr)}</div>}
                            </div>
                            <button onClick={() => deleteItem(item.id)} style={{ background:'rgba(239,68,68,0.15)', border:'none', borderRadius:6, padding:'6px 8px', cursor:'pointer', color:'#ef4444', marginLeft:8 }}>
                                <Icon name="trash-2" size={14}/>
                            </button>
                        </div>
                    ))}
                </div>
                {showAdd && (
                    <div style={{ position:'fixed', inset:0, zIndex:60, background:'rgba(15,23,42,0.97)', display:'flex', alignItems:'center', justifyContent:'center', padding:16 }}>
                        <div style={{ width:'100%', maxWidth:400, background:'#1e293b', border:'1px solid #334155', borderRadius:20, padding:24, display:'flex', flexDirection:'column', gap:10 }}>
                            <h3 style={{ color:'#f59e0b', fontSize:12, fontWeight:900, textTransform:'uppercase', margin:0 }}>Auftrag in Standby</h3>
                            {[['customer','Kunde *'],['address','Adresse'],['memo','📝 Memo'],['auftragsNr','Auftragsnr.']].map(([field, ph]) => (
                                <input key={field} placeholder={ph} value={newItem[field]} onChange={e => setNewItem({...newItem, [field]: e.target.value})}
                                    style={{ width:'100%', background:'#0f172a', border: field==='memo' ? '1px solid #f59e0b55' : '1px solid #334155', borderRadius:8, padding:'10px 12px', color: field==='memo' ? '#fde68a' : '#fff', fontSize:11, boxSizing:'border-box', fontWeight: field==='memo' ? 700 : 400 }}/>
                            ))}
                            <input type="number" placeholder="ELE" value={newItem.target} onChange={e => setNewItem({...newItem, target: e.target.value})}
                                style={{ width:'100%', background:'#0f172a', border:'1px solid #334155', borderRadius:8, padding:'10px 12px', color:'#fff', fontSize:11, boxSizing:'border-box' }}/>
                            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginTop:4 }}>
                                <button onClick={() => setShowAdd(false)} style={{ padding:'11px', background:'transparent', border:'none', color:'#64748b', fontWeight:900, fontSize:10, textTransform:'uppercase', cursor:'pointer' }}>Abbrechen</button>
                                <button onClick={addItem} style={{ padding:'11px', background:'#f59e0b', border:'none', borderRadius:10, color:'#fff', fontWeight:900, fontSize:10, textTransform:'uppercase', cursor:'pointer' }}>Speichern</button>
                            </div>
                        </div>
                    </div>
                )}
                {showImport && (
                    <div style={{ position:'fixed', inset:0, zIndex:60, background:'rgba(15,23,42,0.99)', padding:20, display:'flex', flexDirection:'column', gap:12 }}>
                        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                            <div style={{ color:'#f59e0b', fontSize:11, fontWeight:900, textTransform:'uppercase' }}>Import → Standby Pool</div>
                            <button onClick={() => setShowImport(false)} style={{ background:'#334155', border:'none', borderRadius:8, width:32, height:32, cursor:'pointer', color:'#94a3b8', fontSize:16, display:'flex', alignItems:'center', justifyContent:'center' }}>✕</button>
                        </div>
                        <textarea autoFocus style={{ flex:1, background:'#1e293b', border:'1px solid #334155', padding:14, borderRadius:10, fontSize:11, color:'#fff', fontFamily:'monospace', resize:'none', boxSizing:'border-box', lineHeight:1.6 }}
                            placeholder={"Kunde AG / Adresse / Memo / AuftragsNr"} value={importText} onChange={e => setImportText(e.target.value)}/>
                        <div style={{ display:'flex', gap:12 }}>
                            <button onClick={() => setShowImport(false)} style={{ flex:1, padding:'13px', background:'transparent', border:'1px solid #334155', borderRadius:12, color:'#64748b', fontWeight:900, fontSize:10, textTransform:'uppercase', cursor:'pointer' }}>Abbrechen</button>
                            <button onClick={processImport} style={{ flex:2, padding:'13px', background:'#f59e0b', border:'none', borderRadius:12, color:'#fff', fontWeight:900, fontSize:10, textTransform:'uppercase', cursor:'pointer' }}>In Standby importieren</button>
                        </div>
                    </div>
                )}
            </div>
        );
    }

    // ─────────────────────────────────────────────────────────────
    // ADMIN PANEL
    // ─────────────────────────────────────────────────────────────
    const AdminPanel = ({ teams, onLogout, onSelectTeam, onOpenBilling, onOpenStandby, appId }) => {
        const [isAdding, setIsAdding] = useState(false);
        const [deleteConfirm, setDeleteConfirm] = useState(null);
        const [deleteCodeInput, setDeleteCodeInput] = useState("");
        const [editTeam, setEditTeam] = useState(null);
        const [newTeam, setNewTeam] = useState({ name:'', pin:'', color:'#3b82f6', calType:'montage' });
        const [showBilling, setShowBilling] = useState(false);

        const handleAddTeam = async () => {
            if (!newTeam.name || !newTeam.pin) { alert('Bitte Name und PIN eingeben!'); return; }
            try {
                const { db, doc, setDoc } = window.FirebaseSDK;
                let teamId = newTeam.name.toLowerCase().replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'').substring(0, 30);
                if (!teamId) teamId = 'team-' + Date.now();
                await setDoc(doc(db, 'teams_config', teamId), { ...newTeam, id: teamId });
                setIsAdding(false);
                setNewTeam({ name:'', pin:'', color:'#3b82f6', calType:'montage' });
            } catch(err) { alert('Fehler: ' + err.message); }
        };

        const handleSaveEditTeam = async () => {
            if (!editTeam) return;
            try {
                const { db, doc, updateDoc } = window.FirebaseSDK;
                await updateDoc(doc(db, 'teams_config', editTeam.id), { name: editTeam.name, pin: editTeam.pin, color: editTeam.color, calType: editTeam.calType || 'montage' });
                setEditTeam(null);
            } catch(err) { alert('Fehler: ' + err.message); }
        };

        const confirmDelete = async () => {
            if (deleteCodeInput !== ADMIN_PIN) { alert("Falscher Admin-Code!"); return; }
            try {
                const { db, doc, deleteDoc } = window.FirebaseSDK;
                await deleteDoc(doc(db, 'teams_config', deleteConfirm.id));
                setDeleteConfirm(null); setDeleteCodeInput("");
            } catch(err) { alert('Fehler: ' + err.message); }
        };

        const CAL_TYPE_OPTIONS = [
            ['montage',    '🔧 Montage',    '#2563eb', '#dbeafe', '#93c5fd'],
            ['beplankung', '🏗 Beplankung', '#059669', '#d1fae5', '#6ee7b7'],
            ['ausflocken', '❄️ Ausflocken', '#b45309', '#fef3c7', '#fcd34d'],
            ['both',       '⚡ Alle',        '#7c3aed', '#f3e8ff', '#d8b4fe'],
        ];

        const calTypeLabel = (ct) => {
            const found = CAL_TYPE_OPTIONS.find(o => o[0] === ct);
            return found ? found[1] : 'Montage';
        };
        const calTypeBadgeStyle = (ct) => {
            const map = {
                both:       { bg:'#f3e8ff', color:'#7c3aed', border:'1px solid #d8b4fe' },
                beplankung: { bg:'#d1fae5', color:'#059669', border:'1px solid #6ee7b7' },
                ausflocken: { bg:'#fef3c7', color:'#b45309', border:'1px solid #fcd34d' },
                montage:    { bg:'#dbeafe', color:'#2563eb', border:'1px solid #93c5fd' },
            };
            return map[ct] || map.montage;
        };

        return (
            <div className="admin-mesh" style={{ minHeight:'100vh', padding:0, display:'flex', flexDirection:'column' }}>
                <div className="admin-header" style={{ padding:'16px 32px', display:'flex', justifyContent:'space-between', alignItems:'center', position:'sticky', top:0, zIndex:40 }}>
                    <div style={{ display:'flex', alignItems:'center', gap:14 }}>
                        <div style={{ width:44, height:44, background:'linear-gradient(135deg,#3b82f6,#6366f1)', borderRadius:14, display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'0 4px 14px rgba(59,130,246,0.35)' }}>
                            <Icon name="calendar" size={22} className="text-white"/>
                        </div>
                        <div>
                            <div style={{ color:'#1e293b', fontSize:18, fontWeight:900, letterSpacing:-0.5 }}>PE-MONTAGE</div>
                            <div style={{ color:'#64748b', fontSize:9, fontWeight:700, textTransform:'uppercase', letterSpacing:2 }}>Admin-Zentrale · {teams.length} Gruppen</div>
                        </div>
                    </div>
                    <div style={{ display:'flex', gap:10, alignItems:'center' }}>
                        <button onClick={onOpenStandby} style={{ background:'linear-gradient(135deg,#fef3c7,#fffbeb)', border:'1px solid #fde68a', borderRadius:12, padding:'9px 18px', color:'#92400e', fontSize:10, fontWeight:800, cursor:'pointer', display:'flex', alignItems:'center', gap:6, boxShadow:'0 2px 8px rgba(245,158,11,0.15)', transition:'all 0.2s' }}>
                            <Icon name="archive" size={14}/>📦 Standby
                        </button>
                        <button onClick={() => setShowBilling(true)} style={{ background:'linear-gradient(135deg,#f0fdf4,#dcfce7)', border:'1px solid #86efac', borderRadius:12, padding:'9px 18px', color:'#15803d', fontSize:10, fontWeight:800, cursor:'pointer', display:'flex', alignItems:'center', gap:6, boxShadow:'0 2px 8px rgba(16,185,129,0.15)', transition:'all 0.2s' }}>
                            <Icon name="receipt" size={14}/>💰 Abrechnung
                        </button>
                        <button onClick={onLogout} style={{ background:'#f1f5f9', border:'1px solid #e2e8f0', borderRadius:12, padding:'9px 16px', color:'#64748b', fontSize:10, fontWeight:700, cursor:'pointer', transition:'all 0.2s' }}>
                            Logout
                        </button>
                    </div>
                </div>

                <div style={{ flex:1, padding:'32px 32px 48px', maxWidth:1400, width:'100%', margin:'0 auto', boxSizing:'border-box' }}>
                    <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:16, marginBottom:32 }}>
                        {[
                            { label:'Gruppen', value:teams.length, color:'#3b82f6', bg:'#eff6ff', icon:'users' },
                            { label:'Montage', value:teams.filter(t=>!t.calType||t.calType==='montage'||t.calType==='both').length, color:'#2563eb', bg:'#dbeafe', icon:'wrench' },
                            { label:'Beplankung', value:teams.filter(t=>t.calType==='beplankung'||t.calType==='both').length, color:'#059669', bg:'#d1fae5', icon:'building-2' },
                            { label:'Ausflocken', value:teams.filter(t=>t.calType==='ausflocken'||t.calType==='both').length, color:'#b45309', bg:'#fef3c7', icon:'snowflake' },
                        ].map(s => (
                            <div key={s.label} className="admin-stat-card" style={{ padding:'20px 24px', display:'flex', alignItems:'center', gap:16 }}>
                                <div style={{ width:48, height:48, background:s.bg, borderRadius:14, display:'flex', alignItems:'center', justifyContent:'center' }}>
                                    <Icon name={s.icon} size={22} style={{ color:s.color }}/>
                                </div>
                                <div>
                                    <div style={{ color:'#1e293b', fontSize:28, fontWeight:900, lineHeight:1 }}>{s.value}</div>
                                    <div style={{ color:'#64748b', fontSize:10, fontWeight:700, textTransform:'uppercase', letterSpacing:1, marginTop:2 }}>{s.label}</div>
                                </div>
                            </div>
                        ))}
                    </div>

                    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
                        <h2 style={{ color:'#1e293b', fontSize:16, fontWeight:900, margin:0 }}>Gruppen Übersicht</h2>
                        <button onClick={() => setIsAdding(true)} style={{ background:'linear-gradient(135deg,#3b82f6,#6366f1)', border:'none', borderRadius:12, padding:'10px 20px', color:'#fff', fontSize:10, fontWeight:800, cursor:'pointer', display:'flex', alignItems:'center', gap:6, boxShadow:'0 4px 14px rgba(59,130,246,0.35)' }}>
                            <Icon name="plus" size={14}/>Neue Gruppe
                        </button>
                    </div>

                    <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(300px, 1fr))', gap:20 }}>
                        {teams.map(t => {
                            const badgeStyle = calTypeBadgeStyle(t.calType||'montage');
                            const ct = t.calType || 'montage';
                            return (
                                <div key={t.id} className="admin-card" style={{ padding:'24px' }}>
                                    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:16 }}>
                                        <div style={{ width:50, height:50, borderRadius:16, background:t.color+'22', border:`2px solid ${t.color}44`, display:'flex', alignItems:'center', justifyContent:'center' }}>
                                            <Icon name="users" size={22} style={{ color:t.color }}/>
                                        </div>
                                        <div style={{ display:'flex', gap:6 }}>
                                            <button onClick={() => setEditTeam({...t})}
                                                style={{ background:'#f1f5f9', border:'1px solid #e2e8f0', borderRadius:8, width:32, height:32, cursor:'pointer', color:'#64748b', display:'flex', alignItems:'center', justifyContent:'center' }}
                                                onMouseEnter={e => { e.currentTarget.style.background='#dbeafe'; e.currentTarget.style.color='#2563eb'; }}
                                                onMouseLeave={e => { e.currentTarget.style.background='#f1f5f9'; e.currentTarget.style.color='#64748b'; }}>
                                                <Icon name="pencil" size={14}/>
                                            </button>
                                            <button onClick={() => setDeleteConfirm(t)}
                                                style={{ background:'#f1f5f9', border:'1px solid #e2e8f0', borderRadius:8, width:32, height:32, cursor:'pointer', color:'#64748b', display:'flex', alignItems:'center', justifyContent:'center' }}
                                                onMouseEnter={e => { e.currentTarget.style.background='#fee2e2'; e.currentTarget.style.color='#ef4444'; }}
                                                onMouseLeave={e => { e.currentTarget.style.background='#f1f5f9'; e.currentTarget.style.color='#64748b'; }}>
                                                <Icon name="trash-2" size={14}/>
                                            </button>
                                        </div>
                                    </div>
                                    <div style={{ marginBottom:8 }}>
                                        <div style={{ color:'#1e293b', fontSize:18, fontWeight:900, letterSpacing:-0.3, cursor:'pointer' }}
                                            onClick={() => onSelectTeam(t, ct==='beplankung'?'beplankung':ct==='ausflocken'?'ausflocken':'montage')}>
                                            {t.name}
                                        </div>
                                        <div style={{ color:'#94a3b8', fontSize:11, fontWeight:600, marginTop:2 }}>PIN: {t.pin}</div>
                                    </div>
                                    <div style={{ display:'inline-flex', alignItems:'center', gap:6, background:badgeStyle.bg, border:badgeStyle.border, borderRadius:8, padding:'4px 10px', marginBottom:14 }}>
                                        <div style={{ width:6, height:6, borderRadius:'50%', background:badgeStyle.color }}></div>
                                        <span style={{ fontSize:9, fontWeight:800, color:badgeStyle.color, textTransform:'uppercase', letterSpacing:1 }}>{calTypeLabel(ct)}</span>
                                    </div>
                                    <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
                                        {(ct==='montage'||ct==='both'||ct==='all'||!t.calType) && (
                                            <button onClick={() => onSelectTeam(t,'montage')} style={{ flex:1, minWidth:80, background:'linear-gradient(135deg,#dbeafe,#eff6ff)', border:'1px solid #93c5fd', borderRadius:10, padding:'8px', color:'#1d4ed8', fontSize:9, fontWeight:800, textTransform:'uppercase', cursor:'pointer' }}>
                                                🔧 Montage ↗
                                            </button>
                                        )}
                                        {(ct==='beplankung'||ct==='both'||ct==='all') && (
                                            <button onClick={() => onSelectTeam(t,'beplankung')} style={{ flex:1, minWidth:80, background:'linear-gradient(135deg,#d1fae5,#ecfdf5)', border:'1px solid #6ee7b7', borderRadius:10, padding:'8px', color:'#065f46', fontSize:9, fontWeight:800, textTransform:'uppercase', cursor:'pointer' }}>
                                                🏗 Beplankung ↗
                                            </button>
                                        )}
                                        {(ct==='ausflocken'||ct==='both'||ct==='all') && (
                                            <button onClick={() => onSelectTeam(t,'ausflocken')} style={{ flex:1, minWidth:80, background:'linear-gradient(135deg,#fef3c7,#fffbeb)', border:'1px solid #fcd34d', borderRadius:10, padding:'8px', color:'#92400e', fontSize:9, fontWeight:800, textTransform:'uppercase', cursor:'pointer' }}>
                                                ❄️ Ausflocken ↗
                                            </button>
                                        )}
                                    </div>
                                </div>
                            );
                        })}

                        <div onClick={() => setIsAdding(true)}
                            style={{ border:'2px dashed #cbd5e1', borderRadius:20, padding:24, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:12, cursor:'pointer', transition:'all 0.2s', minHeight:200, background:'rgba(255,255,255,0.4)' }}
                            onMouseEnter={e => { e.currentTarget.style.borderColor='#3b82f6'; e.currentTarget.style.background='rgba(59,130,246,0.04)'; }}
                            onMouseLeave={e => { e.currentTarget.style.borderColor='#cbd5e1'; e.currentTarget.style.background='rgba(255,255,255,0.4)'; }}>
                            <div style={{ width:52, height:52, background:'#f1f5f9', borderRadius:16, display:'flex', alignItems:'center', justifyContent:'center' }}>
                                <Icon name="plus" size={24} style={{ color:'#3b82f6' }}/>
                            </div>
                            <div style={{ color:'#94a3b8', fontSize:12, fontWeight:700 }}>Neue Gruppe erstellen</div>
                        </div>
                    </div>
                </div>

                {showBilling && <BillingModal teams={teams} appId={appId} onClose={() => setShowBilling(false)}/>}

                {/* EDIT TEAM MODAL */}
                {editTeam && (
                    <div style={{ position:'fixed', inset:0, zIndex:50, background:'rgba(15,23,42,0.6)', backdropFilter:'blur(8px)', display:'flex', alignItems:'center', justifyContent:'center', padding:16 }}>
                        <div style={{ background:'#fff', borderRadius:24, padding:32, width:'100%', maxWidth:400, boxShadow:'0 40px 80px rgba(0,0,0,0.2)' }}>
                            <h3 style={{ color:'#1e293b', fontSize:16, fontWeight:900, margin:'0 0 24px 0' }}>Gruppe bearbeiten</h3>
                            <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
                                {[['name','Gruppen Name'],['pin','PIN (4 Ziffern)']].map(([field, label]) => (
                                    <div key={field}>
                                        <div style={{ color:'#64748b', fontSize:9, fontWeight:800, textTransform:'uppercase', letterSpacing:1, marginBottom:6 }}>{label}</div>
                                        <input maxLength={field==='pin'?4:undefined} value={editTeam[field]} onChange={e => setEditTeam({...editTeam, [field]:e.target.value})}
                                            style={{ width:'100%', background:'#f8fafc', border:'1.5px solid #e2e8f0', borderRadius:12, padding:'12px', color:'#1e293b', fontSize:13, boxSizing:'border-box', outline:'none' }}/>
                                    </div>
                                ))}
                                <div>
                                    <div style={{ color:'#64748b', fontSize:9, fontWeight:800, textTransform:'uppercase', letterSpacing:1, marginBottom:6 }}>Farbe</div>
                                    <input type="color" value={editTeam.color} onChange={e => setEditTeam({...editTeam, color:e.target.value})}
                                        style={{ width:'100%', height:48, background:'transparent', border:'none', cursor:'pointer', borderRadius:8 }}/>
                                </div>
                                <div>
                                    <div style={{ color:'#64748b', fontSize:9, fontWeight:800, textTransform:'uppercase', letterSpacing:1, marginBottom:8 }}>Kalender-Typ</div>
                                    <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
                                        {[['montage','🔧 Montage','#2563eb'],['beplankung','🏗 Beplankg.','#059669'],['ausflocken','❄️ Ausflock.','#b45309'],['both','⚡ Alle','#7c3aed']].map(([ct,label,color]) => (
                                            <button key={ct} onClick={() => setEditTeam({...editTeam, calType:ct})}
                                                style={{ flex:1, minWidth:60, padding:'10px 4px', borderRadius:10, border: editTeam.calType===ct ? 'none' : '1.5px solid #e2e8f0', fontSize:8, fontWeight:800, textTransform:'uppercase', cursor:'pointer',
                                                    background: editTeam.calType===ct ? color : '#f8fafc',
                                                    color: editTeam.calType===ct ? '#fff' : '#94a3b8' }}>
                                                {label}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                            <div style={{ display:'flex', gap:12, marginTop:24 }}>
                                <button onClick={() => setEditTeam(null)} style={{ flex:1, padding:'13px', background:'#f1f5f9', border:'none', borderRadius:12, color:'#64748b', fontWeight:800, fontSize:11, cursor:'pointer' }}>Abbrechen</button>
                                <button onClick={handleSaveEditTeam} style={{ flex:1, padding:'13px', background:'linear-gradient(135deg,#3b82f6,#6366f1)', border:'none', borderRadius:12, color:'#fff', fontWeight:800, fontSize:11, cursor:'pointer' }}>Speichern</button>
                            </div>
                        </div>
                    </div>
                )}

                {/* DELETE CONFIRM */}
                {deleteConfirm && (
                    <div style={{ position:'fixed', inset:0, zIndex:100, background:'rgba(15,23,42,0.7)', backdropFilter:'blur(8px)', display:'flex', alignItems:'center', justifyContent:'center', padding:16 }}>
                        <div style={{ background:'#fff', border:'2px solid #fee2e2', borderRadius:24, padding:32, width:'100%', maxWidth:360, boxShadow:'0 40px 80px rgba(239,68,68,0.2)' }}>
                            <div style={{ display:'flex', justifyContent:'center', marginBottom:20 }}>
                                <div style={{ width:64, height:64, background:'#fee2e2', borderRadius:20, display:'flex', alignItems:'center', justifyContent:'center' }}>
                                    <Icon name="alert-triangle" size={30} style={{ color:'#ef4444' }}/>
                                </div>
                            </div>
                            <h3 style={{ color:'#1e293b', fontSize:16, fontWeight:900, textAlign:'center', margin:'0 0 8px 0' }}>Gruppe löschen?</h3>
                            <p style={{ color:'#64748b', textAlign:'center', fontSize:12, margin:'0 0 20px 0' }}>Code <strong style={{ color:'#ef4444' }}>8852</strong> eingeben um „{deleteConfirm.name}" zu löschen</p>
                            <input type="password" placeholder="Admin-Code"
                                style={{ width:'100%', background:'#f8fafc', border:'1.5px solid #fecaca', borderRadius:12, padding:'14px', textAlign:'center', fontSize:18, fontWeight:900, letterSpacing:4, color:'#ef4444', outline:'none', boxSizing:'border-box', marginBottom:20 }}
                                value={deleteCodeInput} onChange={e => setDeleteCodeInput(e.target.value)}/>
                            <div style={{ display:'flex', gap:12 }}>
                                <button onClick={() => { setDeleteConfirm(null); setDeleteCodeInput(""); }} style={{ flex:1, padding:'12px', background:'#f1f5f9', border:'none', borderRadius:12, color:'#64748b', fontWeight:800, fontSize:11, cursor:'pointer' }}>Abbrechen</button>
                                <button onClick={confirmDelete} style={{ flex:1, padding:'12px', background:'#ef4444', border:'none', borderRadius:12, color:'#fff', fontWeight:800, fontSize:11, cursor:'pointer' }}>Löschen</button>
                            </div>
                        </div>
                    </div>
                )}

                {/* ADD TEAM MODAL */}
                {isAdding && (
                    <div style={{ position:'fixed', inset:0, zIndex:50, background:'rgba(15,23,42,0.6)', backdropFilter:'blur(8px)', display:'flex', alignItems:'center', justifyContent:'center', padding:16 }}>
                        <div style={{ background:'#fff', borderRadius:24, padding:32, width:'100%', maxWidth:400, boxShadow:'0 40px 80px rgba(0,0,0,0.2)' }}>
                            <h3 style={{ color:'#1e293b', fontSize:16, fontWeight:900, margin:'0 0 24px 0' }}>Neue Gruppe erstellen</h3>
                            <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
                                {[['name','Team Name','Zürich / Montage A'],['pin','PIN (4 Ziffern)','1234']].map(([field,label,ph]) => (
                                    <div key={field}>
                                        <div style={{ color:'#64748b', fontSize:9, fontWeight:800, textTransform:'uppercase', letterSpacing:1, marginBottom:6 }}>{label}</div>
                                        <input placeholder={ph} maxLength={field==='pin'?4:undefined} value={newTeam[field]} onChange={e => setNewTeam({...newTeam, [field]:e.target.value})}
                                            style={{ width:'100%', background:'#f8fafc', border:'1.5px solid #e2e8f0', borderRadius:12, padding:'12px', color:'#1e293b', fontSize:13, boxSizing:'border-box', outline:'none' }}/>
                                    </div>
                                ))}
                                <div>
                                    <div style={{ color:'#64748b', fontSize:9, fontWeight:800, textTransform:'uppercase', letterSpacing:1, marginBottom:6 }}>Farbe</div>
                                    <input type="color" value={newTeam.color} onChange={e => setNewTeam({...newTeam, color:e.target.value})}
                                        style={{ width:'100%', height:48, background:'transparent', border:'none', cursor:'pointer' }}/>
                                </div>
                                <div>
                                    <div style={{ color:'#64748b', fontSize:9, fontWeight:800, textTransform:'uppercase', letterSpacing:1, marginBottom:8 }}>Kalender-Typ</div>
                                    <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
                                        {[['montage','🔧 Montage','#2563eb'],['beplankung','🏗 Beplankg.','#059669'],['ausflocken','❄️ Ausflock.','#b45309'],['both','⚡ Alle','#7c3aed']].map(([ct,label,color]) => (
                                            <button key={ct} onClick={() => setNewTeam({...newTeam, calType:ct})}
                                                style={{ flex:1, minWidth:60, padding:'10px 4px', borderRadius:10, border: newTeam.calType===ct ? 'none' : '1.5px solid #e2e8f0', fontSize:8, fontWeight:800, textTransform:'uppercase', cursor:'pointer',
                                                    background: newTeam.calType===ct ? color : '#f8fafc',
                                                    color: newTeam.calType===ct ? '#fff' : '#94a3b8' }}>
                                                {label}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                            <div style={{ display:'flex', gap:12, marginTop:24 }}>
                                <button onClick={() => setIsAdding(false)} style={{ flex:1, padding:'13px', background:'#f1f5f9', border:'none', borderRadius:12, color:'#64748b', fontWeight:800, fontSize:11, cursor:'pointer' }}>Abbrechen</button>
                                <button onClick={handleAddTeam} style={{ flex:1, padding:'13px', background:'linear-gradient(135deg,#3b82f6,#6366f1)', border:'none', borderRadius:12, color:'#fff', fontWeight:800, fontSize:11, cursor:'pointer' }}>Erstellen</button>
                            </div>
                        </div>
                    </div>
                )}
            </div>
        );
    };

    // ─────────────────────────────────────────────────────────────
    // MAIN APP
    // ─────────────────────────────────────────────────────────────
    const App = () => {
        const [authState, setAuthState] = useState(null);
        const [teams, setTeams] = useState([]);
        const [user, setUser] = useState(null);

        useEffect(() => {
            const waitAndInit = () => {
                if (!window.FirebaseSDK) { setTimeout(waitAndInit, 100); return; }
                const { db, collection, onSnapshot } = window.FirebaseSDK;
                onSnapshot(collection(db, 'teams_config'), (snap) => {
                    setTeams(snap.docs.map(d => ({ ...d.data() })));
                    setUser(true);
                }, err => setUser('error_' + err.message));
            };
            waitAndInit();
        }, []);

        if (!user) return <div className="min-h-screen bg-slate-950 flex items-center justify-center text-indigo-500 font-black animate-pulse uppercase tracking-[1em]">LADE SYSTEM...</div>;

        if (!authState) return <LoginScreen teams={teams} onLogin={(role,team) => setAuthState({role,team})}/>;

        if (authState.role === 'admin') {
            if (authState.showStandby) return <StandbyView appId={APP_ID} onBack={() => setAuthState({...authState, showStandby:false})}/>;
            if (authState.adminViewingTeam) return <CalendarView team={authState.adminViewingTeam} appId={APP_ID} isAdminAccess={true} activeCalType={authState.adminCalType || 'montage'} onBack={() => setAuthState({...authState, adminViewingTeam:null, adminCalType:null})}/>;
            return <AdminPanel teams={teams} appId={APP_ID} onLogout={() => setAuthState(null)}
                onSelectTeam={(team, calType) => setAuthState({...authState, adminViewingTeam:team, adminCalType:calType})}
                onOpenBilling={() => setAuthState({...authState, showBilling:true})}
                onOpenStandby={() => setAuthState({...authState, showStandby:true})}/>;
        }

        const team = authState.team;
        const ct = team.calType || 'montage';
        return <CalendarView team={team} appId={APP_ID} isAdminAccess={false}
            activeCalType={authState.activeCalType || (ct==='beplankung'?'beplankung':ct==='ausflocken'?'ausflocken':'montage')}
            onBack={() => setAuthState(null)}/>;
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
</script>
</body>
</html>
