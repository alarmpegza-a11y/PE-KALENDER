      (function() {
        if (window.FirebaseReady && window._db) {
          const db = window._db;
          function collection(db, colName) { return { _col: colName, _type: 'col' }; }
          function doc(db, colName, docId) { return { _col: colName, _id: docId, _type: 'doc' }; }
          function setDoc(ref, data) { return db.collection(ref._col).doc(ref._id).set(data); }
          function updateDoc(ref, data) { return db.collection(ref._col).doc(ref._id).update(data); }
          function deleteDoc(ref) { return db.collection(ref._col).doc(ref._id).delete(); }
          function onSnapshot(ref, callback, errorCallback) {
            const unsub = db.collection(ref._col).onSnapshot(snap => {
              const docs = snap.docs.map(d => ({ id: d.id, data: () => ({ ...d.data() }) }));
              callback({ docs });
            }, errorCallback || console.error);
            return unsub;
          }
          window.FirebaseSDK = { db, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot };
        } else {
          const _listeners = {};
          function _getCol(col) { try { return JSON.parse(localStorage.getItem('pe_' + col) || '{}'); } catch(e) { return {}; } }
          function _setCol(col, data) { try { localStorage.setItem('pe_' + col, JSON.stringify(data)); _notify(col, data); } catch(e) { throw new Error('Speicherfehler: ' + e.message); } }
          function _notify(col, data) { const snap = _makeSnap(data); (_listeners[col] || []).forEach(cb => { try { cb(snap); } catch(e) {} }); }
          function _makeSnap(data) { const docs = Object.entries(data).map(([id, d]) => ({ id, data: () => ({ ...d }) })); return { docs }; }
          const db = {};
          function collection(db, colName) { return { _type: 'col', _col: colName }; }
          function doc(db, colName, docId) { return { _type: 'doc', _col: colName, _id: docId }; }
          function setDoc(ref, data) { return new Promise((res, rej) => { try { const all = _getCol(ref._col); all[ref._id] = { ...data, id: ref._id }; _setCol(ref._col, all); res(); } catch(e) { rej(e); } }); }
          function updateDoc(ref, data) { return new Promise((res, rej) => { try { const all = _getCol(ref._col); all[ref._id] = { ...(all[ref._id] || {}), ...data, id: ref._id }; _setCol(ref._col, all); res(); } catch(e) { rej(e); } }); }
          function deleteDoc(ref) { return new Promise((res, rej) => { try { const all = _getCol(ref._col); delete all[ref._id]; _setCol(ref._col, all); res(); } catch(e) { rej(e); } }); }
          function onSnapshot(ref, callback, errorCallback) {
            if (ref._type !== 'col') return () => {};
            const col = ref._col;
            if (!_listeners[col]) _listeners[col] = [];
            _listeners[col].push(callback);
            try { callback(_makeSnap(_getCol(col))); } catch(e) { if (errorCallback) errorCallback(e); }
            const handler = (e) => { if (e.key === 'pe_' + col) { try { callback(_makeSnap(_getCol(col))); } catch(ex) {} } };
            window.addEventListener('storage', handler);
            return () => { _listeners[col] = (_listeners[col] || []).filter(c => c !== callback); window.removeEventListener('storage', handler); };

<script type="text/babel">
const { useState, useEffect, useMemo, useRef, memo, useCallback } = React;

const ADMIN_PIN = "8852";

const CARD_COLORS = ['#cfe2ff','#d1e7dd','#f8d7da','#e2d9f3','#d0f4de','#fce4ec','#e8f5e9','#e3f2fd','#f3e5f5','#e0f7fa','#fde8d8','#d4edda'];
const CARD_BORDER = ['#0d6efd','#198754','#dc3545','#6f42c1','#20c997','#e91e63','#4caf50','#2196f3','#9c27b0','#00bcd4','#f97316','#28a745'];
const CARD_TEXT  = ['#052c65','#0a3622','#58151c','#2c1654','#0a3622','#560a21','#1b5e20','#0d2b6e','#3b0764','#003d47','#431407','#155724'];

const PROV_BG = '#fef9c3'; const PROV_BORDER = '#eab308'; const PROV_TEXT = '#713f12';
const DAY_NAMES = ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];

const genId = () => { try { const uuid = crypto.randomUUID(); if (uuid) return uuid; } catch(e) {} return Math.random().toString(36).slice(2)+Date.now().toString(36)+Math.random().toString(36).slice(2); };
const genTeamId = (name) => { const s=(name||'').toLowerCase().replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss').replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'').substring(0,30); const sf=Date.now().toString(36); return s?`${s}-${sf}`:`team-${sf}`; };
const cleanAuftragsNr = (nr) => { if (!nr) return nr; return nr.replace(/\s*\/\s*SLI\s*/gi,'').trim(); };
const formatDate = (s) => { if (!s) return 'N/A'; const d=new Date(s); return isNaN(d.getTime())?'N/A':d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'}); };
const getWeekNumber = (d) => { d=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())); d.setUTCDate(d.getUTCDate()+4-(d.getUTCDay()||7)); const ys=new Date(Date.UTC(d.getUTCFullYear(),0,1)); return Math.ceil((((d-ys)/86400000)+1)/7); };
const getCalWeekDays = (base) => { const d=new Date(base); const day=d.getDay(); const diff=(day===0)?-6:1-day; const mon=new Date(d.getFullYear(),d.getMonth(),d.getDate()+diff); return Array.from({length:6},(_,i)=>new Date(mon.getFullYear(),mon.getMonth(),mon.getDate()+i)); };
const toLocalDateStr = (dateObj) => { const y=dateObj.getFullYear(),m=String(dateObj.getMonth()+1).padStart(2,'0'),d=String(dateObj.getDate()).padStart(2,'0'); return `${y}-${m}-${d}`; };
const daysBetween = (s,e) => { if(!s||!e) return 1; return Math.max(1,Math.round((new Date(e)-new Date(s))/86400000)+1); };
const addDaysToStr = (dateStr, n) => { const d = new Date(dateStr); d.setDate(d.getDate()+n); return toLocalDateStr(d); };
const parseCalTypes = (calType) => { if (!calType||calType==='montage') return ['montage']; if (calType==='both'||calType==='all') return ['montage','beplankung','ausflocken']; if (calType==='beplankung') return ['beplankung']; if (calType==='ausflocken') return ['ausflocken']; try { const arr=JSON.parse(calType); if(Array.isArray(arr)) return arr; } catch(e) {} return ['montage']; };

const getImages = (entry) => {
    if (Array.isArray(entry.images) && entry.images.length > 0) return entry.images;
    if (entry.image) return [entry.image];
    return [];
};

const Icon = memo(({ name, size=18, className="" }) => {
    const ref = useRef(null);
    useEffect(() => {
        if (window.lucide && ref.current) {
            ref.current.innerHTML='';
            const i=document.createElement('i'); i.setAttribute('data-lucide-name',name); ref.current.appendChild(i);
            window.lucide.createIcons({ attrs:{class:className,style:`width:${size}px;height:${size}px;`}, nameAttr:'data-lucide-name' });
        }
    },[name,className,size]);
    return <span ref={ref} className={`inline-flex items-center justify-center ${className}`}></span>;
});

// ============================================================
// PDF DOWNLOAD
// ============================================================
function downloadEntryPDF(entry) {
    return new Promise(resolve => {
        try {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
            const pageW=210, margin=15, contentW=pageW-margin*2;
            let y=margin;
            const setFont=(size,style='normal',color=[0,0,0])=>{doc.setFontSize(size);doc.setFont('helvetica',style);doc.setTextColor(color[0],color[1],color[2]);};
            const drawLine=(x1,y1,x2,y2,color=[0,0,0],w=0.5)=>{doc.setDrawColor(color[0],color[1],color[2]);doc.setLineWidth(w);doc.line(x1,y1,x2,y2);};
            const row=(label,value,yPos)=>{setFont(9,'bold',[80,80,80]);doc.text(label,margin,yPos);setFont(10,'normal',[0,0,0]);const lines=doc.splitTextToSize(String(value||'—'),contentW-38);doc.text(lines,margin+38,yPos);return yPos+(lines.length*5.5)+2;};

            doc.setFillColor(37,99,235); doc.rect(0,0,pageW,18,'F');
            setFont(13,'bold',[255,255,255]); doc.text('AUFTRAG',margin,12);
            setFont(9,'normal',[180,210,255]); doc.text('PE-MONTAGE',pageW-margin,12,{align:'right'});
            y=26;

            setFont(16,'bold',[0,0,0]);
            const customerLines=doc.splitTextToSize((entry.customer||'').toUpperCase(),contentW);
            doc.text(customerLines,margin,y); y+=customerLines.length*8+3;
            drawLine(margin,y,pageW-margin,y,[37,99,235],0.8); y+=6;

            const nr=cleanAuftragsNr(entry.auftragsNr);
            if(nr){setFont(9,'bold',[80,80,80]);doc.text('AUFTRAGSNR.',margin,y);setFont(11,'bold',[37,99,235]);doc.text(nr,margin+38,y);y+=8;}

            y=row('ADRESSE',entry.address,y);
            y=row('DATUM',formatDate(entry.deliveryDate)+(entry.endDate?' – '+formatDate(entry.endDate):''),y);
            if(entry.target>0) y=row('ELE',entry.target+' ELE',y);

            if(entry.isProv){
                y+=2;
                doc.setFillColor(254,249,195);doc.setDrawColor(234,179,8);doc.setLineWidth(0.5);
                doc.roundedRect(margin,y,contentW,10,2,2,'FD');
                setFont(10,'bold',[113,63,18]);doc.text('⚠  PROVISORISCH',margin+4,y+7);
                y+=15;
            }

            if(entry.memo){
                y+=2;
                drawLine(margin,y,pageW-margin,y,[200,200,200],0.3);y+=5;
                setFont(7,'bold',[120,80,0]);doc.text('MEMO',margin,y+4);y+=6;
                setFont(12,'bold',[0,0,0]);
                const memoLines=doc.splitTextToSize(entry.memo,contentW-4);
                const memoH=memoLines.length*6+6;
                doc.setFillColor(255,251,235);doc.setDrawColor(245,158,11);doc.setLineWidth(0.5);
                doc.roundedRect(margin,y-1,contentW,memoH,2,2,'FD');
                doc.setFillColor(245,158,11);doc.rect(margin,y-1,2,memoH,'F');
                doc.text(memoLines,margin+5,y+4);
                y+=memoH+5;
            }

            const addFooter = (pageNum, totalPages) => {
                doc.setPage(pageNum);
                doc.setFillColor(245,248,255);doc.rect(0,288,pageW,10,'F');
                setFont(7,'normal',[150,150,150]);
                doc.text('PE-MONTAGE Tourendisposition',margin,294);
                doc.text(`${new Date().toLocaleDateString('de-DE')} · Seite ${pageNum}/${totalPages}`,pageW-margin,294,{align:'right'});
            };

            const images = getImages(entry);

            if(images.length > 0){
                images.forEach((imgSrc, idx) => {
                    doc.addPage();
                    doc.setFillColor(37,99,235); doc.rect(0,0,pageW,14,'F');
                    setFont(10,'bold',[255,255,255]);
                    doc.text(`${(entry.customer||'').toUpperCase()} — FOTO ${idx+1} / ${images.length}`,margin,10);
                    setFont(8,'normal',[180,210,255]);
                    doc.text(`PE-MONTAGE`,pageW-margin,10,{align:'right'});
                    setFont(8,'normal',[100,100,100]);
                    const auftragsInfo = [cleanAuftragsNr(entry.auftragsNr),entry.address,formatDate(entry.deliveryDate)].filter(Boolean).join(' · ');
                    doc.text(auftragsInfo, margin, 20);
                    const photoY = 24; const photoH = 258; const photoW = contentW;
                    try {
                        let imgFormat = 'JPEG';
                        if(imgSrc.includes('image/png')) imgFormat = 'PNG';
                        else if(imgSrc.includes('image/gif')) imgFormat = 'GIF';
                        else if(imgSrc.includes('image/webp')) imgFormat = 'WEBP';
                        doc.addImage(imgSrc, imgFormat, margin, photoY, photoW, photoH, undefined, 'FAST');
                    } catch(imgErr) {
                        setFont(10,'normal',[200,50,50]);
                        doc.text('(Bild konnte nicht geladen werden)', margin, photoY+20);
                    }
                });
            }

            const totalPages = doc.internal.getNumberOfPages();
            for(let i=1;i<=totalPages;i++) addFooter(i, totalPages);

            const filename=`Auftrag_${(cleanAuftragsNr(entry.auftragsNr)||entry.customer||'export').replace(/[^a-zA-Z0-9]/g,'_')}.pdf`;
            doc.save(filename);
            resolve();
        } catch(err) { console.error('PDF Fehler:', err); resolve(); }
    });
}

function downloadMonteurBillingPDF(entries, teamName) {
    return new Promise(resolve => {

            const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'landscape' });
            const pageW=297, pageH=210, margin=12, contentW=pageW-margin*2;
            let y=margin;

            const setFont=(size,style='normal',color=[0,0,0])=>{doc.setFontSize(size);doc.setFont('helvetica',style);doc.setTextColor(color[0],color[1],color[2]);};
            const today=new Date().toLocaleDateString('de-DE');

            // Header
            doc.setFillColor(16,185,129); doc.rect(0,0,pageW,20,'F');
            setFont(14,'bold',[255,255,255]); doc.text('ABRECHNUNG — FERTIGMONTIERTE AUFTRÄGE',margin,13);
            setFont(9,'normal',[200,255,230]); doc.text(`Gruppe: ${teamName} · Erstellt: ${today} · ${entries.length} Aufträge`,pageW-margin,13,{align:'right'});
            y=28;

            // Table header
            doc.setFillColor(240,253,244); doc.rect(margin,y-4,contentW,8,'F');
            doc.setDrawColor(16,185,129); doc.setLineWidth(0.5); doc.line(margin,y+4,pageW-margin,y+4);
            setFont(7,'bold',[20,100,60]);
            const cols=[{x:margin,w:8,label:'#'},{x:margin+8,w:22,label:'DATUM'},{x:margin+30,w:55,label:'KUNDE'},{x:margin+85,w:38,label:'AUFTRAGSNR.'},{x:margin+123,w:65,label:'ADRESSE'},{x:margin+188,w:85,label:'MEMO'},{x:pageW-margin-20,w:20,label:'STATUS'}];
            cols.forEach(c=>doc.text(c.label,c.x,y));
            y+=8;

            entries.forEach((e,i)=>{
                if(y > pageH-20){
                    doc.addPage('a4','landscape');
                    y=margin+10;
                    doc.setFillColor(240,253,244); doc.rect(margin,y-4,contentW,8,'F');
                    setFont(7,'bold',[20,100,60]);
                    cols.forEach(c=>doc.text(c.label,c.x,y));
                    y+=8;
                }
                const rowH=8;
                if(i%2===0){doc.setFillColor(248,255,252);doc.rect(margin,y-4,contentW,rowH,'F');}
                setFont(7,'normal',[0,0,0]);
                doc.text(String(i+1),cols[0].x,y);
                doc.text(formatDate(e.deliveryDate),cols[1].x,y);

                const customerTxt=(e.customer||'').toUpperCase();
                const customerLines=doc.splitTextToSize(customerTxt,cols[2].w-2);
                setFont(7,'bold',[0,0,0]);
                doc.text(customerLines[0]||'',cols[2].x,y);
                setFont(7,'normal',[0,0,0]);

                const nr=cleanAuftragsNr(e.auftragsNr)||'—';
                doc.setTextColor(29,78,216);
                doc.text(nr,cols[3].x,y);
                doc.setTextColor(0,0,0);

                const addrLines=doc.splitTextToSize(e.address||'',cols[4].w-2);
                doc.text(addrLines[0]||'',cols[4].x,y);

                if(e.memo){
                    doc.setTextColor(146,64,14);
                    const memoLines=doc.splitTextToSize(e.memo,cols[5].w-2);
                    doc.text(memoLines[0]||'',cols[5].x,y);
                    doc.setTextColor(0,0,0);
                }

                doc.setTextColor(21,128,61); setFont(6,'bold',[21,128,61]);
                doc.text('✓ FERTIG',cols[6].x,y);
                doc.setTextColor(0,0,0);

                y+=rowH;
            });

            // Footer
            const totalPages=doc.internal.getNumberOfPages();
            for(let i=1;i<=totalPages;i++){
                doc.setPage(i);
                doc.setFillColor(240,253,244); doc.rect(0,pageH-10,pageW,10,'F');
                setFont(7,'normal',[100,150,120]);
                doc.text(`PE-MONTAGE · Monteur-Abrechnung · Gruppe: ${teamName}`,margin,pageH-3);

            const filename=`Monteur_Abrechnung_${teamName.replace(/[^a-zA-Z0-9]/g,'_')}_${today.replace(/\./g,'-')}.pdf`;
            doc.save(filename);
            resolve();
        } catch(err) { console.error('PDF Fehler:', err); resolve(); }
    });
}

// ============================================================
function MultiImageUpload({ images, onChange, maxImages=10 }) {
    const fileRef = useRef(null);

    const compressImage = (file) => new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const c = document.createElement('canvas');
                let w = img.width, h = img.height;
                const maxSize = 1400;
                if(w > maxSize || h > maxSize) {
                    if(w > h) { h = Math.round(h * maxSize/w); w = maxSize; }
                    else { w = Math.round(w * maxSize/h); h = maxSize; }
                }
                c.width = w; c.height = h;
                c.getContext('2d').drawImage(img, 0, 0, w, h);
                resolve(c.toDataURL('image/jpeg', 0.82));
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });

    const handleFiles = async (files) => {
        const fileArr = Array.from(files).slice(0, maxImages - images.length);
        if(fileArr.length === 0) return;
        const compressed = await Promise.all(fileArr.map(compressImage));
        onChange([...images, ...compressed]);
    };

    const removeImage = (idx) => { onChange(images.filter((_, i) => i !== idx)); };

    return (
        <div>
            <div style={{ color:'#94a3b8', fontSize:8, fontWeight:900, textTransform:'uppercase', letterSpacing:1, marginBottom:6, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                <span>📸 FOTOS ({images.length}/{maxImages})</span>
                {images.length > 0 && <span style={{ color:'#64748b', fontSize:8 }}>Je 1 Foto pro PDF-Seite</span>}
            </div>
            <input type="file" ref={fileRef} accept="image/*" multiple style={{ display:'none' }}
                onChange={e => { handleFiles(e.target.files); e.target.value=''; }}/>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:6 }}>
                {images.map((src, idx) => (
                    <div key={idx} className="img-thumb-wrap">
                        <img src={src} alt={`Foto ${idx+1}`}/>
                        <button className="img-thumb-del" onClick={() => removeImage(idx)} title="Foto entfernen">✕</button>
                        <div style={{ position:'absolute', bottom:2, left:2, background:'rgba(0,0,0,0.6)', borderRadius:3, padding:'1px 4px', fontSize:7, color:'#fff', fontWeight:900 }}>#{idx+1}</div>
                    </div>
                ))}
                {images.length < maxImages && (
                    <div className="img-thumb-add" onClick={() => fileRef.current?.click()}>
                        <span style={{ fontSize:18 }}>📷</span>
                        <span style={{ fontSize:7, color:'#64748b', fontWeight:700, textAlign:'center' }}>Foto{images.length > 0 ? ' hinzu' : ''}</span>
                    </div>
                )}
            </div>
            {images.length > 0 && (
                <div style={{ marginTop:6, display:'flex', justifyContent:'flex-end' }}>
                    <button onClick={() => { if(confirm('Alle Fotos entfernen?')) onChange([]); }}
                        style={{ background:'rgba(239,68,68,0.1)', border:'1px solid rgba(239,68,68,0.25)', borderRadius:6, padding:'3px 8px', color:'#ef4444', fontSize:8, fontWeight:900, cursor:'pointer' }}>
                        Alle entfernen
                    </button>
                </div>
            )}
        </div>
    );
}

function AIImportModal({ team, activeCalType, onClose, onDone }) {
    const [step, setStep] = useState('upload');
    const [imageData, setImageData] = useState(null);
    const [imageType, setImageType] = useState('image/png');
    const [preview, setPreview] = useState([]);
    const [selectedIds, setSelectedIds] = useState(new Set());
    const [error, setError] = useState('');
    const fileRef = useRef(null);

    const handleFile = async (file) => {
        if (!file) return;
        setError('');
        const isPDF = file.type === 'application/pdf' || file.name.endsWith('.pdf');
        const isImage = file.type.startsWith('image/');
        if (!isPDF && !isImage) { setError('Bitte PDF oder Bild hochladen.'); return; }
        const reader = new FileReader();
        reader.onload = (e) => { const b64 = e.target.result.split(',')[1]; setImageData(b64); setImageType(isPDF ? 'application/pdf' : file.type); setStep('ready'); };
        reader.readAsDataURL(file);
    };

    const analyze = async () => {
        if (!imageData) return;
        setStep('analyzing');
        try {
            const today = new Date().toISOString().split('T')[0];
            const systemPrompt = `Du bist ein Assistent der Kalendereinträge aus Bildern oder PDFs von Montage-Kalenern extrahiert.
Extrahiere ALLE Aufträge/Einträge aus dem Kalender-Bild.
Antworte NUR mit einem JSON-Array.`;

            let msgContent = [];
            if (imageType === 'application/pdf') {
                msgContent = [{ type:'document', source:{type:'base64',media_type:'application/pdf',data:imageData} }, { type:'text', text:`Extrahiere alle Kalendereinträge. Heute ist ${today}. Antworte NUR mit JSON-Array.` }];
            } else {
                msgContent = [{ type:'image', source:{type:'base64',media_type:imageType,data:imageData} }, { type:'text', text:`Extrahiere alle Kalendereinträge. Heute ist ${today}. Antworte NUR mit JSON-Array.` }];
            }

            const response = await fetch('https://api.anthropic.com/v1/messages', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:4000, system:systemPrompt, messages:[{role:'user',content:msgContent}] })
            });
            if (!response.ok) throw new Error(`API Fehler: ${response.status}`);
            const data = await response.json();
            const rawText = data.content?.filter(b=>b.type==='text').map(b=>b.text).join('');
            const clean = rawText.replace(/```json|```/g,'').trim();
            let entries = [];
            try { entries = JSON.parse(clean); } catch(e) { const match=rawText.match(/\[[\s\S]*\]/); if(match) entries=JSON.parse(match[0]); else throw new Error('Keine Einträge erkannt'); }
            if (!Array.isArray(entries)||entries.length===0) throw new Error('Keine Aufträge gefunden');
            entries = entries.map(e=>({...e,calType:activeCalType,isDone:false,isBilled:false}));
            setPreview(entries); setSelectedIds(new Set(entries.map((_,i)=>i))); setStep('preview');
        } catch(err) { setError('Fehler: '+err.message); setStep('ready'); }
    };

    const doImport = async () => {
        setStep('saving');
        const toImport = preview.filter((_,i)=>selectedIds.has(i));
        try {
            const{db,doc,setDoc}=window.FirebaseSDK;
            for(const e of toImport){ const id=`cal-${genId()}`; const isMultiDay=!!(e.endDate&&e.endDate>e.deliveryDate); await setDoc(doc(db,`teams_cal_${team.id}`,id),{id,createdAt:new Date().toISOString(),isDone:false,isBilled:false,entryType:e.entryType||'LIEFERUNG',customer:e.customer||'',address:e.address||'',memo:e.memo||'',auftragsNr:cleanAuftragsNr(e.auftragsNr||''),target:parseInt(e.target)||0,images:[],image:null,deliveryDate:e.deliveryDate||'',endDate:e.endDate||null,isMultiDay,calType:e.calType||activeCalType,isProv:!!e.isProv,customStartLabel:e.customStartLabel||''}); }
            onDone(toImport.length);
        } catch(err) { setError('Speicherfehler: '+err.message); setStep('preview'); }
    };

    const toggleSelect=(i)=>setSelectedIds(prev=>{const n=new Set(prev);n.has(i)?n.delete(i):n.add(i);return n;});
    const toggleAll=()=>{if(selectedIds.size===preview.length)setSelectedIds(new Set());else setSelectedIds(new Set(preview.map((_,i)=>i)));};

    return (
        <div className="ai-import-overlay" style={{padding:16}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                <div><div style={{color:'#60a5fa',fontSize:11,fontWeight:900,textTransform:'uppercase',letterSpacing:1}}>🤖 KI-IMPORT — {team.name}</div></div>
                <button onClick={onClose} style={{background:'#334155',border:'none',borderRadius:8,width:32,height:32,cursor:'pointer',color:'#94a3b8',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
            </div>
            {(step==='upload'||step==='ready')&&(
                <div style={{flex:1,display:'flex',flexDirection:'column',gap:16}}>
                    <input type="file" ref={fileRef} accept="image/*,application/pdf" style={{display:'none'}} onChange={e=>handleFile(e.target.files[0])}/>
                    <div onClick={()=>fileRef.current?.click()} style={{flex:1,border:`2px dashed ${imageData?'#10b981':'#334155'}`,borderRadius:16,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12,cursor:'pointer',padding:32,background:imageData?'rgba(16,185,129,0.05)':'#0f172a',minHeight:200}}
                        onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();handleFile(e.dataTransfer.files[0]);}}>
                        {imageData?(<><div style={{fontSize:48}}>✅</div><div style={{color:'#10b981',fontSize:13,fontWeight:900}}>Datei geladen!</div></>):(<><div style={{fontSize:48}}>📎</div><div style={{color:'#fff',fontSize:13,fontWeight:900}}>PDF oder Foto hier ablegen</div></>)}
                    </div>
                    {error&&<div style={{background:'rgba(239,68,68,0.1)',border:'1px solid #ef4444',borderRadius:8,padding:'10px 14px',color:'#ef4444',fontSize:11}}>{error}</div>}
                    <div style={{display:'flex',gap:12}}>
                        <button onClick={onClose} style={{flex:1,padding:'13px',background:'transparent',border:'1px solid #334155',borderRadius:12,color:'#64748b',fontWeight:900,fontSize:10,textTransform:'uppercase',cursor:'pointer'}}>Abbrechen</button>
                        <button onClick={analyze} disabled={!imageData} style={{flex:2,padding:'13px',background:imageData?'#6366f1':'#1e293b',border:'none',borderRadius:12,color:imageData?'#fff':'#475573',fontWeight:900,fontSize:10,textTransform:'uppercase',cursor:imageData?'pointer':'not-allowed'}}>🤖 KI Analyse starten</button>
                    </div>
                </div>
            )}
            {step==='analyzing'&&(<div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:24}}><div className="ai-loading-spinner"></div><div style={{color:'#60a5fa',fontSize:14,fontWeight:900}}>KI analysiert Kalender...</div></div>)}
            {step==='preview'&&(
                <div style={{flex:1,display:'flex',flexDirection:'column',gap:12,minHeight:0}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                        <div style={{color:'#10b981',fontSize:11,fontWeight:900}}>✓ {preview.length} Aufträge erkannt</div>

                    </div>
                    <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:6}}>
                        {preview.map((e,i)=>(<div key={i} onClick={()=>toggleSelect(i)} style={{background:selectedIds.has(i)?'rgba(99,102,241,0.12)':'rgba(255,255,255,0.04)',border:selectedIds.has(i)?'1px solid rgba(99,102,241,0.4)':'1px solid rgba(255,255,255,0.07)',borderRadius:10,padding:'10px 14px',cursor:'pointer',display:'flex',gap:12,alignItems:'flex-start'}}>
                            <div style={{width:20,height:20,borderRadius:6,border:`2px solid ${selectedIds.has(i)?'#6366f1':'rgba(255,255,255,0.15)'}`,background:selectedIds.has(i)?'#6366f1':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:2}}>{selectedIds.has(i)&&<span style={{color:'#fff',fontSize:11}}>✓</span>}</div>
                            <div style={{flex:1}}><div style={{color:'#fff',fontSize:11,fontWeight:900,textTransform:'uppercase'}}>{e.customer}</div><div style={{color:'#94a3b8',fontSize:9,marginTop:2}}>{e.address}</div><div style={{color:'#60a5fa',fontSize:9,marginTop:2}}>{formatDate(e.deliveryDate)}</div></div>
                        </div>))}
                    </div>
                    {error&&<div style={{background:'rgba(239,68,68,0.1)',border:'1px solid #ef4444',borderRadius:8,padding:'10px 14px',color:'#ef4444',fontSize:11}}>{error}</div>}
                    <div style={{display:'flex',gap:12}}>
                        <button onClick={()=>{setStep('ready');setPreview([]);}} style={{flex:1,padding:'13px',background:'transparent',border:'1px solid #334155',borderRadius:12,color:'#64748b',fontWeight:900,fontSize:10,textTransform:'uppercase',cursor:'pointer'}}>Zurück</button>
                        <button onClick={doImport} disabled={selectedIds.size===0} style={{flex:2,padding:'13px',background:selectedIds.size>0?'#10b981':'#1e293b',border:'none',borderRadius:12,color:selectedIds.size>0?'#fff':'#475573',fontWeight:900,fontSize:10,textTransform:'uppercase',cursor:selectedIds.size>0?'pointer':'not-allowed'}}>✓ {selectedIds.size} Aufträge importieren</button>
                    </div>
                </div>
            )}
            {step==='saving'&&(<div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16}}><div className="ai-loading-spinner"></div><div style={{color:'#10b981',fontSize:13,fontWeight:900}}>Speichern...</div></div>)}
        </div>
    );
}

                ))}
            </div>
        </div>
    );
}

// ============================================================
// MONTEUR BILLING MODAL — Eigene Abrechnung für Monteure
// Unabhängig vom Admin — speichert in teams_cal_{teamId} als
// monteurBilled / monteurBilledAt Felder
// ============================================================
function MonteurBillingModal({ team, onClose }) {
    const [entries, setEntries] = useState([]);
    const [selectedIds, setSelectedIds] = useState(new Set());
    const [exporting, setExporting] = useState(false);
    const [successCount, setSuccessCount] = useState(null);

    useEffect(()=>{
        const{db,collection,onSnapshot}=window.FirebaseSDK;
        return onSnapshot(collection(db,`teams_cal_${team.id}`),(snap)=>{
            setEntries(snap.docs.map(d=>({id:d.id,...d.data()})));
        });
    },[team.id]);

    // Aufträge die als erledigt markiert sind (vom Monteur oder Admin)
    const doneEntries = useMemo(()=>entries.filter(e=>e.isDone&&!e.monteurBilled).sort((a,b)=>a.deliveryDate>b.deliveryDate?-1:1),[entries]);
    const billedEntries = useMemo(()=>entries.filter(e=>e.monteurBilled).sort((a,b)=>(b.monteurBilledAt||'')>(a.monteurBilledAt||'')?1:-1),[entries]);

    const toggleSelect=(id)=>setSelectedIds(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;});
    const selectAll=()=>{if(selectedIds.size===doneEntries.length)setSelectedIds(new Set());else setSelectedIds(new Set(doneEntries.map(e=>e.id)));};

    const markMonteurBilled = async () => {
        const toMark = doneEntries.filter(e=>selectedIds.has(e.id));
        if(toMark.length===0) return;
        const{db,doc,updateDoc}=window.FirebaseSDK;
        for(const e of toMark){
            await updateDoc(doc(db,`teams_cal_${team.id}`,e.id),{
                monteurBilled:true,
                monteurBilledAt:new Date().toISOString()
            });
        }
        setSuccessCount(toMark.length);
        setSelectedIds(new Set());
    };

    const unmarkMonteurBilled = async (e) => {
        const{db,doc,updateDoc}=window.FirebaseSDK;
        await updateDoc(doc(db,`teams_cal_${team.id}`,e.id),{
            monteurBilled:false,
            monteurBilledAt:null
        });
    };

    const handlePDFExport = async () => {
        const toExport = selectedIds.size > 0 ? doneEntries.filter(e=>selectedIds.has(e.id)) : doneEntries;
        if(toExport.length===0){alert('Keine Aufträge zum Exportieren.');return;}
        setExporting(true);
        await downloadMonteurBillingPDF(toExport, team.name);
        setExporting(false);
    };

    const handleBilledPDFExport = async () => {
        if(billedEntries.length===0){alert('Keine abgerechneten Aufträge.');return;}
        setExporting(true);
        await downloadMonteurBillingPDF(billedEntries, team.name + ' (Abgerechnet)');
        setExporting(false);
    };

    if(successCount !== null) {
        return (
            <div className="monteur-billing-overlay" style={{alignItems:'center',justifyContent:'center',padding:32}}>
                <div style={{textAlign:'center',display:'flex',flexDirection:'column',alignItems:'center',gap:20}}>
                    <div style={{width:80,height:80,background:'rgba(16,185,129,0.2)',border:'2px solid #10b981',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:40}}>✓</div>
                    <div>
                        <div style={{color:'#10b981',fontSize:42,fontWeight:900,lineHeight:1}}>{successCount}</div>
                        <div style={{color:'#fff',fontSize:14,fontWeight:900,marginTop:6,textTransform:'uppercase'}}>Aufträge abgerechnet</div>
                        <div style={{color:'#64748b',fontSize:11,marginTop:8}}>Diese Aufträge wurden als abgerechnet markiert</div>
                    </div>
                    <div style={{display:'flex',gap:12,width:'100%',maxWidth:300}}>
                        <button onClick={()=>setSuccessCount(null)} style={{flex:1,padding:'14px',background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:12,color:'#94a3b8',fontWeight:900,fontSize:10,textTransform:'uppercase',cursor:'pointer'}}>Weiter</button>
                        <button onClick={onClose} style={{flex:1,padding:'14px',background:'#10b981',border:'none',borderRadius:12,color:'#fff',fontWeight:900,fontSize:10,textTransform:'uppercase',cursor:'pointer'}}>Schliessen</button>
                    </div>
                </div>
            </div>
        );
    }

    return (
        <div className="monteur-billing-overlay">
            {/* Header */}
            <div className="monteur-billing-header">
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
                    <div>
                        <div style={{color:'#10b981',fontSize:9,fontWeight:900,textTransform:'uppercase',letterSpacing:2,marginBottom:4}}>MEINE ABRECHNUNG</div>
                        <h2 style={{color:'#fff',fontSize:20,fontWeight:900,textTransform:'uppercase',margin:'0 0 4px'}}>FERTIG MONTIERT</h2>
                        <div style={{display:'flex',alignItems:'center',gap:6}}>
                            <div style={{width:8,height:8,borderRadius:'50%',background:team.color||'#10b981'}}></div>
                            <span style={{color:'#94a3b8',fontSize:11,fontWeight:700}}>{team.name}</span>
                        </div>
                    </div>
                    <button onClick={onClose} style={{background:'rgba(255,255,255,0.08)',border:'none',borderRadius:10,width:36,height:36,cursor:'pointer',color:'#94a3b8',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
                </div>

                {/* Stats */}
                <div style={{display:'flex',gap:10,marginBottom:12}}>
                    <div className="monteur-stat-box">
                        <div style={{color:'#10b981',fontSize:22,fontWeight:900,lineHeight:1}}>{doneEntries.length}</div>
                        <div style={{color:'#64748b',fontSize:8,fontWeight:900,textTransform:'uppercase',letterSpacing:1}}>Offen</div>
                    </div>
                    <div className="monteur-stat-box">
                        <div style={{color:'#a855f7',fontSize:22,fontWeight:900,lineHeight:1}}>{billedEntries.length}</div>
                        <div style={{color:'#64748b',fontSize:8,fontWeight:900,textTransform:'uppercase',letterSpacing:1}}>Abgerechnet</div>
                    </div>
                    <div className="monteur-stat-box">
                        <div style={{color:'#f59e0b',fontSize:22,fontWeight:900,lineHeight:1}}>{entries.filter(e=>e.isDone).length}</div>
                        <div style={{color:'#64748b',fontSize:8,fontWeight:900,textTransform:'uppercase',letterSpacing:1}}>Total Erledigt</div>
                    </div>
                </div>

                {/* Actions */}
                <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                    {doneEntries.length > 0 && (
                        <button onClick={selectAll} style={{background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.12)',borderRadius:8,padding:'7px 14px',color:'#cbd5e1',fontSize:9,fontWeight:900,textTransform:'uppercase',cursor:'pointer'}}>
                            {selectedIds.size===doneEntries.length?'Alle abwählen':'Alle wählen'} ({doneEntries.length})
                        </button>
                    )}
                    {selectedIds.size > 0 && (
                        <button onClick={markMonteurBilled} style={{background:'#10b981',border:'none',borderRadius:8,padding:'7px 16px',color:'#fff',fontSize:9,fontWeight:900,textTransform:'uppercase',cursor:'pointer',display:'flex',alignItems:'center',gap:6}}>
                            ✓ Als abgerechnet markieren ({selectedIds.size})
                        </button>
                    )}
                    <button onClick={handlePDFExport} disabled={exporting} style={{background:'rgba(16,185,129,0.15)',border:'1px solid rgba(16,185,129,0.3)',borderRadius:8,padding:'7px 14px',color:'#10b981',fontSize:9,fontWeight:900,textTransform:'uppercase',cursor:'pointer',display:'flex',alignItems:'center',gap:6,opacity:exporting?0.5:1}}>
                        <Icon name="download" size={12}/>{exporting?'Exportiere...':'PDF Export (Offen)'}
                    </button>
                    {billedEntries.length > 0 && (
                        <button onClick={handleBilledPDFExport} disabled={exporting} style={{background:'rgba(168,85,247,0.15)',border:'1px solid rgba(168,85,247,0.3)',borderRadius:8,padding:'7px 14px',color:'#a855f7',fontSize:9,fontWeight:900,textTransform:'uppercase',cursor:'pointer',display:'flex',alignItems:'center',gap:6,opacity:exporting?0.5:1}}>
                            <Icon name="download" size={12}/>PDF Abgerechnet
                        </button>
                    )}
                </div>
            </div>

            {/* Body */}
            <div className="monteur-billing-body">
                {doneEntries.length === 0 && billedEntries.length === 0 && (
                    <div style={{textAlign:'center',padding:60,color:'#475569'}}>
                        <div style={{fontSize:48,marginBottom:12}}>📋</div>
                        <div style={{fontSize:14,fontWeight:900,color:'#64748b'}}>Keine erledigten Aufträge</div>
                        <div style={{fontSize:11,marginTop:8,color:'#334155',lineHeight:1.6}}>Aufträge im Kalender als „Erledigt" markieren,<br/>um sie hier in der Abrechnung zu sehen.</div>
                    </div>
                )}

                {/* Offene Abrechnungen */}
                {doneEntries.length > 0 && (
                    <div>
                        <div style={{color:'#10b981',fontSize:9,fontWeight:900,textTransform:'uppercase',letterSpacing:2,marginBottom:10,display:'flex',alignItems:'center',gap:8}}>
                            <div style={{width:6,height:6,borderRadius:'50%',background:'#10b981'}}></div>
                            Fertig — Noch nicht abgerechnet
                        </div>
                        <div style={{display:'flex',flexDirection:'column',gap:8}}>
                            {doneEntries.map(e=>(
                                <div key={e.id}
                                    className={`monteur-entry-card ${selectedIds.has(e.id)?'selected':''}`}
                                    onClick={()=>toggleSelect(e.id)}>
                                    <div style={{display:'flex',alignItems:'flex-start',gap:12}}>
                                        {/* Checkbox */}
                                        <div style={{width:22,height:22,borderRadius:6,border:`2px solid ${selectedIds.has(e.id)?'#10b981':'rgba(255,255,255,0.2)'}`,background:selectedIds.has(e.id)?'#10b981':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:2,transition:'all 0.15s'}}>
                                            {selectedIds.has(e.id)&&<span style={{color:'#fff',fontSize:13,fontWeight:900,lineHeight:1}}>✓</span>}
                                        </div>
                                        <div style={{flex:1,minWidth:0}}>
                                            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4,flexWrap:'wrap'}}>
                                                <span style={{color:'#fff',fontSize:13,fontWeight:900,textTransform:'uppercase'}}>{e.customer}</span>
                                                <span style={{background:'rgba(16,185,129,0.15)',color:'#10b981',fontSize:8,fontWeight:900,borderRadius:4,padding:'1px 6px'}}>✓ ERLEDIGT</span>
                                                {e.isProv&&<span style={{background:'rgba(234,179,8,0.2)',color:'#eab308',fontSize:8,fontWeight:900,borderRadius:4,padding:'1px 6px'}}>⚠ PROV</span>}
                                            </div>
                                            <div style={{color:'#64748b',fontSize:10,marginBottom:e.auftragsNr?4:0}}>{e.address}</div>
                                            <div style={{display:'flex',gap:12,flexWrap:'wrap',alignItems:'center'}}>
                                                <span style={{color:'#475569',fontSize:9}}>{formatDate(e.deliveryDate)}</span>
                                                {e.auftragsNr&&(
                                                    <span style={{background:'rgba(59,130,246,0.12)',border:'1px solid rgba(59,130,246,0.2)',borderRadius:5,padding:'1px 7px',color:'#60a5fa',fontSize:9,fontWeight:900,fontFamily:'monospace'}}>#{cleanAuftragsNr(e.auftragsNr)}</span>
                                                )}
                                            </div>
                                            {e.memo&&(
                                                <div style={{display:'flex',alignItems:'flex-start',gap:6,background:'rgba(245,158,11,0.08)',border:'1px solid rgba(245,158,11,0.2)',borderLeft:'3px solid #f59e0b',borderRadius:'0 6px 6px 0',padding:'5px 8px',marginTop:6}}>
                                                    <span style={{fontSize:10}}>📝</span>
                                                    <span style={{color:'#fbbf24',fontSize:10,fontWeight:700,lineHeight:1.4}}>{e.memo}</span>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                )}

                {/* Abgerechnete Aufträge */}
                {billedEntries.length > 0 && (
                    <div style={{marginTop:doneEntries.length>0?16:0}}>
                        <div style={{color:'#a855f7',fontSize:9,fontWeight:900,textTransform:'uppercase',letterSpacing:2,marginBottom:10,display:'flex',alignItems:'center',gap:8}}>
                            <div style={{flex:1,height:1,background:'rgba(168,85,247,0.2)'}}></div>
                            <span>✓ Bereits Abgerechnet ({billedEntries.length})</span>
                            <div style={{flex:1,height:1,background:'rgba(168,85,247,0.2)'}}></div>
                        </div>
                        <div style={{display:'flex',flexDirection:'column',gap:6}}>
                            {billedEntries.map(e=>(
                                <div key={e.id} className="monteur-entry-card billed"
                                    style={{borderLeft:`3px solid rgba(168,85,247,0.4)`}}
                                    onClick={()=>{if(confirm(`"${e.customer}" wieder als nicht abgerechnet markieren?`))unmarkMonteurBilled(e);}}>
                                    <div style={{display:'flex',alignItems:'center',gap:12}}>
                                        <div style={{width:22,height:22,borderRadius:6,background:'rgba(168,85,247,0.2)',border:'2px solid rgba(168,85,247,0.4)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                                            <span style={{color:'#a855f7',fontSize:13,fontWeight:900,lineHeight:1}}>✓</span>
                                        </div>
                                        <div style={{flex:1,minWidth:0}}>
                                            <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:2}}>
                                                <span style={{color:'#cbd5e1',fontSize:12,fontWeight:900,textTransform:'uppercase'}}>{e.customer}</span>
                                                <span style={{background:'rgba(168,85,247,0.15)',color:'#a855f7',fontSize:8,fontWeight:900,borderRadius:4,padding:'1px 6px'}}>✓ ABGERECHNET</span>
                                                {e.auftragsNr&&<span style={{color:'#475569',fontSize:9,fontFamily:'monospace'}}>#{cleanAuftragsNr(e.auftragsNr)}</span>}
                                            </div>
                                            <div style={{color:'#475569',fontSize:9}}>{formatDate(e.deliveryDate)} · {e.address}</div>
                                            {e.memo&&<div style={{color:'#78350f',fontSize:9,fontWeight:700,marginTop:3}}>📝 {e.memo}</div>}
                                            {e.monteurBilledAt&&<div style={{color:'#334155',fontSize:8,marginTop:2}}>Abgerechnet: {formatDate(e.monteurBilledAt)}</div>}
                                        </div>
                                        <span style={{color:'#334155',fontSize:8,flexShrink:0}}>Klick = Rückbuchen</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                )}
            </div>
        </div>
    );
}
