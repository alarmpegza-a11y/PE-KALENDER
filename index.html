                            {types.includes('montage')&&<button onClick={()=>onSelectTeam(t,'montage')} style={{flex:1,minWidth:80,background:'linear-gradient(135deg,#dbeafe,#eff6ff)',border:'1px solid #93c5fd',borderRadius:10,padding:'8px',color:'#1d4ed8',fontSize:9,fontWeight:800,textTransform:'uppercase',cursor:'pointer'}}>🔧 Montage ↗</button>}
                            {types.includes('beplankung')&&<button onClick={()=>onSelectTeam(t,'beplankung')} style={{flex:1,minWidth:80,background:'linear-gradient(135deg,#d1fae5,#ecfdf5)',border:'1px solid #6ee7b7',borderRadius:10,padding:'8px',color:'#065f46',fontSize:9,fontWeight:800,textTransform:'uppercase',cursor:'pointer'}}>🏗 Beplankung ↗</button>}
                            {types.includes('ausflocken')&&<button onClick={()=>onSelectTeam(t,'ausflocken')} style={{flex:1,minWidth:80,background:'linear-gradient(135deg,#fef3c7,#fffbeb)',border:'1px solid #fcd34d',borderRadius:10,padding:'8px',color:'#92400e',fontSize:9,fontWeight:800,textTransform:'uppercase',cursor:'pointer'}}>❄️ Ausflocken ↗</button>}
                        </div>
                    </div>);})}
                    <div onClick={()=>setIsAdding(true)} style={{border:'2px dashed #cbd5e1',borderRadius:20,padding:24,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12,cursor:'pointer',minHeight:200,background:'rgba(255,255,255,0.4)'}} onMouseEnter={e=>{e.currentTarget.style.borderColor='#3b82f6';}} onMouseLeave={e=>{e.currentTarget.style.borderColor='#cbd5e1';}}>
                        <div style={{width:52,height:52,background:'#f1f5f9',borderRadius:16,display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name="plus" size={24} style={{color:'#3b82f6'}}/></div>
                        <div style={{color:'#94a3b8',fontSize:12,fontWeight:700}}>Neue Gruppe erstellen</div>
                    </div>
                </div>
            </div>

            {showBilling&&<BillingModal teams={teams} onClose={()=>setShowBilling(false)}/>}

            {editTeam&&(<div style={{position:'fixed',inset:0,zIndex:50,background:'rgba(15,23,42,0.6)',backdropFilter:'blur(8px)',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
                <div style={{background:'#fff',borderRadius:24,padding:32,width:'100%',maxWidth:420,boxShadow:'0 40px 80px rgba(0,0,0,0.2)'}}>
                    <h3 style={{color:'#1e293b',fontSize:16,fontWeight:900,margin:'0 0 24px 0'}}>Gruppe bearbeiten</h3>
                    <div style={{display:'flex',flexDirection:'column',gap:14}}>
                        {[['name','Gruppen Name'],['pin','PIN (4 Ziffern)']].map(([field,label])=>(<div key={field}><div style={{color:'#64748b',fontSize:9,fontWeight:800,textTransform:'uppercase',letterSpacing:1,marginBottom:6}}>{label}</div><input maxLength={field==='pin'?4:undefined} value={editTeam[field]} onChange={e=>setEditTeam({...editTeam,[field]:e.target.value})} style={{width:'100%',background:'#f8fafc',border:'1.5px solid #e2e8f0',borderRadius:12,padding:'12px',color:'#1e293b',fontSize:13,boxSizing:'border-box',outline:'none'}}/></div>))}
                        <div><div style={{color:'#64748b',fontSize:9,fontWeight:800,textTransform:'uppercase',letterSpacing:1,marginBottom:6}}>Farbe</div><input type="color" value={editTeam.color} onChange={e=>setEditTeam({...editTeam,color:e.target.value})} style={{width:'100%',height:48,background:'transparent',border:'none',cursor:'pointer',borderRadius:8}}/></div>
                        <div><div style={{color:'#64748b',fontSize:9,fontWeight:800,textTransform:'uppercase',letterSpacing:1,marginBottom:8}}>Kalender-Typen</div><div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{CAL_TYPE_OPTIONS.map(opt=>{const currentTypes=editTeam.calTypes||parseCalTypes(editTeam.calType);const active=currentTypes.includes(opt.key);return(<button key={opt.key} onClick={()=>{const ct=editTeam.calTypes||parseCalTypes(editTeam.calType);setEditTeam({...editTeam,calTypes:toggleCalType(ct,opt.key)});}} style={{flex:1,minWidth:90,padding:'10px 6px',borderRadius:12,border:active?'none':`2px solid ${opt.border}`,fontSize:10,fontWeight:800,textTransform:'uppercase',cursor:'pointer',background:active?opt.color:'#f8fafc',color:active?'#fff':opt.color}}>{opt.label}</button>);})}</div></div>
                    </div>
                    <div style={{display:'flex',gap:12,marginTop:24}}><button onClick={()=>setEditTeam(null)} style={{flex:1,padding:'13px',background:'#f1f5f9',border:'none',borderRadius:12,color:'#64748b',fontWeight:800,fontSize:11,cursor:'pointer'}}>Abbrechen</button><button onClick={handleSaveEditTeam} style={{flex:1,padding:'13px',background:'linear-gradient(135deg,#3b82f6,#6366f1)',border:'none',borderRadius:12,color:'#fff',fontWeight:800,fontSize:11,cursor:'pointer'}}>Speichern</button></div>
                </div>
            </div>)}

            {deleteConfirm&&(<div style={{position:'fixed',inset:0,zIndex:100,background:'rgba(15,23,42,0.7)',backdropFilter:'blur(8px)',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
                <div style={{background:'#fff',border:'2px solid #fee2e2',borderRadius:24,padding:32,width:'100%',maxWidth:360,boxShadow:'0 40px 80px rgba(239,68,68,0.2)'}}>
                    <h3 style={{color:'#1e293b',fontSize:16,fontWeight:900,textAlign:'center',margin:'0 0 8px 0'}}>Gruppe löschen?</h3>
                    <p style={{color:'#64748b',textAlign:'center',fontSize:12,margin:'0 0 20px 0'}}>Code <strong style={{color:'#ef4444'}}>8852</strong> eingeben</p>
                    <input type="password" placeholder="Admin-Code" style={{width:'100%',background:'#f8fafc',border:'1.5px solid #fecaca',borderRadius:12,padding:'14px',textAlign:'center',fontSize:18,fontWeight:900,letterSpacing:4,color:'#ef4444',outline:'none',boxSizing:'border-box',marginBottom:20}} value={deleteCodeInput} onChange={e=>setDeleteCodeInput(e.target.value)}/>
                    <div style={{display:'flex',gap:12}}><button onClick={()=>{setDeleteConfirm(null);setDeleteCodeInput('');}} style={{flex:1,padding:'12px',background:'#f1f5f9',border:'none',borderRadius:12,color:'#64748b',fontWeight:800,fontSize:11,cursor:'pointer'}}>Abbrechen</button><button onClick={confirmDelete} style={{flex:1,padding:'12px',background:'#ef4444',border:'none',borderRadius:12,color:'#fff',fontWeight:800,fontSize:11,cursor:'pointer'}}>Löschen</button></div>
                </div>
            </div>)}

            {isAdding&&(<div style={{position:'fixed',inset:0,zIndex:50,background:'rgba(15,23,42,0.6)',backdropFilter:'blur(8px)',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
                <div style={{background:'#fff',borderRadius:24,padding:32,width:'100%',maxWidth:420,boxShadow:'0 40px 80px rgba(0,0,0,0.2)'}}>
                    <h3 style={{color:'#1e293b',fontSize:16,fontWeight:900,margin:'0 0 24px 0'}}>Neue Gruppe erstellen</h3>
                    <div style={{display:'flex',flexDirection:'column',gap:14}}>
                        <div><div style={{color:'#64748b',fontSize:9,fontWeight:800,textTransform:'uppercase',letterSpacing:1,marginBottom:6}}>Team Name</div><input placeholder="z.B. Zürich / Montage A" value={newTeam.name} onChange={e=>setNewTeam({...newTeam,name:e.target.value})} style={{width:'100%',background:'#f8fafc',border:'1.5px solid #e2e8f0',borderRadius:12,padding:'12px',color:'#1e293b',fontSize:13,boxSizing:'border-box',outline:'none'}}/></div>
                        <div><div style={{color:'#64748b',fontSize:9,fontWeight:800,textTransform:'uppercase',letterSpacing:1,marginBottom:6}}>PIN (4 Ziffern)</div><input placeholder="z.B. 1234" maxLength={4} inputMode="numeric" pattern="[0-9]*" value={newTeam.pin} onChange={e=>setNewTeam({...newTeam,pin:e.target.value.replace(/\D/g,'')})} style={{width:'100%',background:'#f8fafc',border:'1.5px solid #e2e8f0',borderRadius:12,padding:'12px',color:'#1e293b',fontSize:13,boxSizing:'border-box',outline:'none',letterSpacing:4,fontWeight:700}}/></div>
                        <div><div style={{color:'#64748b',fontSize:9,fontWeight:800,textTransform:'uppercase',letterSpacing:1,marginBottom:6}}>Farbe</div><input type="color" value={newTeam.color} onChange={e=>setNewTeam({...newTeam,color:e.target.value})} style={{width:'100%',height:48,background:'transparent',border:'none',cursor:'pointer'}}/></div>
                        <div><div style={{color:'#64748b',fontSize:9,fontWeight:800,textTransform:'uppercase',letterSpacing:1,marginBottom:8}}>Kalender-Typen</div><div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{CAL_TYPE_OPTIONS.map(opt=>{const active=newTeam.calTypes.includes(opt.key);return(<button key={opt.key} onClick={()=>setNewTeam({...newTeam,calTypes:toggleCalType(newTeam.calTypes,opt.key)})} style={{flex:1,minWidth:90,padding:'10px 6px',borderRadius:12,border:active?'none':`2px solid ${opt.border}`,fontSize:10,fontWeight:800,textTransform:'uppercase',cursor:'pointer',background:active?opt.color:'#f8fafc',color:active?'#fff':opt.color}}>{opt.label}</button>);})}</div></div>
                    </div>
                    <div style={{display:'flex',gap:12,marginTop:24}}><button onClick={()=>{setIsAdding(false);setNewTeam({name:'',pin:'',color:'#3b82f6',calTypes:['montage']});}} disabled={isSaving} style={{flex:1,padding:'13px',background:'#f1f5f9',border:'none',borderRadius:12,color:'#64748b',fontWeight:800,fontSize:11,cursor:'pointer'}}>Abbrechen</button><button onClick={handleAddTeam} disabled={isSaving||!newTeam.name.trim()||newTeam.pin.length!==4} style={{flex:1,padding:'13px',background:isSaving||!newTeam.name.trim()||newTeam.pin.length!==4?'#94a3b8':'linear-gradient(135deg,#3b82f6,#6366f1)',border:'none',borderRadius:12,color:'#fff',fontWeight:800,fontSize:11,cursor:isSaving||!newTeam.name.trim()||newTeam.pin.length!==4?'not-allowed':'pointer'}}>{isSaving?'⏳ Speichern...':'Erstellen'}</button></div>
                </div>
            </div>)}
        </div>
    );
}

// ============================================================
// APP ROOT
// ============================================================
function App() {
    const [authState, setAuthState] = useState(null);
    const [teams, setTeams] = useState([]);
    const [ready, setReady] = useState(false);

    useEffect(()=>{const init=()=>{if(!window.FirebaseSDK){setTimeout(init,100);return;}const{db,collection,onSnapshot}=window.FirebaseSDK;onSnapshot(collection(db,'teams_config'),snap=>{setTeams(snap.docs.map(d=>({...d.data()})));setReady(true);},err=>{console.error(err);setReady(true);});};init();},[]);

    if(!ready)return(<div style={{minHeight:'100vh',background:'#030712',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16}}><div style={{color:'#6366f1',fontWeight:900,textTransform:'uppercase',letterSpacing:'0.2em',fontSize:13}}>LADE SYSTEM...</div></div>);
    if(!authState)return <LoginScreen teams={teams} onLogin={(role,team)=>setAuthState({role,team})}/>;

    if(authState.role==='admin'){
        if(authState.showStandby)return <StandbyView onBack={()=>setAuthState({...authState,showStandby:false})}/>;
        if(authState.showSearch)return <GlobalSearchModal teams={teams} onClose={()=>setAuthState({...authState,showSearch:false})} onNavigate={(entry,team)=>{setAuthState({...authState,showSearch:false,adminViewingTeam:team,adminCalType:entry.calType||'montage',scrollToEntry:entry});}}/>;
        if(authState.adminViewingTeam)return <CalendarView team={authState.adminViewingTeam} isAdminAccess={true} activeCalType={authState.adminCalType||'montage'} scrollToEntry={authState.scrollToEntry||null} onBack={()=>setAuthState({...authState,adminViewingTeam:null,adminCalType:null,scrollToEntry:null})}/>;
        return <AdminPanel teams={teams} onLogout={()=>setAuthState(null)} onSelectTeam={(team,calType)=>setAuthState({...authState,adminViewingTeam:team,adminCalType:calType,scrollToEntry:null})} onOpenStandby={()=>setAuthState({...authState,showStandby:true})} onSearch={()=>setAuthState({...authState,showSearch:true})}/>;
    }

    const team=authState.team;
    const teamTypes=parseCalTypes(team.calType);
    const defaultType=authState.activeCalType||teamTypes[0]||'montage';
    return <CalendarView team={team} isAdminAccess={false} activeCalType={defaultType} onBack={()=>setAuthState(null)}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
