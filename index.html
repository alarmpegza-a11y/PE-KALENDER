        firebase.initializeApp(firebaseConfig);
        window._db = firebase.firestore();
        window.FirebaseReady = true;
        console.log('✅ Firebase Firestore connected: pe-kalender-alle-gruppen');
      } catch(e) {
        console.warn('⚠️ Firebase init failed, falling back to localStorage:', e.message);
        window.FirebaseReady = false;
      }

      (function() {
        if (window.FirebaseReady && window._db) {
          const db = window._db;
          function collection(db, colName) { return { _col: colName, _type: 'col' }; }
          function doc(db, colName, docId) { return { _col: colName, _id: docId, _type: 'doc' }; }
          function setDoc(ref, data) { return db.collection(ref._col).doc(ref._id).set(data); }
          function updateDoc(ref, data) { return db.collection(ref._col).doc(ref._id).update(data); }
          function deleteDoc(ref) { return db.collection(ref._col).doc(ref._id).delete(); }
          function onSnapshot(ref, callback, errorCallback) {
            const unsub = db.collection(ref._col).onSnapshot(snap => {
              const docs = snap.docs.map(d => ({ id: d.id, data: () => ({ ...d.data() }) }));
              callback({ docs });
            }, errorCallback || console.error);
            return unsub;
          }
          window.FirebaseSDK = { db, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot };
        } else {
          const _listeners = {};
          function _getCol(col) { try { return JSON.parse(localStorage.getItem('pe_' + col) || '{}'); } catch(e) { return {}; } }
          function _setCol(col, data) { try { localStorage.setItem('pe_' + col, JSON.stringify(data)); _notify(col, data); } catch(e) { throw new Error('Speicherfehler: ' + e.message); } }
          function _notify(col, data) { const snap = _makeSnap(data); (_listeners[col] || []).forEach(cb => { try { cb(snap); } catch(e) {} }); }
          function _makeSnap(data) { const docs = Object.entries(data).map(([id, d]) => ({ id, data: () => ({ ...d }) })); return { docs }; }
          const db = {};
          function collection(db, colName) { return { _type: 'col', _col: colName }; }
          function doc(db, colName, docId) { return { _type: 'doc', _col: colName, _id: docId }; }
          function setDoc(ref, data) { return new Promise((res, rej) => { try { const all = _getCol(ref._col); all[ref._id] = { ...data, id: ref._id }; _setCol(ref._col, all); res(); } catch(e) { rej(e); } }); }
          function updateDoc(ref, data) { return new Promise((res, rej) => { try { const all = _getCol(ref._col); all[ref._id] = { ...(all[ref._id] || {}), ...data, id: ref._id }; _setCol(ref._col, all); res(); } catch(e) { rej(e); } }); }
          function deleteDoc(ref) { return new Promise((res, rej) => { try { const all = _getCol(ref._col); delete all[ref._id]; _setCol(ref._col, all); res(); } catch(e) { rej(e); } }); }
          function onSnapshot(ref, callback, errorCallback) {
            if (ref._type !== 'col') return () => {};
            const col = ref._col;
            if (!_listeners[col]) _listeners[col] = [];
            _listeners[col].push(callback);
            try { callback(_makeSnap(_getCol(col))); } catch(e) { if (errorCallback) errorCallback(e); }
            const handler = (e) => { if (e.key === 'pe_' + col) { try { callback(_makeSnap(_getCol(col))); } catch(ex) {} } };
            window.addEventListener('storage', handler);
            return () => { _listeners[col] = (_listeners[col] || []).filter(c => c !== callback); window.removeEventListener('storage', handler); };
          }
          window.FirebaseSDK = { db, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot };
        }
      })();

<script type="text/babel">
const { useState, useEffect, useMemo, useRef, memo, useCallback } = React;

const ADMIN_PIN = "8852";

const CARD_COLORS = ['#cfe2ff','#d1e7dd','#f8d7da','#e2d9f3','#d0f4de','#fce4ec','#e8f5e9','#e3f2fd','#f3e5f5','#e0f7fa','#fde8d8','#d4edda'];
const CARD_BORDER = ['#0d6efd','#198754','#dc3545','#6f42c1','#20c997','#e91e63','#4caf50','#2196f3','#9c27b0','#00bcd4','#f97316','#28a745'];
const CARD_TEXT  = ['#052c65','#0a3622','#58151c','#2c1654','#0a3622','#560a21','#1b5e20','#0d2b6e','#3b0764','#003d47','#431407','#155724'];

const PROV_BG     = '#fef9c3';
const PROV_BORDER = '#eab308';
const PROV_TEXT   = '#713f12';

const DAY_NAMES = ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];

const genId = () => {
  try { const uuid = crypto.randomUUID(); if (uuid) return uuid; } catch(e) {}
  return Math.random().toString(36).slice(2) + Date.now().toString(36) + Math.random().toString(36).slice(2);
};

const genTeamId = (name) => {
  const sanitized = (name || '').toLowerCase().replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss').replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'').substring(0,30);
  const suffix = Date.now().toString(36);
  return sanitized ? `${sanitized}-${suffix}` : `team-${suffix}`;
};

const cleanAuftragsNr = (nr) => { if (!nr) return nr; return nr.replace(/\s*\/\s*SLI\s*/gi,'').trim(); };
const formatDate = (s) => { if (!s) return 'N/A'; const d=new Date(s); return isNaN(d.getTime())?'N/A':d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'}); };
const getWeekNumber = (d) => { d=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())); d.setUTCDate(d.getUTCDate()+4-(d.getUTCDay()||7)); const ys=new Date(Date.UTC(d.getUTCFullYear(),0,1)); return Math.ceil((((d-ys)/86400000)+1)/7); };
const getCalWeekDays = (base) => { const d=new Date(base); const day=d.getDay(); const diff=(day===0)?-6:1-day; const mon=new Date(d.getFullYear(),d.getMonth(),d.getDate()+diff); return Array.from({length:6},(_,i)=>new Date(mon.getFullYear(),mon.getMonth(),mon.getDate()+i)); };
const toLocalDateStr = (dateObj) => { const y=dateObj.getFullYear(),m=String(dateObj.getMonth()+1).padStart(2,'0'),d=String(dateObj.getDate()).padStart(2,'0'); return `${y}-${m}-${d}`; };
const daysBetween = (s,e) => { if(!s||!e) return 1; return Math.max(1,Math.round((new Date(e)-new Date(s))/86400000)+1); };

const parseCalTypes = (calType) => {
  if (!calType || calType === 'montage') return ['montage'];
  if (calType === 'both' || calType === 'all') return ['montage','beplankung','ausflocken'];
  if (calType === 'beplankung') return ['beplankung'];
  if (calType === 'ausflocken') return ['ausflocken'];
  try {
    const arr = JSON.parse(calType);
    if (Array.isArray(arr)) return arr;
  } catch(e) {}
  return ['montage'];
};

const Icon = memo(({ name, size=18, className="" }) => {
    const ref = useRef(null);
    useEffect(() => {
        if (window.lucide && ref.current) {
            ref.current.innerHTML='';
            const i=document.createElement('i'); i.setAttribute('data-lucide-name',name); ref.current.appendChild(i);
            window.lucide.createIcons({ attrs:{class:className,style:`width:${size}px;height:${size}px;`}, nameAttr:'data-lucide-name' });
        }
    },[name,className,size]);
    return <span ref={ref} className={`inline-flex items-center justify-center ${className}`}></span>;
});

function downloadEntryPDF(entry) {
    return new Promise(resolve => {
        try {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });

            const pageW = 210;
            const margin = 15;
            const contentW = pageW - margin * 2;
            let y = margin;

            const setFont = (size, style = 'normal', color = [0,0,0]) => {
                doc.setFontSize(size);
                doc.setFont('helvetica', style);
                doc.setTextColor(color[0], color[1], color[2]);
            };
            const drawLine = (x1, y1, x2, y2, color = [0,0,0], w = 0.5) => {
                doc.setDrawColor(color[0], color[1], color[2]);
                doc.setLineWidth(w);
                doc.line(x1, y1, x2, y2);
            };
            const row = (label, value, yPos) => {
                setFont(9, 'bold', [80,80,80]);
                doc.text(label, margin, yPos);
                setFont(10, 'normal', [0,0,0]);
                const lines = doc.splitTextToSize(String(value || '—'), contentW - 38);
                doc.text(lines, margin + 38, yPos);
                return yPos + (lines.length * 5.5) + 2;
            };

            doc.setFillColor(37, 99, 235);
            doc.rect(0, 0, pageW, 18, 'F');
            setFont(13, 'bold', [255,255,255]);
            doc.text('AUFTRAG', margin, 12);
            setFont(9, 'normal', [180,210,255]);
            doc.text('PE-MONTAGE', pageW - margin, 12, { align: 'right' });
            y = 26;

            setFont(16, 'bold', [0,0,0]);
            const customerLines = doc.splitTextToSize((entry.customer || '').toUpperCase(), contentW);
            doc.text(customerLines, margin, y);
            y += customerLines.length * 8 + 3;

            drawLine(margin, y, pageW - margin, y, [37,99,235], 0.8);
            y += 6;

            const nr = cleanAuftragsNr(entry.auftragsNr);
            if (nr) {
                setFont(9, 'bold', [80,80,80]);
                doc.text('AUFTRAGSNR.', margin, y);
                setFont(11, 'bold', [37,99,235]);
                doc.text(nr, margin + 38, y);
                y += 8;
            }

            y = row('ADRESSE', entry.address, y);
            y = row('DATUM', formatDate(entry.deliveryDate) + (entry.endDate ? ' – ' + formatDate(entry.endDate) : ''), y);

            if (entry.target > 0) {
                y = row('ELE', entry.target + ' ELE', y);
            }

            if (entry.isProv) {
                y += 2;
                doc.setFillColor(254, 249, 195);
                doc.setDrawColor(234, 179, 8);
                doc.setLineWidth(0.5);
                doc.roundedRect(margin, y, contentW, 10, 2, 2, 'FD');
                setFont(10, 'bold', [113, 63, 18]);
                doc.text('⚠  PROVISORISCH', margin + 4, y + 7);
                y += 15;
            }

            if (entry.memo) {
                y += 2;
                drawLine(margin, y, pageW - margin, y, [200,200,200], 0.3);
                y += 5;
                doc.setFillColor(255, 251, 235);
                doc.setDrawColor(245, 158, 11);
                doc.setLineWidth(0.8);
                doc.rect(margin, y, 1.5, 999, 'F');
                setFont(7, 'bold', [120,80,0]);
                doc.text('MEMO', margin, y + 4);
                y += 6;
                setFont(12, 'bold', [0,0,0]);
                const memoLines = doc.splitTextToSize(entry.memo, contentW - 4);
                const memoH = memoLines.length * 6 + 6;
                doc.setFillColor(255, 251, 235);
                doc.setDrawColor(245, 158, 11);
                doc.setLineWidth(0.5);
                doc.roundedRect(margin, y - 1, contentW, memoH, 2, 2, 'FD');
                doc.setFillColor(245, 158, 11);
                doc.rect(margin, y - 1, 2, memoH, 'F');
                doc.text(memoLines, margin + 5, y + 4);
                y += memoH + 5;
            }

            if (entry.image) {
                y += 3;
                drawLine(margin, y, pageW - margin, y, [200,200,200], 0.3);
                y += 6;
                setFont(7, 'bold', [120,120,120]);
                doc.text('FOTO', margin, y);
                y += 4;

                try {
                    const b64 = entry.image;
                    let imgFormat = 'JPEG';
                    if (b64.includes('data:image/png')) imgFormat = 'PNG';
                    else if (b64.includes('data:image/webp')) imgFormat = 'WEBP';

                    const maxImgW = contentW;
                    const maxImgH = 120;

                    const img = new Image();
                    img.onload = () => {
                        const ratio = Math.min(maxImgW / img.naturalWidth, maxImgH / img.naturalHeight, 1);
                        const imgW = img.naturalWidth * ratio;
                        const imgH = img.naturalHeight * ratio;
                        const imgX = margin + (contentW - imgW) / 2;

                        if (y + imgH > 280) { doc.addPage(); y = margin; }

                        doc.addImage(b64, imgFormat, imgX, y, imgW, imgH);

                        const totalPages = doc.internal.getNumberOfPages();
                        for (let i = 1; i <= totalPages; i++) {
                            doc.setPage(i);
                            doc.setFillColor(245, 248, 255);
                            doc.rect(0, 288, pageW, 10, 'F');
                            setFont(7, 'normal', [150,150,150]);
                            doc.text('PE-MONTAGE Tourendisposition', margin, 294);
                            doc.text(`${new Date().toLocaleDateString('de-DE')}`, pageW - margin, 294, { align: 'right' });
                        }

                        const filename = `Auftrag_${(nr || entry.customer || 'export').replace(/[^a-zA-Z0-9]/g,'_')}.pdf`;
                        doc.save(filename);
                        resolve();
                    };
                    img.onerror = () => {
                        const filename = `Auftrag_${(nr || entry.customer || 'export').replace(/[^a-zA-Z0-9]/g,'_')}.pdf`;
                        doc.save(filename);
                        resolve();
                    };
                    img.src = b64;
                    return;
                } catch(imgErr) {
                    console.warn('Image insert failed:', imgErr);
                }
            }

            const totalPages = doc.internal.getNumberOfPages();
            for (let i = 1; i <= totalPages; i++) {
                doc.setPage(i);
                doc.setFillColor(245, 248, 255);
                doc.rect(0, 288, pageW, 10, 'F');
                setFont(7, 'normal', [150,150,150]);
                doc.text('PE-MONTAGE Tourendisposition', margin, 294);
                doc.text(`${new Date().toLocaleDateString('de-DE')}`, pageW - margin, 294, { align: 'right' });
            }

            const filename = `Auftrag_${(cleanAuftragsNr(entry.auftragsNr) || entry.customer || 'export').replace(/[^a-zA-Z0-9]/g,'_')}.pdf`;
            doc.save(filename);
            resolve();

        } catch(err) {
            console.error('jsPDF error:', err);
            const el = document.createElement('div');
            el.style.cssText = 'position:fixed;top:0;left:0;width:210mm;background:#fff;padding:15mm;font-family:Arial;color:#000;z-index:99999;opacity:0;pointer-events:none;';
            el.innerHTML = `<h2 style="color:#000">${entry.customer||''}</h2><p style="color:#000">${entry.address||''}</p><p style="color:#000">${entry.memo||''}</p>`;
            document.body.appendChild(el);
            setTimeout(() => {
                html2pdf().set({ margin:10, filename:'Auftrag.pdf', html2canvas:{ scale:2, allowTaint:true, backgroundColor:'#fff' }, jsPDF:{ format:'a4' } })
                    .from(el).save().then(() => { document.body.removeChild(el); resolve(); });
            }, 150);
        }
    });
}

function LoginScreen({ onLogin, teams }) {
    const [pin, setPin] = useState('');
    const [error, setError] = useState('');
    const isFirebase = window.FirebaseReady;

    const handleAction = (val) => {
        if (val === 'C') { setPin(''); return; }
        if (pin.length >= 4) return;
        const np = pin + val;
        setPin(np);
        if (np.length === 4) {
            if (np === ADMIN_PIN) { onLogin('admin'); return; }
            const team = teams.find(t => t.pin === np);
            if (team) onLogin('team', team);
            else { setError('Falscher PIN'); setTimeout(() => { setPin(''); setError(''); }, 1000); }
        }
    };

    return (
        <div style={{ minHeight:'100vh',background:'#030712',display:'flex',alignItems:'center',justifyContent:'center',padding:24 }}>
            <div style={{ width:'100%',maxWidth:340,textAlign:'center' }}>
                <div style={{ marginBottom:48 }}>

function ImportModal({ calWeek, team, currentCalLabel, activeCalType, days, onClose, onDone }) {
    const [text, setText] = useState('');
    const [saving, setSaving] = useState(false);
    const [preview, setPreview] = useState([]);
    const [provIds, setProvIds] = useState(new Set());

    const parse = (raw) => {
        if (!raw.trim()) return [];
        const lines = raw.split(/\r?\n/);
        let currentDay = null;
        const result = [];
        const weekMap = {};
        ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'].forEach((n,i) => { weekMap[n.toLowerCase()] = days[i]; });
        const dayRx = /(Montag|Dienstag|Mittwoch|Donnerstag|Freitag|Samstag|Sonntag)\s*(\d{2}\.\d{2}\.\d{4})?/i;
        const knownTypes = ['LIEFERUNG','MONTAGE','DEMONTAGE','ABHOLUNG','BEPLANKUNG','AUSFLOCKEN','GIPSER','SERVICE','ABNAHME','RETOURE'];
        for (const line of lines) {
            const t = line.trim();
            if (!t) continue;
            const dm = t.match(dayRx);
            if (dm && !t.includes('/')) { const nl=dm[1].toLowerCase(); if(weekMap[nl]!==undefined) currentDay=weekMap[nl]; if(dm[2]){const [d,m,y]=dm[2].split('.');currentDay=new Date(parseInt(y),parseInt(m)-1,parseInt(d));} continue; }
            if (!currentDay) currentDay = days[0];
            const parts = t.split('/').map(x=>x.trim());
            if (parts.length < 2) continue;
            let entryType='LIEFERUNG', offset=0;
            if (knownTypes.includes(parts[0].toUpperCase())) { entryType=parts[0].toUpperCase(); offset=1; }
            const customer=parts[offset]||'', address=parts[offset+1]||'', memo=parts[offset+2]||'';
            const auftragsNr=cleanAuftragsNr(parts.slice(offset+3).join('/').trim());
            if (!customer) continue;
            const ele=(memo+' '+auftragsNr).match(/(\d+)\s*ELE/i);
            result.push({ entryType, customer, address, memo, auftragsNr, target:ele?parseInt(ele[1]):0, deliveryDate:toLocalDateStr(currentDay), calType:activeCalType });
        }
        return result;
    };

    const handleTextChange = (val) => { setText(val); setPreview(parse(val)); setProvIds(new Set()); };
    const toggleProv = (i) => setProvIds(prev => { const n=new Set(prev); n.has(i)?n.delete(i):n.add(i); return n; });

    const doImport = async () => {
        const entries = parse(text);
        if (!entries.length) { alert('Keine Aufträge erkannt.'); return; }
        setSaving(true);
        try {
            const { db, doc, setDoc } = window.FirebaseSDK;
            for (let i=0; i<entries.length; i++) {
                const e = entries[i];
                const id = `cal-${genId()}`;
                await setDoc(doc(db, `teams_cal_${team.id}`, id), { ...e, id, image:null, createdAt:new Date().toISOString(), isDone:false, isBilled:false, isProv: provIds.has(i), customStartLabel:'' });
            }
            onDone(entries.length);
        } catch(err) { alert('Fehler: '+err.message); setSaving(false); }
    };

    return (
        <div style={{ position:'fixed',inset:0,zIndex:50,background:'rgba(15,23,42,0.99)',padding:'16px',display:'flex',flexDirection:'column',gap:12 }}>
            <div style={{ display:'flex',justifyContent:'space-between',alignItems:'flex-start' }}>
                <div>
                    <div style={{ color:'#60a5fa',fontSize:11,fontWeight:900,textTransform:'uppercase',letterSpacing:1 }}>Import → KW {getWeekNumber(calWeek)} — {team.name} ({currentCalLabel})</div>
                    <div style={{ color:'#94a3b8',fontSize:9,marginTop:3 }}>Tagname = Tagesheader · Felder mit / trennen · PROV-Button = provisorisch</div>
                </div>
                <button onClick={onClose} style={{ background:'#334155',border:'none',borderRadius:8,width:32,height:32,cursor:'pointer',color:'#94a3b8',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center' }}>✕</button>
            </div>
            <div style={{ flex:1,display:'flex',gap:12,minHeight:0 }}>
                <div style={{ flex:1,display:'flex',flexDirection:'column',gap:6 }}>
                    <div style={{ color:'#64748b',fontSize:9,fontWeight:900,textTransform:'uppercase' }}>Eingabe</div>
                    <textarea autoFocus style={{ flex:1,width:'100%',background:'#1e293b',border:'1px solid #334155',padding:'12px',borderRadius:10,fontSize:11,color:'#f8fafc',fontFamily:'monospace',resize:'none',boxSizing:'border-box',lineHeight:1.6 }}
                        placeholder={"Montag\nKunde AG / Adresse / Memo / AuftragsNr"} value={text} onChange={e=>handleTextChange(e.target.value)}/>
                </div>
                <div style={{ width:260,display:'flex',flexDirection:'column',gap:6 }}>
                    <div style={{ display:'flex',justifyContent:'space-between',alignItems:'center' }}>
                        <div style={{ color:'#64748b',fontSize:9,fontWeight:900,textTransform:'uppercase' }}>Vorschau</div>
                        <div style={{ background:preview.length>0?'#10b981':'#334155',color:'#fff',fontSize:9,fontWeight:900,padding:'2px 8px',borderRadius:20 }}>{preview.length} Aufträge</div>
                    </div>
                    <div style={{ flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:4 }}>
                        {preview.map((e,i) => (
                            <div key={i} style={{ background: provIds.has(i)?'#fef9c3':'#1e293b', border:`1px solid ${provIds.has(i)?'#eab308':'#334155'}`, borderLeft:`3px solid ${provIds.has(i)?'#eab308':'#10b981'}`, borderRadius:6, padding:'6px 8px', display:'flex', alignItems:'center', gap:6 }}>
                                <div style={{ flex:1 }}>
                                    <div style={{ color:provIds.has(i)?'#713f12':'#94a3b8',fontSize:7,fontWeight:900,marginBottom:2 }}>{formatDate(e.deliveryDate)} · {e.entryType}</div>
                                    <div style={{ color:provIds.has(i)?'#713f12':'#fff',fontSize:9,fontWeight:900 }}>{e.customer}</div>
                                    {e.address&&<div style={{ color:'#64748b',fontSize:8 }}>{e.address}</div>}
                                </div>
                                <button onClick={()=>toggleProv(i)} style={{ background:provIds.has(i)?'#eab308':'#334155',border:'none',borderRadius:5,padding:'3px 7px',color:'#fff',fontSize:8,fontWeight:900,cursor:'pointer',flexShrink:0 }}>
                                    {provIds.has(i)?'⚠ PROV':'PROV?'}
                                </button>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
            <div style={{ display:'flex',gap:12 }}>
                <button onClick={onClose} style={{ flex:1,padding:'13px',background:'transparent',border:'1px solid #334155',borderRadius:12,color:'#64748b',fontWeight:900,fontSize:10,textTransform:'uppercase',cursor:'pointer' }}>Abbrechen</button>
                <button onClick={doImport} disabled={saving||preview.length===0} style={{ flex:2,padding:'13px',background:preview.length>0&&!saving?'#3b82f6':'#1e293b',border:'none',borderRadius:12,color:preview.length>0&&!saving?'#fff':'#475573',fontWeight:900,fontSize:10,textTransform:'uppercase',cursor:preview.length>0&&!saving?'pointer':'not-allowed' }}>
                    {saving?'⏳ Speichern...':preview.length>0?`✓ ${preview.length} Aufträge importieren`:'Text eingeben...'}
                </button>
            </div>
        </div>
    );
}

function CalCard({ e, dayStr, ci, isStart, totalDays, isAdminAccess, toggleDone, setCopyEntry, deleteCalEntry, setEditCalEntry, canMarkDone }) {
    const isProv = !!e.isProv;
    const bg     = isProv ? PROV_BG     : CARD_COLORS[ci];
    const border = isProv ? PROV_BORDER : CARD_BORDER[ci];
    const text   = isProv ? PROV_TEXT   : CARD_TEXT[ci];

    const dayNumber = useMemo(() => {
        if (!e.isMultiDay||!e.endDate) return null;
        return Math.round((new Date(dayStr)-new Date(e.deliveryDate.substring(0,10)))/86400000)+1;
    },[e,dayStr]);

    const startLabel = isProv ? 'PROV.' : (e.customStartLabel||'START');

    const handleCardClick = (ev) => {
        ev.stopPropagation();
        if (isAdminAccess) setEditCalEntry({...e});
    };

    const handleTeamClick = async (ev) => {
        ev.stopPropagation();
        await downloadEntryPDF(e);
    };

    return (
        <div
            className={`cal-card-item${e.isDone?' done-card':''}${isProv?' cal-card-prov':''}`}
            style={{ background:bg, borderLeftColor:border, borderLeft:`3px solid ${border}`, color:text, borderTop:`1.5px solid ${border}33`, borderBottom:`1.5px solid ${border}33`, cursor:'pointer', filter:isStart?'none':'brightness(0.97)' }}
            onClick={isAdminAccess ? handleCardClick : (e.image ? handleTeamClick : undefined)}
        >
            {e.image && (
                <div className="green-dot" title={isAdminAccess?'Foto vorhanden':'PDF herunterladen'}
                    onClick={async(ev)=>{ ev.stopPropagation(); await downloadEntryPDF(e); }}
                    style={{ cursor:'pointer', right:4, top:4 }}>
                </div>
            )}
            {e.isDone && <div className="done-stamp">✓ Erledigt</div>}
            {e.isBilled && <div className="billed-stamp">✓ Abgerechnet</div>}

            <div style={{ display:'flex',alignItems:'center',gap:4,marginBottom:3,flexWrap:'wrap' }}>
                {isStart ? (
                    <div style={{ fontSize:8,fontWeight:900,letterSpacing:1,textTransform:'uppercase',padding:'1px 5px',background:border,color:'#fff',borderRadius:2,display:'inline-block' }}>
                        {e.isMultiDay && e.endDate ? startLabel : (e.entryType||'LIEFERUNG')}
                    </div>
                ) : (
                    <div style={{ fontSize:8,fontWeight:900,letterSpacing:1,textTransform:'uppercase',padding:'1px 5px',background:border+'bb',color:'#fff',borderRadius:2,display:'inline-block' }}>
                        TAG {dayNumber}
                    </div>
                )}
                {e.isMultiDay && e.endDate && (
                    <div className="multiday-badge" style={{ background:border+'33',color:border }}>
                        📅 {totalDays} Tage
                    </div>
                )}
                {isProv && <div style={{ fontSize:8,fontWeight:900,background:'#eab308',color:'#fff',borderRadius:3,padding:'1px 5px' }}>⚠ PROV.</div>}
            </div>

            {e.auftragsNr && <div style={{ fontSize:8,fontWeight:900,opacity:0.75,marginBottom:2,textTransform:'uppercase' }}>{cleanAuftragsNr(e.auftragsNr)}</div>}
            <div style={{ fontSize:10,fontWeight:900,lineHeight:1.3,marginBottom:2,textTransform:'uppercase' }}>{e.customer}</div>
            {e.address && <div style={{ fontSize:9,fontWeight:700,lineHeight:1.3,marginBottom:2,opacity:0.85 }}>{e.address}</div>}

            {e.memo && (
                <div className="memo-block" style={{ background:border+'22',borderLeftColor:border,color:text }}>
                    <span style={{ fontSize:7,fontWeight:900,textTransform:'uppercase',letterSpacing:1,opacity:0.6,display:'block',marginBottom:1 }}>📝 MEMO</span>
                    <span style={{ fontSize:11,fontWeight:800 }}>{e.memo}</span>
                </div>
            )}

            {e.isMultiDay && e.endDate && isStart && (
                <div style={{ fontSize:8,color:border,fontWeight:700,marginTop:3 }}>{formatDate(e.deliveryDate)} – {formatDate(e.endDate)}</div>
            )}

            {e.target>0 && <div style={{ marginTop:3,display:'inline-block',background:border,color:'#fff',fontSize:8,fontWeight:900,padding:'1px 5px',borderRadius:3 }}>{e.target} ELE</div>}

            {!isAdminAccess && e.image && (
                <div style={{ marginTop:4,fontSize:8,fontWeight:900,color:'#10b981',display:'flex',alignItems:'center',gap:3 }}>
                    <Icon name="download" size={10}/>PDF herunterladen
                </div>
            )}

            <div style={{ display:'flex',gap:3,marginTop:5,justifyContent:'flex-end' }}>
                {canMarkDone && (
                    <button onClick={(ev)=>{ ev.stopPropagation(); toggleDone(e); }}
                        style={{ background:e.isDone?'rgba(16,185,129,0.25)':'rgba(16,185,129,0.1)',border:`1px solid ${e.isDone?'#10b981':'rgba(16,185,129,0.3)'}`,borderRadius:3,padding:'2px 5px',cursor:'pointer',fontSize:8,color:'#10b981',lineHeight:1,fontWeight:900,display:'flex',alignItems:'center',gap:2 }}>
                        {e.isDone?'✓ Erledigt':'○ Erledigen'}
                    </button>
                )}
                {isAdminAccess && (
                    <button onClick={(ev)=>{ ev.stopPropagation(); setCopyEntry({...e}); }}
                        style={{ background:'rgba(37,99,235,0.15)',border:'none',borderRadius:3,padding:'2px 4px',cursor:'pointer',fontSize:9,color:'#2563eb',lineHeight:1 }}>⧉</button>
                )}
                {isAdminAccess && (
                    <button onClick={(ev)=>{ ev.stopPropagation(); if(confirm(`"${e.customer}" löschen?`)) deleteCalEntry(e.id); }}
                        style={{ background:'rgba(220,38,38,0.15)',border:'none',borderRadius:3,padding:'2px 4px',cursor:'pointer',fontSize:9,color:'#dc2626',lineHeight:1,fontWeight:900 }}>✕</button>
                )}
            </div>
        </div>
    );
}

function BillingModal({ teams, onClose }) {
    const [allEntries, setAllEntries] = useState([]);
    const [activeTeamTab, setActiveTeamTab] = useState(null);
    const [selectedIds, setSelectedIds] = useState(new Set());

    useEffect(() => {
        const { db, collection, onSnapshot } = window.FirebaseSDK;
        const unsubs = [];
        setAllEntries([]);
        teams.forEach(team => {
            const unsub = onSnapshot(collection(db,`teams_cal_${team.id}`),(snap)=>{
                const entries = snap.docs.map(d=>({id:d.id,...d.data(),teamId:team.id,teamName:team.name,teamColor:team.color}));
                setAllEntries(prev=>[...prev.filter(e=>e.teamId!==team.id),...entries]);
            });
            unsubs.push(unsub);
        });
        if (teams.length>0&&!activeTeamTab) setActiveTeamTab(teams[0].id);
        return ()=>unsubs.forEach(u=>u());
    },[teams]);

    const doneEntries = useMemo(()=>allEntries.filter(e=>e.isDone&&!e.isBilled),[allEntries]);
    const billedEntries = useMemo(()=>allEntries.filter(e=>e.isBilled),[allEntries]);
    const doneForTeam = useCallback((id)=>doneEntries.filter(e=>e.teamId===id),[doneEntries]);
    const billedForTeam = useCallback((id)=>billedEntries.filter(e=>e.teamId===id),[billedEntries]);
    const currentTeamDone = activeTeamTab?doneForTeam(activeTeamTab):[];
    const currentTeamBilled = activeTeamTab?billedForTeam(activeTeamTab):[];
    const currentTeam = teams.find(t=>t.id===activeTeamTab);

    const toggleSelect = (id) => setSelectedIds(prev=>{ const n=new Set(prev); n.has(id)?n.delete(id):n.add(id); return n; });
    const selectAll = () => { if(selectedIds.size===currentTeamDone.length) setSelectedIds(new Set()); else setSelectedIds(new Set(currentTeamDone.map(e=>e.id))); };

    const markBilled = async () => {
        const {db,doc,updateDoc}=window.FirebaseSDK;
        for(const e of currentTeamDone.filter(e=>selectedIds.has(e.id))) await updateDoc(doc(db,`teams_cal_${e.teamId}`,e.id),{isBilled:true,billedAt:new Date().toISOString()});
        setSelectedIds(new Set());
    };
    const unmarkBilled = async (e) => { const {db,doc,updateDoc}=window.FirebaseSDK; await updateDoc(doc(db,`teams_cal_${e.teamId}`,e.id),{isBilled:false,billedAt:null}); };
    const deleteEntry = async (e) => { if(!confirm(`"${e.customer}" löschen?`)) return; const {db,doc,deleteDoc}=window.FirebaseSDK; await deleteDoc(doc(db,`teams_cal_${e.teamId}`,e.id)); };

    const exportPDF = () => {
        const el = document.getElementById('billing-pdf-content');
        if (!el) return;
        html2pdf().set({ margin:8, filename:`Fertigmontage_${currentTeam?.name||'Export'}_${new Date().toLocaleDateString('de-DE')}.pdf`, image:{type:'jpeg',quality:0.98}, html2canvas:{scale:2,useCORS:true,allowTaint:true,backgroundColor:'#ffffff'}, jsPDF:{unit:'mm',format:'a4',orientation:'landscape'} }).from(el).save();
    };

                                <div style={{ width:8,height:8,borderRadius:'50%',background:activeTeamTab===t.id?t.color:'#334155' }}></div>
                                {t.name}
                                {doneForTeam(t.id).length>0&&<span style={{ background:'#ef4444',color:'#fff',fontSize:8,fontWeight:900,padding:'1px 5px',borderRadius:10 }}>{doneForTeam(t.id).length}</span>}
                            </button>
                        ))}
                    </div>
                </div>
                <div style={{ flex:1,overflowY:'auto',padding:20 }}>
                    {currentTeam && <>
                        <div style={{ display:'flex',gap:8,justifyContent:'flex-end',marginBottom:12 }}>
                            {selectedIds.size>0&&<button onClick={markBilled} style={{ background:'#10b981',border:'none',borderRadius:8,padding:'7px 14px',color:'#fff',fontSize:9,fontWeight:900,cursor:'pointer' }}>✓ Abgerechnet ({selectedIds.size})</button>}
                            <button onClick={exportPDF} style={{ background:'rgba(59,130,246,0.15)',border:'1px solid rgba(59,130,246,0.3)',borderRadius:8,padding:'7px 14px',color:'#3b82f6',fontSize:9,fontWeight:900,cursor:'pointer',display:'flex',alignItems:'center',gap:6 }}>
                                <Icon name="download" size={12}/>PDF Export
                            </button>
                        </div>
                        {currentTeamDone.length>0&&<div style={{ marginBottom:8,display:'flex',alignItems:'center',justifyContent:'space-between' }}>
                            <button onClick={selectAll} style={{ background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:8,padding:'6px 12px',color:'#cbd5e1',fontSize:9,fontWeight:900,cursor:'pointer' }}>ALLE WÄHLEN ({currentTeamDone.length})</button>
                            <span style={{ color:'#64748b',fontSize:9 }}>{selectedIds.size} ausgewählt</span>
                        </div>}
                        {currentTeamDone.length===0&&currentTeamBilled.length===0?(
                            <div style={{ textAlign:'center',padding:40,color:'#475569' }}><div style={{ fontSize:32,marginBottom:8 }}>📋</div><div style={{ fontSize:12,fontWeight:700 }}>Keine erledigten Aufträge</div></div>
                        ):(
                            <div style={{ display:'flex',flexDirection:'column',gap:8 }}>
                                {currentTeamDone.map(e=>(
                                    <div key={e.id} style={{ background:selectedIds.has(e.id)?'rgba(59,130,246,0.1)':'rgba(255,255,255,0.04)',border:selectedIds.has(e.id)?'1px solid rgba(59,130,246,0.4)':'1px solid rgba(255,255,255,0.07)',borderRadius:12,padding:'12px 16px',display:'flex',alignItems:'center',gap:12,cursor:'pointer' }} onClick={()=>toggleSelect(e.id)}>
                                        <div style={{ width:20,height:20,borderRadius:6,border:`2px solid ${selectedIds.has(e.id)?'#3b82f6':'rgba(255,255,255,0.15)'}`,background:selectedIds.has(e.id)?'#3b82f6':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0 }}>
                                            {selectedIds.has(e.id)&&<span style={{ color:'#fff',fontSize:11,fontWeight:900 }}>✓</span>}
                                        </div>
                                        <div style={{ flex:1,minWidth:0 }}>
                                            <div style={{ display:'flex',alignItems:'center',gap:8,marginBottom:4 }}>
                                                <span style={{ color:'#fff',fontSize:12,fontWeight:900,textTransform:'uppercase' }}>{e.customer}</span>
                                                {e.isProv&&<span style={{ background:'#fef9c3',color:'#713f12',fontSize:8,fontWeight:900,borderRadius:4,padding:'1px 6px' }}>⚠ PROV.</span>}
                                            </div>
                                            <div style={{ color:'#64748b',fontSize:10 }}>{e.address} · {formatDate(e.deliveryDate)}</div>
                                        </div>
                                        {e.auftragsNr&&<div style={{ background:'rgba(59,130,246,0.12)',border:'1px solid rgba(59,130,246,0.25)',borderRadius:8,padding:'4px 10px' }}><span style={{ color:'#3b82f6',fontSize:11,fontWeight:900,fontFamily:'monospace' }}>#{cleanAuftragsNr(e.auftragsNr)}</span></div>}
                                        <button onClick={(ev)=>{ev.stopPropagation();deleteEntry(e);}} style={{ background:'rgba(239,68,68,0.12)',border:'1px solid rgba(239,68,68,0.2)',borderRadius:8,padding:'6px 10px',cursor:'pointer',color:'#ef4444',fontSize:9,fontWeight:900,display:'flex',alignItems:'center',gap:4,flexShrink:0 }}>
                                            <Icon name="trash-2" size={12}/>LÖSCHEN
                                        </button>
                                    </div>
                                ))}
                                {currentTeamBilled.length>0&&<>
                                    <div style={{ color:'#a855f7',fontSize:9,fontWeight:900,textTransform:'uppercase',margin:'12px 0 8px',display:'flex',alignItems:'center',gap:8 }}>
                                        <div style={{ flex:1,height:1,background:'rgba(168,85,247,0.2)' }}></div>Bereits Abgerechnet ({currentTeamBilled.length})<div style={{ flex:1,height:1,background:'rgba(168,85,247,0.2)' }}></div>
                                    </div>
                                    {currentTeamBilled.map(e=>(
                                        <div key={e.id} onClick={()=>unmarkBilled(e)} style={{ background:'rgba(168,85,247,0.05)',border:'1px solid rgba(168,85,247,0.15)',borderRadius:10,padding:'10px 14px',display:'flex',alignItems:'center',gap:12,cursor:'pointer',opacity:0.7 }}>
                                            <div style={{ flex:1 }}><div style={{ color:'#cbd5e1',fontSize:11,fontWeight:900,textTransform:'uppercase' }}>{e.customer}</div><div style={{ color:'#64748b',fontSize:9 }}>{e.address} · {formatDate(e.deliveryDate)}</div></div>
                                            {e.auftragsNr&&<span style={{ color:'#a855f7',fontSize:10,fontWeight:900,fontFamily:'monospace' }}>#{cleanAuftragsNr(e.auftragsNr)}</span>}
                                        </div>
                                    ))}
                                </>}
                            </div>
                        )}
                    </>}
                </div>
            </div>
        </div>
    );
}

function CalendarView({ team, onBack, isAdminAccess=false, activeCalType: initialCalType }) {
    const [calEntries, setCalEntries] = useState([]);
    const [calWeek, setCalWeek] = useState(new Date());
    const [editCalEntry, setEditCalEntry] = useState(null);
    const [showCalImport, setShowCalImport] = useState(false);
    const [calImportResult, setCalImportResult] = useState(null);
    const [copyEntry, setCopyEntry] = useState(null);
    const [showStandbyPicker, setShowStandbyPicker] = useState(null);
    const [standbyItems, setStandbyItems] = useState([]);
    const [standbySearch, setStandbySearch] = useState('');
    const [standbyDateModal, setStandbyDateModal] = useState(null);

    const teamCalTypes = parseCalTypes(team.calType);
    const [activeCalType, setActiveCalType] = useState(initialCalType || teamCalTypes[0] || 'montage');

    const days = getCalWeekDays(calWeek);

    const CAL_TYPE_CONFIG = {
        montage:    { label:'MONTAGE',    banner:'🔧 MONTAGE',    bg:'#2563eb', tabClass:'active-montage' },
        beplankung: { label:'BEPLANKUNG', banner:'🏗 BEPLANKUNG', bg:'#059669', tabClass:'active-beplankung' },
        ausflocken: { label:'AUSFLOCKEN', banner:'❄️ AUSFLOCKEN', bg:'#b45309', tabClass:'active-ausflocken' },
    };
    const currentCalConfig = CAL_TYPE_CONFIG[activeCalType] || CAL_TYPE_CONFIG.montage;

    useEffect(() => {
        const { db, collection, onSnapshot } = window.FirebaseSDK;
        const unsub = onSnapshot(collection(db,`teams_cal_${team.id}`), snap => {
            setCalEntries(snap.docs.map(d=>({id:d.id,...d.data()})));
        });
        return unsub;
    },[team.id]);

    useEffect(() => {
        const { db, collection, onSnapshot } = window.FirebaseSDK;
        const unsub = onSnapshot(collection(db,'standby_items'), snap => { setStandbyItems(snap.docs.map(d=>({id:d.id,...d.data()}))); });
        return unsub;
    },[]);

    // ── SORTED filtered entries: always by deliveryDate ASC, then createdAt ASC ──
    // This ensures consistent ordering across all days of a multi-day entry.
    const filteredEntries = useMemo(() => {
        return calEntries
            .filter(e => (e.calType || 'montage') === activeCalType)
            .sort((a, b) => {
                const dateA = a.deliveryDate || '';
                const dateB = b.deliveryDate || '';
                if (dateA < dateB) return -1;
                if (dateA > dateB) return 1;
                // Same start date: sort by createdAt
                const ca = a.createdAt || '';
                const cb = b.createdAt || '';
                if (ca < cb) return -1;
                if (ca > cb) return 1;
                return 0;
            });
    }, [calEntries, activeCalType]);

    // ── entriesForDay: returns entries sorted by their START date (deliveryDate) ──
    // Multi-day entries always appear in the same position relative to each other
    // regardless of which day column is being rendered.
    const entriesForDay = useCallback((dayStr) => {
        return filteredEntries.filter(e => {
            if (e.isMultiDay && e.endDate) {
                return dayStr >= e.deliveryDate.substring(0,10) && dayStr <= e.endDate.substring(0,10);
            }
            return e.deliveryDate && e.deliveryDate.substring(0,10) === dayStr;
        });
        // No additional sort needed — filteredEntries is already sorted by deliveryDate ASC
    }, [filteredEntries]);

    // ── colorIndex: assigned once per unique entry ID, based on sorted order ──
    // Because filteredEntries is sorted consistently, the same entry always
    // gets the same color index regardless of which day column renders it.
    const colorIndex = useMemo(() => {
        const map = {};
        let ci = 0;
        filteredEntries.forEach(e => {
            if (!e.isProv) {
                if (!(e.id in map)) {
                    map[e.id] = ci % CARD_COLORS.length;
                    ci++;
                }
            } else {
                map[e.id] = -1;
            }
        });
        return map;
    }, [filteredEntries]);

    const deleteCalEntry = async (id) => { const {db,doc,deleteDoc}=window.FirebaseSDK; await deleteDoc(doc(db,`teams_cal_${team.id}`,id)); };
    const toggleDone = async (entry) => { const {db,doc,updateDoc}=window.FirebaseSDK; await updateDoc(doc(db,`teams_cal_${team.id}`,entry.id),{isDone:!entry.isDone,doneAt:!entry.isDone?new Date().toISOString():null}); };

    const compressCalImage = (file) => new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = (e) => { const img=new Image(); img.onload=()=>{ const c=document.createElement('canvas'); let w=img.width,h=img.height; if(w>1200){h*=1200/w;w=1200;} c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h); resolve(c.toDataURL('image/jpeg',0.7)); }; img.src=e.target.result; };
        reader.readAsDataURL(file);
    });

    const saveCalEntry = async (entry) => {
        try {
            const { db, doc, updateDoc } = window.FirebaseSDK;
            await updateDoc(doc(db,`teams_cal_${team.id}`,entry.id),{
                entryType:entry.entryType||'LIEFERUNG', customer:entry.customer||'', address:entry.address||'',
                memo:entry.memo||'', auftragsNr:entry.auftragsNr||'', target:parseInt(entry.target)||0,
                deliveryDate:entry.deliveryDate, endDate:entry.endDate||null,
                isMultiDay:!!(entry.endDate&&entry.endDate>entry.deliveryDate),
                image:entry.image||null, calType:entry.calType||'montage',
                isProv:!!entry.isProv, customStartLabel:entry.customStartLabel||'',
            });
            setEditCalEntry(null);
        } catch(err) { alert('Fehler: '+err.message); }
    };

    const saveNewCalEntry = async (entry) => {
        try {
            const { db, doc, setDoc } = window.FirebaseSDK;
            const id = `cal-${genId()}`;
            const isMultiDay = !!(entry.endDate&&entry.endDate>entry.deliveryDate);
            await setDoc(doc(db,`teams_cal_${team.id}`,id),{
                ...entry, id, createdAt:new Date().toISOString(), isDone:false, isBilled:false,
                entryType:entry.entryType||'LIEFERUNG', calType:entry.calType||activeCalType,
                target:parseInt(entry.target)||0, image:entry.image||null,
                isMultiDay, endDate:entry.endDate||null, isNew:undefined,
                isProv:!!entry.isProv, customStartLabel:entry.customStartLabel||'',
            });
            setEditCalEntry(null);
        } catch(err) { alert('Fehler: '+err.message); }
    };

    const triggerWeekPDF = () => {
        setTimeout(() => {
            const el = document.getElementById('cal-week-pdf-content');
            if (!el) return;
            html2pdf().set({
                margin:5,
                filename:`Kalender_KW${getWeekNumber(calWeek)}_${team.name}.pdf`,
                image:{type:'jpeg',quality:0.98},
                html2canvas:{scale:2,useCORS:true,allowTaint:true,backgroundColor:'#ffffff',logging:false},
                jsPDF:{unit:'mm',format:'a3',orientation:'landscape'}
            }).from(el).save();
        },200);
    };

    const pasteCopyToDay = async (dayStr) => {
        if (!copyEntry) return;
        const { db, doc, setDoc } = window.FirebaseSDK;
        const id = `cal-${genId()}`;
        await setDoc(doc(db,`teams_cal_${team.id}`,id),{...copyEntry,id,deliveryDate:dayStr,endDate:null,isMultiDay:false,createdAt:new Date().toISOString(),isDone:false,isBilled:false});
        setCopyEntry(null);
    };

    const insertStandbyItem = async (item, startDateStr, endDateStr) => {
        const { db, doc, setDoc } = window.FirebaseSDK;
        const isMultiDay = endDateStr > startDateStr;
        const id = `cal-${genId()}`;
        await setDoc(doc(db,`teams_cal_${team.id}`,id),{
            id, entryType:'LIEFERUNG', customer:item.customer, address:item.address,
            memo:item.memo, auftragsNr:item.auftragsNr, target:item.target||0,
            deliveryDate:startDateStr, endDate:isMultiDay?endDateStr:null, isMultiDay,
            image:null, calType:activeCalType, createdAt:new Date().toISOString(),
            isDone:false, isBilled:false, fromStandby:item.id, isProv:false, customStartLabel:'',
        });
        setStandbyDateModal(null); setShowStandbyPicker(null);
    };

    const defaultNewDate = toLocalDateStr(days[0]);
    const emptyEntry = { isNew:true, customer:'', address:'', memo:'', auftragsNr:'', target:'', image:null, entryType:'LIEFERUNG', deliveryDate:defaultNewDate, endDate:'', calType:activeCalType, isProv:false, customStartLabel:'' };

    const getMultiDayPosition = (entry, dayStr) => {
        if (!entry.isMultiDay||!entry.endDate) return 'single';
        const start=entry.deliveryDate.substring(0,10), end=entry.endDate.substring(0,10);
        if (dayStr===start) return 'start';
        if (dayStr===end) return 'end';
        return 'mid';
    };

    const visibleTabs = isAdminAccess
        ? ['montage','beplankung','ausflocken']
        : (['montage','beplankung','ausflocken'].filter(ct => teamCalTypes.includes(ct)));

    const kw = getWeekNumber(calWeek);

    return (
        <div style={{ minHeight:'100vh',background:'#0f172a',display:'flex',flexDirection:'column' }}>
            <div style={{ position:'absolute',left:'-9999px',top:0 }}>
                <div id="cal-week-pdf-content" style={{ padding:'8mm',background:'#fff',fontFamily:'Arial,sans-serif',width:'420mm',color:'#000' }}>
                    <div style={{ display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'5mm',borderBottom:'1.5pt solid #000',paddingBottom:'3mm' }}>
                        <div>
                            <h1 style={{ fontSize:'16pt',fontWeight:900,margin:0,textTransform:'uppercase',color:'#000' }}>Wochenkalender — {team.name} ({currentCalConfig.label})</h1>
                            <div style={{ fontSize:'12pt',fontWeight:900,color:'#2563eb' }}>KW {kw}</div>
                        </div>
                        <p style={{ margin:0,fontSize:'9pt',color:'#000',fontWeight:700 }}>{formatDate(toLocalDateStr(days[0]))} – {formatDate(toLocalDateStr(days[5]))}</p>
                    </div>
                    <div style={{ display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:'3mm' }}>
                        {days.map((day,di)=>{
                            const dayStr=toLocalDateStr(day), dayEnt=entriesForDay(dayStr);
                            return <div key={di}>
                                <div style={{ background:'#e2e8f0',borderRadius:'4pt',padding:'3mm',marginBottom:'2mm',textAlign:'center',border:'1pt solid #94a3b8' }}>
                                    <div style={{ fontSize:'9pt',fontWeight:900,textTransform:'uppercase',color:'#000' }}>{DAY_NAMES[di]}</div>
                                    <div style={{ fontSize:'7pt',color:'#1e293b',fontWeight:700 }}>{formatDate(dayStr)}</div>
                                </div>
                                {dayEnt.map((e,ei)=>{
                                    const ci=colorIndex[e.id];
                                    const bg=e.isProv?PROV_BG:CARD_COLORS[ci>=0?ci:0];
                                    const bd=e.isProv?PROV_BORDER:CARD_BORDER[ci>=0?ci:0];
                                    const pdfText = e.isProv ? '#5a2d00' : CARD_TEXT[ci>=0?ci:0];
                                    return <div key={ei} style={{ background:bg,borderLeft:`2pt solid ${bd}`,border:`1pt solid ${bd}66`,borderRadius:'4pt',padding:'2mm 3mm',marginBottom:'2mm' }}>
                                        <div style={{ fontSize:'8pt',fontWeight:900,color:pdfText }}>{e.customer}{e.isProv?' ⚠ PROV':''}</div>
                                        {e.auftragsNr&&<div style={{ fontSize:'6.5pt',color:'#333',fontFamily:'monospace',marginBottom:'0.5mm' }}>{cleanAuftragsNr(e.auftragsNr)}</div>}
                                        <div style={{ fontSize:'7pt',color:'#222' }}>{e.address}</div>
                                        {e.memo&&<div style={{ fontSize:'7pt',fontWeight:800,borderLeft:`1.5pt solid ${bd}`,paddingLeft:'2mm',marginTop:'1mm',color:pdfText }}>📝 {e.memo}</div>}
                                        {e.target>0&&<div style={{ fontSize:'7pt',fontWeight:900,color:pdfText,marginTop:'1mm' }}>{e.target} ELE</div>}
                                    </div>;
                                })}
                            </div>;
                        })}
                    </div>
                </div>
            </div>

            {/* HEADER */}
            <div style={{ background:'#1e293b',padding:'10px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,zIndex:40,borderBottom:'2px solid #334155',flexShrink:0 }}>
                <div style={{ display:'flex',alignItems:'center',gap:10,flex:'0 0 auto' }}>
                    <button onClick={onBack} style={{ background:'#334155',border:'none',borderRadius:10,width:34,height:34,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer' }}>
                        <Icon name="arrow-left" size={16} className="text-blue-400"/>
                    </button>
                    <div>
                        <div style={{ color:'#94a3b8',fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:2 }}>{isAdminAccess?'ADMIN':'TEAM'}</div>
                        <div style={{ display:'flex',alignItems:'baseline',gap:6 }}>
                            <span style={{ color:'#60a5fa',fontSize:26,fontWeight:900,lineHeight:1,letterSpacing:-1 }}>KW {kw}</span>
                        </div>
                        <div style={{ color:'#fff',fontSize:12,fontWeight:900,fontStyle:'italic',marginTop:1 }}>{team.name}</div>
                    </div>
                    <span className="live-badge"><span className="live-dot"></span>LIVE</span>
                </div>

                <div style={{ display:'flex',gap:6,alignItems:'center',flex:'1 1 auto',justifyContent:'center' }}>
                    {visibleTabs.map(ct=>{
                        const cfg=CAL_TYPE_CONFIG[ct];
                        return <button key={ct} className={`type-tab ${activeCalType===ct?cfg.tabClass:'inactive'}`} onClick={()=>setActiveCalType(ct)} style={{ fontSize:11,padding:'7px 18px' }}>
                            {ct==='montage'?'🔧 Montage':ct==='beplankung'?'🏗 Beplankung':'❄️ Ausflocken'}
                        </button>;
                    })}
                </div>

                <div style={{ display:'flex',gap:6,alignItems:'center',flex:'0 0 auto',flexWrap:'wrap',justifyContent:'flex-end' }}>
                    <button onClick={()=>{const d=new Date(calWeek);d.setDate(d.getDate()-7);setCalWeek(d);}} style={{ background:'#334155',border:'none',borderRadius:8,width:30,height:30,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center' }}><Icon name="chevron-left" size={14} className="text-blue-400"/></button>
                    <button onClick={()=>setCalWeek(new Date())} style={{ background:'#334155',border:'none',borderRadius:8,padding:'4px 10px',color:'#cbd5e1',fontSize:8,fontWeight:900,textTransform:'uppercase',cursor:'pointer' }}>Heute</button>
                    <button onClick={()=>{const d=new Date(calWeek);d.setDate(d.getDate()+7);setCalWeek(d);}} style={{ background:'#334155',border:'none',borderRadius:8,width:30,height:30,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center' }}><Icon name="chevron-right" size={14} className="text-blue-400"/></button>

                    <button onClick={triggerWeekPDF} style={{ background:'#475569',border:'none',borderRadius:8,padding:'5px 12px',color:'#fff',fontSize:8,fontWeight:900,textTransform:'uppercase',cursor:'pointer',display:'flex',alignItems:'center',gap:4 }}><Icon name="download" size={12}/>A3 PDF</button>

                    {isAdminAccess && <>
                        <button onClick={()=>setEditCalEntry({...emptyEntry})} style={{ background:'#10b981',border:'none',borderRadius:8,padding:'5px 12px',color:'#fff',fontSize:8,fontWeight:900,textTransform:'uppercase',cursor:'pointer',display:'flex',alignItems:'center',gap:4 }}><Icon name="plus" size={12}/>Neu</button>
                        <button onClick={()=>setShowStandbyPicker({dayStr:toLocalDateStr(days[0])})} style={{ background:'#f59e0b',border:'none',borderRadius:8,padding:'5px 12px',color:'#fff',fontSize:8,fontWeight:900,textTransform:'uppercase',cursor:'pointer',display:'flex',alignItems:'center',gap:4 }}><Icon name="archive" size={12}/>Standby</button>
                        <button onClick={()=>setShowCalImport(true)} style={{ background:'#3b82f6',border:'none',borderRadius:8,padding:'5px 12px',color:'#fff',fontSize:8,fontWeight:900,textTransform:'uppercase',cursor:'pointer',display:'flex',alignItems:'center',gap:4 }}><Icon name="upload" size={12}/>Import</button>
                    </>}
                </div>
            </div>

            <div style={{ background:currentCalConfig.bg,padding:'5px 16px',textAlign:'center',fontSize:9,fontWeight:900,color:'#fff',textTransform:'uppercase',letterSpacing:2 }}>
                {currentCalConfig.banner} — KW {kw} — {formatDate(toLocalDateStr(days[0]))} bis {formatDate(toLocalDateStr(days[5]))}
            </div>

            {copyEntry && isAdminAccess && (
                <div style={{ background:'#f59e0b',padding:'8px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:10,fontWeight:900,color:'#fff' }}>
                    <span>📋 KOPIEREN: „{copyEntry.customer}" — Tag-Spalte anklicken</span>
                    <button onClick={()=>setCopyEntry(null)} style={{ background:'rgba(0,0,0,0.2)',border:'none',borderRadius:6,padding:'3px 10px',color:'#fff',cursor:'pointer',fontSize:9,fontWeight:900 }}>Abbrechen</button>
                </div>
            )}

            <div style={{ flex:1,overflowX:'auto',overflowY:'auto',background:'#f1f5f9' }}>
                <div style={{ minWidth:760 }}>
                    <div style={{ display:'grid',gridTemplateColumns:'repeat(6,1fr)',borderBottom:'2px solid #000',background:'#1e293b' }}>
                        {DAY_NAMES.map((name,di)=>(
                            <div key={di} style={{ textAlign:'center',padding:'6px 4px',borderRight:di<5?'1px solid #334155':'none' }}>
                                <div style={{ fontSize:10,fontWeight:900,color:'#fff',textTransform:'uppercase',letterSpacing:1 }}>{name}</div>
                                <div style={{ fontSize:9,color:'#94a3b8',marginTop:1 }}>{formatDate(toLocalDateStr(days[di]))}</div>
                                <div style={{ fontSize:9,color:'#60a5fa',marginTop:1 }}>{entriesForDay(toLocalDateStr(days[di])).length} Aufträge</div>
                            </div>
                        ))}
                    </div>
                    <div style={{ display:'grid',gridTemplateColumns:'repeat(6,1fr)',background:'#fff',alignItems:'start' }}>
                        {days.map((day,di)=>{
                            const dayStr=toLocalDateStr(day), dayEnt=entriesForDay(dayStr);
                            const isPasteTarget=copyEntry&&isAdminAccess;
                            return (
                                <div key={di} className={`cal-col${isPasteTarget?' paste-target-col':''}`}
                                    onClick={()=>{ if(isPasteTarget) pasteCopyToDay(dayStr); }}
                                    style={{ cursor:isPasteTarget?'copy':'default' }}>
                                    {dayEnt.length===0&&(
                                        <div style={{ height:40,display:'flex',alignItems:'center',justifyContent:'center' }}>
                                            {isPasteTarget?<span style={{ fontSize:9,color:'#f59e0b',fontWeight:900 }}>+ Hier einfügen</span>:<span style={{ fontSize:9,color:'#cbd5e1',fontStyle:'italic' }}>—</span>}
                                        </div>
                                    )}
                                    {dayEnt.map(e=>{
                                        const ci=colorIndex[e.id]>=0?colorIndex[e.id]:0;
                                        const pos=getMultiDayPosition(e,dayStr);
                                        const isStart=pos==='start'||pos==='single';
                                        const totalDays=e.isMultiDay&&e.endDate?daysBetween(e.deliveryDate.substring(0,10),e.endDate.substring(0,10)):1;
                                        const canMark=isAdminAccess||(e.isMultiDay&&e.endDate?dayStr===e.deliveryDate.substring(0,10):true);
                                        return (
                                            <CalCard key={`${e.id}-${dayStr}`}
                                                e={e} dayStr={dayStr} ci={ci} isStart={isStart} totalDays={totalDays}
                                                isAdminAccess={isAdminAccess} toggleDone={toggleDone}
                                                setCopyEntry={setCopyEntry} deleteCalEntry={deleteCalEntry}
                                                setEditCalEntry={setEditCalEntry} canMarkDone={canMark}
                                            />
                                        );
                                    })}
                                    {isPasteTarget&&dayEnt.length>0&&(
                                        <div style={{ margin:'4px 0',padding:'6px',background:'rgba(245,158,11,0.15)',border:'1px dashed #f59e0b',borderRadius:4,textAlign:'center',fontSize:9,color:'#f59e0b',fontWeight:900 }}>+ Hier einfügen</div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            </div>

            {editCalEntry && isAdminAccess && (
                <div style={{ position:'fixed',inset:0,zIndex:50,background:'rgba(15,23,42,0.96)',display:'flex',alignItems:'center',justifyContent:'center',padding:16,overflowY:'auto' }}>
                    <div style={{ width:'100%',maxWidth:440,background:'rgba(51,65,85,0.98)',backdropFilter:'blur(12px)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:24,padding:24,display:'flex',flexDirection:'column',gap:12 }}>

                            <h3 style={{ color:'#fff',fontSize:11,fontWeight:900,textTransform:'uppercase',fontStyle:'italic',margin:0 }}>
                                {editCalEntry.isNew?'Neuer Eintrag':'Auftrag bearbeiten'}
                            </h3>
                            <button onClick={()=>setEditCalEntry(p=>({...p,isProv:!p.isProv}))}
                                style={{ background:editCalEntry.isProv?'#eab308':'rgba(234,179,8,0.15)',border:`2px solid ${editCalEntry.isProv?'#eab308':'rgba(234,179,8,0.3)'}`,borderRadius:10,padding:'6px 14px',color:editCalEntry.isProv?'#fff':'#ca8a04',fontWeight:900,fontSize:9,textTransform:'uppercase',cursor:'pointer',display:'flex',alignItems:'center',gap:5 }}>
                                ⚠ {editCalEntry.isProv?'PROV. AKTIV':'Als PROV. markieren'}
                            </button>
                        </div>

                        {!editCalEntry.isNew && (
                            <button onClick={()=>downloadEntryPDF(editCalEntry)} style={{ alignSelf:'flex-start',background:'#3b82f6',border:'none',borderRadius:8,padding:'6px 12px',color:'#fff',fontSize:9,fontWeight:900,textTransform:'uppercase',cursor:'pointer',display:'flex',alignItems:'center',gap:6 }}>
                                <Icon name="download" size={12}/>PDF exportieren
                            </button>

                        <div style={{ display:'flex',gap:6 }}>
                            {[['montage','🔧 Montage','#2563eb'],['beplankung','🏗 Beplankung','#059669'],['ausflocken','❄️ Ausflocken','#b45309']].map(([ct,label,color])=>(
                                <button key={ct} onClick={()=>setEditCalEntry({...editCalEntry,calType:ct})}

                        <input style={{ width:'100%',padding:'10px 12px',borderRadius:10,background:'#0f172a',border:'2px solid #3b82f6',color:'#60a5fa',fontSize:12,fontWeight:900,textTransform:'uppercase',letterSpacing:1,boxSizing:'border-box' }}
