                        <button onClick={() => setFilterCalType('beplankung')} style={{ background:filterCalType==='beplankung'?'#059669':'#1e293b', border:'none', borderRadius:8, padding:'5px 10px', color:filterCalType==='beplankung'?'#fff':'#64748b', fontSize:8, fontWeight:900, textTransform:'uppercase', cursor:'pointer' }}>🏗 Beplankung</button>
                        <div style={{ width:1, height:20, background:'#334155' }}></div>
                        <button onClick={() => { const d=new Date(billingWeek); d.setDate(d.getDate()-7); setBillingWeek(d); }} style={{ background:'#334155', border:'none', borderRadius:8, width:30, height:30, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
                            <Icon name="chevron-left" size={14} className="text-blue-400"/>
                        </button>
                        <button onClick={() => setBillingWeek(new Date())} style={{ background:'#334155', border:'none', borderRadius:8, padding:'4px 10px', color:'#cbd5e1', fontSize:8, fontWeight:900, textTransform:'uppercase', cursor:'pointer' }}>Heute</button>
                        <button onClick={() => { const d=new Date(billingWeek); d.setDate(d.getDate()+7); setBillingWeek(d); }} style={{ background:'#334155', border:'none', borderRadius:8, width:30, height:30, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
                            <Icon name="chevron-right" size={14} className="text-blue-400"/>
                        </button>
                    </div>
                </div>

                <div style={{ display:'flex', gap:0, borderBottom:'1px solid #1e293b' }}>
                    <div style={{ flex:1, padding:'12px 20px', background:'rgba(16,185,129,0.1)', borderRight:'1px solid #1e293b', textAlign:'center' }}>
                        <div style={{ color:'#10b981', fontSize:24, fontWeight:900 }}>{totalDone}</div>
                        <div style={{ color:'#94a3b8', fontSize:8, fontWeight:900, textTransform:'uppercase' }}>Zu Verrechnen</div>
                    </div>
                    <div style={{ flex:1, padding:'12px 20px', background:'rgba(168,85,247,0.1)', textAlign:'center' }}>
                        <div style={{ color:'#a855f7', fontSize:24, fontWeight:900 }}>{totalBilled}</div>
                        <div style={{ color:'#94a3b8', fontSize:8, fontWeight:900, textTransform:'uppercase' }}>Bereits Abgerechnet</div>
                    </div>
                </div>

                <div style={{ flex:1, overflowX:'auto', overflowY:'auto' }}>
                    <div style={{ background:'rgba(16,185,129,0.08)', borderBottom:'2px solid rgba(16,185,129,0.2)', padding:'8px 16px' }}>
                        <div style={{ color:'#10b981', fontSize:10, fontWeight:900, textTransform:'uppercase', letterSpacing:2 }}>
                            ✓ Erledigt — Bereit zur Abrechnung ({totalDone} Aufträge)
                        </div>
                        <div style={{ color:'#6b7280', fontSize:9, marginTop:2 }}>Klick auf einen Auftrag → als Abgerechnet markieren</div>
                    </div>

                    {totalDone === 0 ? (
                        <div style={{ padding:40, textAlign:'center', color:'#475569' }}>
                            <div style={{ fontSize:32, marginBottom:8 }}>📋</div>
                            <div style={{ fontSize:12, fontWeight:700 }}>Keine offenen Aufträge zur Abrechnung</div>
                        </div>
                    ) : (
                        <div style={{ minWidth:760 }}>
                            <div style={{ display:'grid', gridTemplateColumns:'repeat(6,1fr)', background:'#0f172a', borderBottom:'1px solid #1e293b' }}>
                                {DAY_NAMES.map((name,di) => (
                                    <div key={di} style={{ textAlign:'center', padding:'6px 4px', borderRight:di<5?'1px solid #1e293b':'none' }}>
                                        <div style={{ fontSize:9, fontWeight:900, color:'#fff', textTransform:'uppercase' }}>{name}</div>
                                        <div style={{ fontSize:8, color:'#64748b' }}>{formatDate(toLocalDateStr(days[di]))}</div>
                                        <div style={{ fontSize:8, color:'#10b981', fontWeight:900 }}>{doneEntriesForDay(toLocalDateStr(days[di])).length} offen</div>
                                    </div>
                                ))}
                            </div>
                            <div style={{ display:'grid', gridTemplateColumns:'repeat(6,1fr)', background:'#0a0f1e', alignItems:'start' }}>
                                {days.map((day,di) => {
                                    const dayStr=toLocalDateStr(day), dayEnt=doneEntriesForDay(dayStr);
                                    return (
                                        <div key={di} style={{ borderRight:di<5?'1px solid #1e293b':'none', padding:4, minHeight:60, display:'flex', flexDirection:'column', gap:4 }}>
                                            {dayEnt.length===0 && <div style={{ height:30, display:'flex', alignItems:'center', justifyContent:'center' }}><span style={{ fontSize:9, color:'#334155', fontStyle:'italic' }}>—</span></div>}
                                            {dayEnt.map((e) => (
                                                <div key={e.id}
                                                    onClick={() => markBilled(e)}
                                                    style={{ background:'rgba(16,185,129,0.08)', border:'1px solid rgba(16,185,129,0.25)', borderLeft:'3px solid #10b981', borderRadius:6, padding:'6px 8px', cursor:'pointer', position:'relative' }}
                                                    onMouseEnter={ev => ev.currentTarget.style.background='rgba(16,185,129,0.18)'}
                                                    onMouseLeave={ev => ev.currentTarget.style.background='rgba(16,185,129,0.08)'}>
                                                    <div style={{ fontSize:7, color:'#10b981', fontWeight:900, marginBottom:2, display:'flex', justifyContent:'space-between' }}>
                                                        <span>{e.calType==='beplankung'?'🏗':'🔧'} {e.teamName}</span>
                                                        <span style={{ background:'rgba(16,185,129,0.2)', padding:'0 4px', borderRadius:2 }}>✓ Abrechnen</span>
                                                    </div>
                                                    {e.auftragsNr&&<div style={{ fontSize:7, color:'#6ee7b7', opacity:0.8, marginBottom:1 }}>{e.auftragsNr}</div>}
                                                    <div style={{ fontSize:9, fontWeight:900, color:'#fff', lineHeight:1.2, marginBottom:1, textTransform:'uppercase' }}>{e.customer}</div>
                                                    <div style={{ fontSize:8, color:'#94a3b8', lineHeight:1.2 }}>{e.address}</div>
                                                    {e.target>0&&<div style={{ fontSize:7, color:'#10b981', fontWeight:900, marginTop:2 }}>{e.target} ELE</div>}
                                                </div>
                                            ))}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    {totalBilled > 0 && (
                        <>
                            <div style={{ background:'rgba(168,85,247,0.08)', borderTop:'2px solid rgba(168,85,247,0.2)', borderBottom:'2px solid rgba(168,85,247,0.2)', padding:'8px 16px', marginTop:12 }}>
                                <div style={{ color:'#a855f7', fontSize:10, fontWeight:900, textTransform:'uppercase', letterSpacing:2 }}>
                                    ✓ Abgerechnet ({totalBilled} Aufträge)
                                </div>
                                <div style={{ color:'#6b7280', fontSize:9, marginTop:2 }}>Klick → Abrechnung rückgängig</div>
                            </div>
                            <div style={{ minWidth:760 }}>
                                <div style={{ display:'grid', gridTemplateColumns:'repeat(6,1fr)', background:'#0f172a', borderBottom:'1px solid #1e293b' }}>
                                    {DAY_NAMES.map((name,di) => (
                                        <div key={di} style={{ textAlign:'center', padding:'6px 4px', borderRight:di<5?'1px solid #1e293b':'none' }}>
                                            <div style={{ fontSize:9, fontWeight:900, color:'#fff', textTransform:'uppercase' }}>{name}</div>
                                            <div style={{ fontSize:8, color:'#64748b' }}>{formatDate(toLocalDateStr(days[di]))}</div>
                                            <div style={{ fontSize:8, color:'#a855f7', fontWeight:900 }}>{billedEntriesForDay(toLocalDateStr(days[di])).length} abgr.</div>
                                        </div>
                                    ))}
                                </div>
                                <div style={{ display:'grid', gridTemplateColumns:'repeat(6,1fr)', background:'#0a0f1e', alignItems:'start' }}>
                                    {days.map((day,di) => {
                                        const dayStr=toLocalDateStr(day), dayEnt=billedEntriesForDay(dayStr);
                                        return (
                                            <div key={di} style={{ borderRight:di<5?'1px solid #1e293b':'none', padding:4, minHeight:40, display:'flex', flexDirection:'column', gap:4 }}>
                                                {dayEnt.length===0 && <div style={{ height:24 }}></div>}
                                                {dayEnt.map((e) => (
                                                    <div key={e.id}
                                                        onClick={() => markBilled(e)}
                                                        style={{ background:'rgba(168,85,247,0.05)', border:'1px solid rgba(168,85,247,0.2)', borderLeft:'3px solid #a855f7', borderRadius:6, padding:'5px 8px', cursor:'pointer', opacity:0.65 }}
                                                        onMouseEnter={ev => ev.currentTarget.style.opacity='1'}
                                                        onMouseLeave={ev => ev.currentTarget.style.opacity='0.65'}>
                                                        <div style={{ fontSize:7, color:'#a855f7', fontWeight:900, marginBottom:2, display:'flex', justifyContent:'space-between' }}>
                                                            <span>{e.calType==='beplankung'?'🏗':'🔧'} {e.teamName}</span>
                                                            <span>✓ Abgr.</span>
                                                        </div>
                                                        {e.auftragsNr&&<div style={{ fontSize:7, color:'#c4b5fd', opacity:0.8, marginBottom:1 }}>{e.auftragsNr}</div>}
                                                        <div style={{ fontSize:9, fontWeight:900, color:'#cbd5e1', lineHeight:1.2, textTransform:'uppercase' }}>{e.customer}</div>
                                                        <div style={{ fontSize:8, color:'#64748b', lineHeight:1.2 }}>{e.address}</div>
                                                    </div>
                                                ))}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </>
                    )}
                </div>
            </div>
        );
    }

    // ─────────────────────────────────────────────────────────────
    // STANDBY VIEW
    // ─────────────────────────────────────────────────────────────
    function StandbyView({ onBack, appId }) {
        const [standbyItems, setStandbyItems] = useState([]);
        const [search, setSearch] = useState('');
        const [showImport, setShowImport] = useState(false);
        const [importText, setImportText] = useState('');
        const [showAdd, setShowAdd] = useState(false);
        const [newItem, setNewItem] = useState({ customer:'', address:'', memo:'', auftragsNr:'', target:'' });

        useEffect(() => {
            const { db, collection, onSnapshot } = window.FirebaseSDK;
            const unsub = onSnapshot(collection(db, 'standby_items'), snap => {
                setStandbyItems(snap.docs.map(d => ({ id: d.id, ...d.data() }))
                    .sort((a,b) => (a.createdAt||'') < (b.createdAt||'') ? 1 : -1));
            });
            return unsub;
        }, [appId]);

        const deleteItem = async (id) => {
            if (!confirm('Auftrag aus Standby entfernen?')) return;
            const { db, doc, deleteDoc } = window.FirebaseSDK;
            await deleteDoc(doc(db, 'standby_items', id));
        };

        const addItem = async () => {
            if (!newItem.customer) return;
            const { db, doc, setDoc } = window.FirebaseSDK;
            const id = 'sb-' + genId();
            await setDoc(doc(db, 'standby_items', id), {
                ...newItem, id,
                target: parseInt(newItem.target) || 0,
                createdAt: new Date().toISOString()
            });
            setNewItem({ customer:'', address:'', memo:'', auftragsNr:'', target:'' });
            setShowAdd(false);
        };

        // ✅ FIXED: was broken raw-newline regex — now uses proper \r?\n
        const processImport = async () => {
            if (!importText.trim()) return;
            const lines = importText.split(/\r?\n/);
            const entries = [];
            const KNOWN_TYPES = ['LIEFERUNG','MONTAGE','DEMONTAGE','ABHOLUNG','BEPLANKUNG','GIPSER','SERVICE'];
            for (const line of lines) {
                const trimmed = line.trim();
                if (!trimmed || !trimmed.includes('/')) continue;
                const p = trimmed.split('/').map(s => s.trim());
                let offset = 0;
                if (KNOWN_TYPES.includes(p[0].toUpperCase())) offset = 1;
                const customer = p[offset] || '';
                if (!customer) continue;
                const address = p[offset+1] || '';
                const memo = p[offset+2] || '';
                const auftragsNr = p.slice(offset+3).join('/').trim();
                const ele = (memo+' '+auftragsNr).match(/(\d+)\s*ELE/i);
                entries.push({ customer, address, memo, auftragsNr, target: ele ? parseInt(ele[1]) : 0 });
            }
            if (entries.length === 0) {
                alert('Keine Aufträge erkannt. Format: Kunde / Adresse / Memo / Nr');
                return;
            }
            const { db, doc, setDoc } = window.FirebaseSDK;
            for (const e of entries) {
                const id = 'sb-' + genId();
                await setDoc(doc(db, 'standby_items', id), { ...e, id, createdAt: new Date().toISOString() });
            }
            setImportText('');
            setShowImport(false);
            alert(entries.length + ' Aufträge in Standby importiert!');
        };

        const filtered = standbyItems.filter(s =>
            !search || s.customer?.toLowerCase().includes(search.toLowerCase()) ||
            s.address?.toLowerCase().includes(search.toLowerCase()) ||
            s.auftragsNr?.toLowerCase().includes(search.toLowerCase())
        );

        return (
            <div style={{ minHeight:'100vh', background:'#0f172a', display:'flex', flexDirection:'column' }}>
                <div style={{ background:'#1e293b', padding:'12px 20px', display:'flex', justifyContent:'space-between', alignItems:'center', borderBottom:'2px solid #334155', position:'sticky', top:0, zIndex:40 }}>
                    <div style={{ display:'flex', alignItems:'center', gap:12 }}>
                        <button onClick={onBack} style={{ background:'#334155', border:'none', borderRadius:10, width:34, height:34, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer' }}>
                            <Icon name="arrow-left" size={16} className="text-blue-400"/>
                        </button>
                        <div>
                            <div style={{ color:'#f59e0b', fontSize:9, fontWeight:900, textTransform:'uppercase', letterSpacing:2 }}>STANDBY — AUFTRAGS-POOL</div>
                            <div style={{ color:'#fff', fontSize:14, fontWeight:900, fontStyle:'italic' }}>{standbyItems.length} Aufträge bereit</div>
                        </div>
                    </div>
                    <div style={{ display:'flex', gap:8 }}>
                        <button onClick={() => setShowAdd(true)} style={{ background:'#10b981', border:'none', borderRadius:8, padding:'6px 14px', color:'#fff', fontSize:9, fontWeight:900, textTransform:'uppercase', cursor:'pointer', display:'flex', alignItems:'center', gap:4 }}>
                            <Icon name="plus" size={12}/>Manuell
                        </button>
                        <button onClick={() => setShowImport(true)} style={{ background:'#f59e0b', border:'none', borderRadius:8, padding:'6px 14px', color:'#fff', fontSize:9, fontWeight:900, textTransform:'uppercase', cursor:'pointer', display:'flex', alignItems:'center', gap:4 }}>
                            <Icon name="upload" size={12}/>Import
                        </button>
                    </div>
                </div>

                <div style={{ padding:'12px 16px', background:'#0f172a', borderBottom:'1px solid #1e293b' }}>
                    <input
                        value={search} onChange={e => setSearch(e.target.value)}
                        placeholder="🔍 Suchen nach Kunde, Adresse, Auftragsnr..."
                        style={{ width:'100%', background:'#1e293b', border:'1px solid #334155', borderRadius:10, padding:'10px 14px', color:'#fff', fontSize:11, boxSizing:'border-box' }}
                    />
                </div>

                <div style={{ flex:1, overflowY:'auto', padding:'12px 16px', display:'flex', flexDirection:'column', gap:8 }}>
                    {filtered.length === 0 && (
                        <div style={{ textAlign:'center', color:'#475569', padding:40 }}>
                            <div style={{ fontSize:40, marginBottom:12 }}>📦</div>
                            <div style={{ fontSize:13, fontWeight:700 }}>Standby ist leer</div>
                            <div style={{ fontSize:10, color:'#334155', marginTop:4 }}>Aufträge importieren oder manuell hinzufügen</div>
                        </div>
                    )}
                    {filtered.map(item => (
                        <div key={item.id} style={{ background:'#1e293b', border:'1px solid #334155', borderLeft:'3px solid #f59e0b', borderRadius:10, padding:'12px 14px', display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
                            <div style={{ flex:1, minWidth:0 }}>
                                <div style={{ display:'flex', gap:8, alignItems:'center', marginBottom:4 }}>
                                    <span style={{ background:'#f59e0b22', border:'1px solid #f59e0b44', borderRadius:4, padding:'1px 6px', fontSize:7, fontWeight:900, color:'#f59e0b', textTransform:'uppercase' }}>STANDBY</span>
                                    {item.auftragsNr && <span style={{ fontSize:8, color:'#3b82f6', fontWeight:700 }}>{item.auftragsNr}</span>}
                                    {item.target > 0 && <span style={{ fontSize:8, color:'#10b981', fontWeight:900 }}>{item.target} ELE</span>}
                                </div>
                                <div style={{ color:'#fff', fontSize:12, fontWeight:900, textTransform:'uppercase', marginBottom:2 }}>{item.customer}</div>
                                {item.address && <div style={{ color:'#94a3b8', fontSize:10 }}>{item.address}</div>}
                                {item.memo && <div style={{ color:'#64748b', fontSize:9, marginTop:2 }}>{item.memo}</div>}
                            </div>
                            <button onClick={() => deleteItem(item.id)}
                                style={{ background:'rgba(239,68,68,0.15)', border:'none', borderRadius:6, padding:'6px 8px', cursor:'pointer', color:'#ef4444', marginLeft:8, flexShrink:0 }}>
                                <Icon name="trash-2" size={14}/>
                            </button>
                        </div>
                    ))}
                </div>

                {showAdd && (
                    <div style={{ position:'fixed', inset:0, zIndex:60, background:'rgba(15,23,42,0.97)', display:'flex', alignItems:'center', justifyContent:'center', padding:16 }}>
                        <div style={{ width:'100%', maxWidth:400, background:'#1e293b', border:'1px solid #334155', borderRadius:20, padding:24, display:'flex', flexDirection:'column', gap:10 }}>
                            <h3 style={{ color:'#f59e0b', fontSize:12, fontWeight:900, textTransform:'uppercase', margin:0 }}>Auftrag in Standby</h3>
                            {[['customer','Kunde *'],['address','Adresse'],['memo','Memo / Hausinfo'],['auftragsNr','Auftragsnr.']].map(([field, ph]) => (
                                <input key={field} placeholder={ph}
                                    value={newItem[field]} onChange={e => setNewItem({...newItem, [field]: e.target.value})}
                                    style={{ width:'100%', background:'#0f172a', border:'1px solid #334155', borderRadius:8, padding:'10px 12px', color:'#fff', fontSize:11, boxSizing:'border-box' }}/>
                            ))}
                            <input type="number" placeholder="ELE Anzahl"
                                value={newItem.target} onChange={e => setNewItem({...newItem, target: e.target.value})}
                                style={{ width:'100%', background:'#0f172a', border:'1px solid #334155', borderRadius:8, padding:'10px 12px', color:'#fff', fontSize:11, boxSizing:'border-box' }}/>
                            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginTop:4 }}>
                                <button onClick={() => setShowAdd(false)} style={{ padding:'11px', background:'transparent', border:'none', color:'#64748b', fontWeight:900, fontSize:10, textTransform:'uppercase', cursor:'pointer' }}>Abbrechen</button>
                                <button onClick={addItem} style={{ padding:'11px', background:'#f59e0b', border:'none', borderRadius:10, color:'#fff', fontWeight:900, fontSize:10, textTransform:'uppercase', cursor:'pointer' }}>Speichern</button>
                            </div>
                        </div>
                    </div>
                )}

                {showImport && (
                    <div style={{ position:'fixed', inset:0, zIndex:60, background:'rgba(15,23,42,0.99)', padding:20, display:'flex', flexDirection:'column', gap:12 }}>
                        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                            <div>
                                <div style={{ color:'#f59e0b', fontSize:11, fontWeight:900, textTransform:'uppercase' }}>Import → Standby Pool</div>
                                <div style={{ color:'#94a3b8', fontSize:9, marginTop:2 }}>Felder mit / trennen: Kunde / Adresse / Memo / AuftragsNr</div>
                            </div>
                            <button onClick={() => setShowImport(false)} style={{ background:'#334155', border:'none', borderRadius:8, width:32, height:32, cursor:'pointer', color:'#94a3b8', fontSize:16, display:'flex', alignItems:'center', justifyContent:'center' }}>✕</button>
                        </div>
                        <div style={{ background:'#0f172a', borderRadius:10, padding:'10px 14px', border:'1px solid #1e293b', fontSize:9, color:'#475569', lineHeight:1.8, fontFamily:'monospace' }}>
                            Knecht AG / Segelhofstr. 5 Dättwil / 47 ELE / 251266654/SLI<br/>
                            Müller GmbH / Bahnhofstrasse 10 Zürich
                        </div>
                        <textarea autoFocus
                            style={{ flex:1, background:'#1e293b', border:'1px solid #334155', padding:14, borderRadius:10, fontSize:11, color:'#fff', fontFamily:'monospace', resize:'none', boxSizing:'border-box', lineHeight:1.6 }}
                            placeholder={"Kunde AG / Adresse / Memo / AuftragsNr\nNächster Kunde / Adresse"}
                            value={importText} onChange={e => setImportText(e.target.value)}
                        />
                        <div style={{ display:'flex', gap:12 }}>
                            <button onClick={() => setShowImport(false)} style={{ flex:1, padding:'13px', background:'transparent', border:'1px solid #334155', borderRadius:12, color:'#64748b', fontWeight:900, fontSize:10, textTransform:'uppercase', cursor:'pointer' }}>Abbrechen</button>
                            <button onClick={processImport} style={{ flex:2, padding:'13px', background:'#f59e0b', border:'none', borderRadius:12, color:'#fff', fontWeight:900, fontSize:10, textTransform:'uppercase', cursor:'pointer' }}>In Standby importieren</button>
                        </div>
                    </div>
                )}
            </div>
        );
    }

    // ─────────────────────────────────────────────────────────────
    // ADMIN PANEL
    // ─────────────────────────────────────────────────────────────
    const AdminPanel = ({ teams, onLogout, onSelectTeam, onOpenBilling, onOpenStandby, appId }) => {
        const [isAdding, setIsAdding] = useState(false);
        const [deleteConfirm, setDeleteConfirm] = useState(null);
        const [deleteCodeInput, setDeleteCodeInput] = useState("");
        const [editTeam, setEditTeam] = useState(null);
        const [newTeam, setNewTeam] = useState({ name:'', pin:'', color:'#3b82f6', calType:'montage' });

        const handleAddTeam = async () => {
            if (!newTeam.name || !newTeam.pin) { alert('Bitte Name und PIN eingeben!'); return; }
            try {
                const { db, doc, setDoc } = window.FirebaseSDK;
                let teamId = newTeam.name
                    .toLowerCase()
                    .replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue')
                    .replace(/\s+/g,'-')
                    .replace(/[^a-z0-9-]/g,'')
                    .substring(0, 30);
                if (!teamId) teamId = 'team-' + Date.now();
                await setDoc(doc(db, 'teams_config', teamId), { ...newTeam, id: teamId });
                setIsAdding(false);
                setNewTeam({ name:'', pin:'', color:'#3b82f6', calType:'montage' });
            } catch(err) {
                alert('Fehler: ' + err.message);
            }
        };

        const handleSaveEditTeam = async () => {
            if (!editTeam) return;
            try {
                const { db, doc, updateDoc } = window.FirebaseSDK;
                await updateDoc(doc(db, 'teams_config', editTeam.id), {
                    name: editTeam.name, pin: editTeam.pin,
                    color: editTeam.color, calType: editTeam.calType || 'montage',
                });
                setEditTeam(null);
            } catch(err) { alert('Fehler: ' + err.message); }
        };

        const confirmDelete = async () => {
            if (deleteCodeInput !== ADMIN_PIN) { alert("Falscher Admin-Code!"); return; }
            try {
                const { db, doc, deleteDoc } = window.FirebaseSDK;
                await deleteDoc(doc(db, 'teams_config', deleteConfirm.id));
                setDeleteConfirm(null); setDeleteCodeInput("");
            } catch(err) { alert('Fehler: ' + err.message); }
        };

        const calTypeLabel = (ct) => ct==='both'?'Montage + Beplankung':ct==='beplankung'?'Beplankung':'Montage';
        const calTypeBadgeColor = (ct) => ct==='both'?'#7c3aed':ct==='beplankung'?'#059669':'#2563eb';

        return (
            <div className="min-h-screen bg-slate-950 flex flex-col p-8 page-transition">
                <header className="flex justify-between items-center mb-10">
                    <div>
                        <h1 className="text-3xl font-black text-white italic uppercase tracking-tight">Gruppen Verwalter</h1>
                        <p className="text-slate-500 font-bold uppercase tracking-widest text-[10px] mt-1">Management Zentrale</p>
                    </div>
                    <div className="flex gap-3 items-center">
                        <button onClick={onOpenStandby}
                            className="bg-amber-900/40 border border-amber-500/30 text-amber-400 px-5 py-2 rounded-xl text-xs font-bold uppercase active:scale-95 transition-all flex items-center gap-2 hover:bg-amber-900/60">
                            <Icon name="archive" size={16}/>Standby
                        </button>
                        <button onClick={onOpenBilling}
                            className="bg-emerald-900/40 border border-emerald-500/30 text-emerald-400 px-5 py-2 rounded-xl text-xs font-bold uppercase active:scale-95 transition-all flex items-center gap-2 hover:bg-emerald-900/60">
                            <Icon name="receipt" size={16}/>Abrechnung
                        </button>
                        <button onClick={onLogout}
                            className="bg-slate-900 border border-slate-800 text-slate-400 px-6 py-2 rounded-xl text-xs font-bold uppercase active:scale-95 transition-all">Logout</button>
                    </div>
                </header>

                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <button onClick={() => setIsAdding(true)} className="border-2 border-dashed border-slate-800 hover:border-indigo-500 hover:bg-indigo-500/5 rounded-3xl p-8 flex flex-col items-center justify-center gap-4 transition-all group">
                        <div className="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center group-hover:scale-110 transition-transform">
                            <Icon name="plus" className="text-indigo-400" size={24}/>
                        </div>
                        <p className="font-black text-slate-500 group-hover:text-white uppercase italic">Neue Gruppe erstellen</p>
                    </button>

                    {teams.map(t => (
                        <div key={t.id} className="bg-slate-900 border border-white/5 rounded-3xl p-6 hover:border-indigo-500/50 transition-all shadow-xl relative group">
                            <div className="flex justify-between items-start mb-4">
                                <div className="w-12 h-12 rounded-2xl flex items-center justify-center text-white shadow-lg" style={{ backgroundColor:t.color }}>
                                    <Icon name="users" size={24}/>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => setEditTeam({...t})} className="text-slate-600 hover:text-blue-400 transition-colors p-2">
                                        <Icon name="pencil" size={16}/>
                                    </button>
                                    <button onClick={() => setDeleteConfirm(t)} className="text-slate-700 hover:text-red-500 transition-colors p-2">
                                        <Icon name="trash-2" size={18}/>
                                    </button>
                                </div>
                            </div>
                            <h3 onClick={() => onSelectTeam(t, t.calType==='beplankung'?'beplankung':'montage')}
                                className="text-xl font-black text-white uppercase italic mb-1 cursor-pointer hover:text-blue-400 transition-colors">
                                {t.name} <span style={{ fontSize:10, color:'#3b82f6', verticalAlign:'middle' }}>↗</span>
                            </h3>
                            <p className="text-xs font-bold text-slate-500 tracking-widest mb-3">PIN: {t.pin}</p>
                            <div style={{ display:'inline-block', background:calTypeBadgeColor(t.calType||'montage')+'22', border:`1px solid ${calTypeBadgeColor(t.calType||'montage')}55`, borderRadius:6, padding:'2px 8px', marginBottom:10 }}>
                                <span style={{ fontSize:9, fontWeight:900, color:calTypeBadgeColor(t.calType||'montage'), textTransform:'uppercase' }}>{calTypeLabel(t.calType||'montage')}</span>
                            </div>
                            <div className="flex gap-2 mt-2">
                                {(t.calType==='montage'||t.calType==='both') && (
                                    <button onClick={() => onSelectTeam(t,'montage')}
                                        style={{ flex:1, background:'#2563eb22', border:'1px solid #2563eb55', borderRadius:8, padding:'6px 4px', color:'#60a5fa', fontSize:8, fontWeight:900, textTransform:'uppercase', cursor:'pointer' }}>
                                        🔧 Montage
                                    </button>
                                )}
                                {(t.calType==='beplankung'||t.calType==='both') && (
                                    <button onClick={() => onSelectTeam(t,'beplankung')}
                                        style={{ flex:1, background:'#05966922', border:'1px solid #05966955', borderRadius:8, padding:'6px 4px', color:'#34d399', fontSize:8, fontWeight:900, textTransform:'uppercase', cursor:'pointer' }}>
                                        🏗 Beplankung
                                    </button>
                                )}
                                {(t.calType !== 'montage' && t.calType !== 'beplankung' && t.calType !== 'both') && (
                                    <button onClick={() => onSelectTeam(t,'montage')}
                                        style={{ flex:1, background:'#2563eb22', border:'1px solid #2563eb55', borderRadius:8, padding:'6px 4px', color:'#60a5fa', fontSize:8, fontWeight:900, textTransform:'uppercase', cursor:'pointer' }}>
                                        🔧 Montage
                                    </button>
                                )}
                            </div>
                        </div>
                    ))}
                </div>

                {editTeam && (
                    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/90 backdrop-blur-sm">
                        <div className="bg-slate-900 border border-white/10 w-full max-w-sm rounded-3xl p-8 shadow-2xl">
                            <h3 className="text-xl font-black text-white mb-6 uppercase italic">Gruppe bearbeiten</h3>
                            <div className="space-y-4">
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-500 uppercase ml-1">Gruppen Name</label>
                                    <input type="text" className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white focus:border-indigo-500 outline-none"
                                        value={editTeam.name} onChange={e => setEditTeam({...editTeam, name:e.target.value})}/>
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-500 uppercase ml-1">PIN (4 Ziffern)</label>
                                    <input type="text" maxLength={4} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white focus:border-indigo-500 outline-none"
                                        value={editTeam.pin} onChange={e => setEditTeam({...editTeam, pin:e.target.value})}/>
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-500 uppercase ml-1">Farbe</label>
                                    <input type="color" className="w-full h-12 bg-transparent border-none cursor-pointer"
                                        value={editTeam.color} onChange={e => setEditTeam({...editTeam, color:e.target.value})}/>
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-500 uppercase ml-1">Kalender-Typ</label>
                                    <div className="flex gap-2">
                                        {['montage','beplankung','both'].map(ct => (
                                            <button key={ct} onClick={() => setEditTeam({...editTeam, calType:ct})}
                                                style={{ flex:1, padding:'8px 4px', borderRadius:8, border:'none', fontSize:8, fontWeight:900, textTransform:'uppercase', cursor:'pointer',
                                                    background: editTeam.calType===ct ? (ct==='montage'?'#2563eb':ct==='beplankung'?'#059669':'#7c3aed') : '#1e293b',
                                                    color: editTeam.calType===ct ? '#fff' : '#64748b' }}>
                                                {ct==='montage'?'🔧 Montage':ct==='beplankung'?'🏗 Beplankung':'⚡ Beide'}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                            <div className="flex gap-3 mt-8">
                                <button onClick={() => setEditTeam(null)} className="flex-1 text-slate-500 font-bold hover:text-white transition-colors">ABBRECHEN</button>
                                <button onClick={handleSaveEditTeam} className="flex-1 bg-indigo-600 text-white font-bold py-3 rounded-xl shadow-lg shadow-indigo-500/20">SPEICHERN</button>
                            </div>
                        </div>
                    </div>
                )}

                {deleteConfirm && (
                    <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-950/95 backdrop-blur-md">
                        <div className="bg-slate-900 border border-red-500/30 w-full max-w-sm rounded-3xl p-8 shadow-2xl shadow-red-500/10">
                            <div className="flex justify-center mb-6">
                                <div className="w-16 h-16 bg-red-500/10 rounded-2xl flex items-center justify-center text-red-500">
                                    <Icon name="alert-triangle" size={32}/>
                                </div>
                            </div>
                            <h3 className="text-xl font-black text-white mb-2 text-center uppercase italic">Sicherheitsprüfung</h3>
                            <p className="text-slate-400 text-center text-xs font-bold mb-6 uppercase">Code <span className="text-white">8852</span> eingeben um "{deleteConfirm.name}" zu löschen:</p>
                            <input type="password" placeholder="Admin-Code"
                                className="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-center text-xl font-black tracking-widest text-red-500 focus:border-red-500 outline-none mb-6"
                                value={deleteCodeInput} onChange={e => setDeleteCodeInput(e.target.value)}/>
                            <div className="flex gap-3">
                                <button onClick={() => { setDeleteConfirm(null); setDeleteCodeInput(""); }} className="flex-1 text-slate-500 font-bold hover:text-white transition-colors">ABBRECHEN</button>
                                <button onClick={confirmDelete} className="flex-1 bg-red-600 text-white font-bold py-3 rounded-xl shadow-lg shadow-red-500/20 uppercase text-xs">GRUPPE LÖSCHEN</button>
                            </div>
                        </div>
                    </div>
                )}

                {isAdding && (
                    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/90 backdrop-blur-sm">
                        <div className="bg-slate-900 border border-white/10 w-full max-w-sm rounded-3xl p-8 shadow-2xl">
                            <h3 className="text-xl font-black text-white mb-6 uppercase italic">Neue Gruppe</h3>
                            <div className="space-y-4">
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-500 uppercase ml-1">Team Name</label>
                                    <input type="text" placeholder="Zürich / Montage A"
                                        className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white focus:border-indigo-500 outline-none"
                                        value={newTeam.name} onChange={e => setNewTeam({...newTeam, name:e.target.value})}/>
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-500 uppercase ml-1">Team PIN (4 Ziffern)</label>
                                    <input type="text" placeholder="1234" maxLength={4}
                                        className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white focus:border-indigo-500 outline-none"
                                        value={newTeam.pin} onChange={e => setNewTeam({...newTeam, pin:e.target.value})}/>
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-500 uppercase ml-1">Farbe</label>
                                    <input type="color" className="w-full h-12 bg-transparent border-none cursor-pointer"
                                        value={newTeam.color} onChange={e => setNewTeam({...newTeam, color:e.target.value})}/>
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-500 uppercase ml-1">Kalender-Typ</label>
                                    <div className="flex gap-2">
                                        {['montage','beplankung','both'].map(ct => (
                                            <button key={ct} onClick={() => setNewTeam({...newTeam, calType:ct})}
                                                style={{ flex:1, padding:'8px 4px', borderRadius:8, border:'none', fontSize:8, fontWeight:900, textTransform:'uppercase', cursor:'pointer',
                                                    background: newTeam.calType===ct ? (ct==='montage'?'#2563eb':ct==='beplankung'?'#059669':'#7c3aed') : '#1e293b',
                                                    color: newTeam.calType===ct ? '#fff' : '#64748b' }}>
                                                {ct==='montage'?'🔧 Montage':ct==='beplankung'?'🏗 Beplankung':'⚡ Beide'}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                            <div className="flex gap-3 mt-8">
                                <button onClick={() => setIsAdding(false)} className="flex-1 text-slate-500 font-bold hover:text-white transition-colors">ABBRECHEN</button>
                                <button onClick={handleAddTeam} className="flex-1 bg-indigo-600 text-white font-bold py-3 rounded-xl shadow-lg shadow-indigo-500/20">ERSTELLEN</button>
                            </div>
                        </div>
                    </div>
                )}
            </div>
        );
    };

    // ─────────────────────────────────────────────────────────────
    // MAIN APP
    // ─────────────────────────────────────────────────────────────
    const App = () => {
        const [authState, setAuthState] = useState(null);
        const [teams, setTeams] = useState([]);
        const [user, setUser] = useState(null);

        useEffect(() => {
            const waitAndInit = () => {
                if (!window.FirebaseSDK) { setTimeout(waitAndInit, 100); return; }
                const { db, collection, onSnapshot } = window.FirebaseSDK;
                const unsub = onSnapshot(collection(db, 'teams_config'), (snap) => {
                    setTeams(snap.docs.map(d => ({ ...d.data() })));
                    setUser(true);
                }, err => {
                    console.error("Error:", err);
                    setUser('error_' + err.message);
                });
                return unsub;
            };
            waitAndInit();
        }, []);

        if (!user) return <div className="min-h-screen bg-slate-950 flex items-center justify-center text-indigo-500 font-black animate-pulse uppercase tracking-[1em]">LADE SYSTEM...</div>;

        if (!authState) return <LoginScreen teams={teams} onLogin={(role,team) => setAuthState({role,team})}/>;

        if (authState.role === 'admin') {
            if (authState.showStandby) {
                return <StandbyView appId={APP_ID} onBack={() => setAuthState({...authState, showStandby:false})}/>;
            }
            if (authState.showBilling) {
                return <AdminBillingView teams={teams} appId={APP_ID} onBack={() => setAuthState({...authState, showBilling:false})}/>;
            }
            if (authState.adminViewingTeam) {
                return <CalendarView
                    team={authState.adminViewingTeam}
                    appId={APP_ID}
                    isAdminAccess={true}
                    activeCalType={authState.adminCalType || 'montage'}
                    onBack={() => setAuthState({...authState, adminViewingTeam:null, adminCalType:null})}
                />;
            }
            return <AdminPanel
                teams={teams}
                appId={APP_ID}
                onLogout={() => setAuthState(null)}
                onSelectTeam={(team, calType) => setAuthState({...authState, adminViewingTeam:team, adminCalType:calType})}
                onOpenBilling={() => setAuthState({...authState, showBilling:true})}
                onOpenStandby={() => setAuthState({...authState, showStandby:true})}
            />;
        }

        const team = authState.team;
        const calType = team.calType || 'montage';

        return <CalendarView
            team={team}
            appId={APP_ID}
            activeCalType={authState.activeCalType || (calType==='beplankung'?'beplankung':'montage')}
            onBack={() => setAuthState(null)}
        />;
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
</script>
</body>
</html>
