<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Team Kalender Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">

    <script>
        // ── LOKALE DATENBANK — localStorage, funktioniert ohne Server/Firebase ──
        (function() {
            const _listeners = {};

            function _getCol(col) {
                try { return JSON.parse(localStorage.getItem('pe_' + col) || '{}'); }
                catch(e) { return {}; }
            }

            function _setCol(col, data) {
                try {
                    localStorage.setItem('pe_' + col, JSON.stringify(data));
                    _notify(col, data);
                } catch(e) { throw new Error('Speicherfehler: ' + e.message); }
            }

            function _notify(col, data) {
                const snap = _makeSnap(data);
                (_listeners[col] || []).forEach(cb => { try { cb(snap); } catch(e) {} });
            }

            function _makeSnap(data) {
                const docs = Object.entries(data).map(([id, d]) => ({
                    id: id,
                    data: () => ({ ...d })
                }));
                return { docs };
            }

            const db = {};

            function collection(db, colName) {
                return { _type: 'col', _col: colName };
            }

            function doc(db, colName, docId) {
                return { _type: 'doc', _col: colName, _id: docId };
            }

            function setDoc(ref, data) {
                return new Promise((resolve, reject) => {
                    try {
                        const all = _getCol(ref._col);
                        all[ref._id] = { ...data, id: ref._id };
                        _setCol(ref._col, all);
                        resolve();
                    } catch(e) { reject(e); }
                });
            }

            function updateDoc(ref, data) {
                return new Promise((resolve, reject) => {
                    try {
                        const all = _getCol(ref._col);
                        all[ref._id] = { ...(all[ref._id] || {}), ...data, id: ref._id };
                        _setCol(ref._col, all);
                        resolve();
                    } catch(e) { reject(e); }
                });
            }

            function deleteDoc(ref) {
                return new Promise((resolve, reject) => {
                    try {
                        const all = _getCol(ref._col);
                        delete all[ref._id];
                        _setCol(ref._col, all);
                        resolve();
                    } catch(e) { reject(e); }
                });
            }

            function onSnapshot(ref, callback, errorCallback) {
                if (ref._type !== 'col') return () => {};
                const col = ref._col;
                if (!_listeners[col]) _listeners[col] = [];
                _listeners[col].push(callback);

                try {
                    const data = _getCol(col);
                    callback(_makeSnap(data));
                } catch(e) {
                    if (errorCallback) errorCallback(e);
                }

                const handler = (e) => {
                    if (e.key === 'pe_' + col) {
                        try { callback(_makeSnap(_getCol(col))); } catch(ex) {}
                    }
                };
                window.addEventListener('storage', handler);

                return () => {
                    _listeners[col] = (_listeners[col] || []).filter(c => c !== callback);
                    window.removeEventListener('storage', handler);
                };
            }

            window.FirebaseSDK = { db, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot };
            window.FirebaseReady = true;
            console.log("✓ Lokale Datenbank bereit (localStorage)");
        })();
    </script>

    <style>
        :root {
            --primary: #60a5fa;
            --bg-main: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
        }
        body {
            overscroll-behavior-y: contain;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: #f8fafc;
            -webkit-font-smoothing: antialiased;
        }
        * { -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(30,41,59,0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .page-transition { animation: slideUp 0.2s ease-out; }
        @keyframes slideUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

        .cal-col { border-right: 1px solid #e2e8f0; min-height: 120px; padding: 4px; display: flex; flex-direction: column; gap: 4px; }
        .cal-col:last-child { border-right: none; }
        .cal-card-item { border-radius: 4px; padding: 6px 7px; border-left: 2.5px solid; position: relative; font-size: 11px; transition: opacity 0.15s; }
        .green-dot { position: absolute; top: 4px; right: 4px; width: 7px; height: 7px; border-radius: 50%; background: #10b981; }
        @keyframes gd { 0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,0.7);} 50%{box-shadow:0 0 6px 3px rgba(16,185,129,0.3);} }
        .green-dot { animation: gd 2s infinite; }

        .done-card { opacity: 0.55; }
        .done-stamp {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%) rotate(-15deg);
            font-size: 9px; font-weight: 900; color: #10b981; border: 1.5px solid #10b981;
            padding: 1px 6px; border-radius: 3px; text-transform: uppercase; letter-spacing: 1px;
            background: rgba(16,185,129,0.1); pointer-events: none; white-space: nowrap;
        }
        .billed-stamp {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%) rotate(-15deg);
            font-size: 9px; font-weight: 900; color: #a855f7; border: 1.5px solid #a855f7;
            padding: 1px 6px; border-radius: 3px; text-transform: uppercase; letter-spacing: 1px;
            background: rgba(168,85,247,0.1); pointer-events: none; white-space: nowrap;
        }

        .delete-mode-card:hover { opacity: 0.7 !important; outline: 2px solid #ef4444; }
        .paste-target-col { background: rgba(245,158,11,0.08) !important; }
        .paste-target-col:hover { background: rgba(245,158,11,0.18) !important; cursor: copy; }

        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .live-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.7); } 70% { box-shadow: 0 0 0 10px rgba(34,197,94,0); } 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); } }

        .type-tab { padding: 5px 14px; border-radius: 8px; font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; border: none; transition: all 0.15s; }
        .type-tab.active-montage { background: #2563eb; color: #fff; }
        .type-tab.active-beplankung { background: #059669; color: #fff; }
        .type-tab.inactive { background: #1e293b; color: #64748b; }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useMemo, useRef, memo, useCallback } = React;

    const APP_ID = 'montage-pe-a5f79';
    const ADMIN_PIN = "8852";

    const genId = () => {
        try { return crypto.randomUUID(); } catch(e) {}
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
            const r = Math.random()*16|0, v = c==='x' ? r : (r&0x3|0x8);
            return v.toString(16);
        });
    };

    const CARD_COLORS = ['#cfe2ff','#d1e7dd','#fff3cd','#f8d7da','#e2d9f3','#d0f4de','#fce4ec','#e8f5e9','#fff8e1','#e3f2fd','#f3e5f5','#e0f7fa'];
    const CARD_BORDER = ['#0d6efd','#198754','#ffc107','#dc3545','#6f42c1','#20c997','#e91e63','#4caf50','#ff9800','#2196f3','#9c27b0','#00bcd4'];
    const CARD_TEXT  = ['#052c65','#0a3622','#664d03','#58151c','#2c1654','#0a3622','#560a21','#1b5e20','#4d3700','#0d2b6e','#3b0764','#003d47'];
    const DAY_NAMES = ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];

    const Icon = memo(({ name, size=18, className="" }) => {
        const iconRef = useRef(null);
        useEffect(() => {
            if (window.lucide && iconRef.current) {
                iconRef.current.innerHTML = '';
                const i = document.createElement('i');
                i.setAttribute('data-lucide-name', name);
                iconRef.current.appendChild(i);
                window.lucide.createIcons({ attrs: { class: className, style: `width:${size}px;height:${size}px;` }, nameAttr: 'data-lucide-name' });
            }
        }, [name, className, size]);
        return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`}></span>;
    });

    const formatDate = (isoStr) => {
        if (!isoStr) return "N/A";
        const d = new Date(isoStr);
        return isNaN(d.getTime()) ? "N/A" : d.toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'numeric' });
    };

    const getWeekNumber = (d) => {
        d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
        const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    };

    const getCalWeekDays = (base) => {
        const d = new Date(base);
        const day = d.getDay();
        const diffToMon = (day === 0) ? -6 : 1 - day;
        const mon = new Date(d.getFullYear(), d.getMonth(), d.getDate() + diffToMon);
        return Array.from({length:6}, (_,i) => new Date(mon.getFullYear(), mon.getMonth(), mon.getDate()+i));
    };

    const toLocalDateStr = (dateObj) => {
        const y = dateObj.getFullYear();
        const m = String(dateObj.getMonth()+1).padStart(2,'0');
        const d = String(dateObj.getDate()).padStart(2,'0');
        return `${y}-${m}-${d}`;
    };

    // ─────────────────────────────────────────────────────────────
    // LOGIN SCREEN
    // ─────────────────────────────────────────────────────────────
    const LoginScreen = ({ onLogin, teams }) => {
        const [pin, setPin] = useState("");
        const [error, setError] = useState("");

        const handleAction = (val) => {
            if (val === 'C') { setPin(""); return; }
            if (pin.length >= 4) return;
            const newPin = pin + val;
            setPin(newPin);
            if (newPin.length === 4) {
                if (newPin === ADMIN_PIN) { onLogin('admin'); return; }
                const team = teams.find(t => t.pin === newPin);
                if (team) onLogin('team', team);
                else { setError("Falscher PIN"); setTimeout(() => { setPin(""); setError(""); }, 1000); }
            }
        };

        return (
            <div className="min-h-screen flex items-center justify-center p-6 bg-slate-950">
                <div className="w-full max-w-sm text-center">
                    <div className="mb-12">
                        <div className="w-20 h-20 bg-indigo-600 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-2xl shadow-indigo-500/20">
                            <Icon name="calendar" size={40} className="text-white"/>
                        </div>
                        <h1 className="text-3xl font-black tracking-tight text-white uppercase italic">PE-MONTAGE</h1>
                        <p className="text-slate-500 mt-2 font-medium tracking-widest uppercase text-[10px]">Tourendisposition</p>
                    </div>
                    <div className="mb-8">
                        <div className="flex justify-center gap-4 mb-4">
                            {[0,1,2,3].map(i => (
                                <div key={i} className={`w-4 h-4 rounded-full border-2 transition-all duration-300 ${pin.length>i?'bg-indigo-500 border-indigo-500 scale-125':'border-slate-700'}`}></div>
                            ))}
                        </div>
                        {error && <p className="text-red-500 text-sm font-bold uppercase tracking-widest">{error}</p>}
                    </div>
                    <div className="grid grid-cols-3 gap-4">
                        {[1,2,3,4,5,6,7,8,9,'C',0].map(n => (
                            <button key={n} onClick={() => handleAction(n)}
                                className={`h-16 rounded-2xl text-xl font-bold transition-all active:scale-90 flex items-center justify-center ${n==='C'?'bg-slate-800 text-slate-400':'bg-slate-900 text-white hover:bg-slate-800'}`}>
                                {n}
                            </button>
                        ))}
                    </div>
                </div>
            </div>
        );
    };

    // ─────────────────────────────────────────────────────────────
    // IMPORT MODAL
    // ─────────────────────────────────────────────────────────────
    function ImportModal({ calWeek, team, currentCalLabel, activeCalType, appId, days, onClose, onDone }) {
        const [text, setText] = useState('');
        const [saving, setSaving] = useState(false);
        const [preview, setPreview] = useState([]);

        const DAY_NAMES_IMPORT = ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];

        const parseImportText = (raw) => {
            if (!raw.trim()) return [];
            const lines = raw.split(/\r?\n/);
            let currentDay = null;
            const result = [];

            const weekDayMap = {};
            DAY_NAMES_IMPORT.forEach((name, i) => {
                weekDayMap[name.toLowerCase()] = days[i];
            });
            weekDayMap['sonntag'] = null;

            const dayRegex = /(Montag|Dienstag|Mittwoch|Donnerstag|Freitag|Samstag|Sonntag)\s*(\d{2}\.\d{2}\.\d{4})?/i;

            for (let line of lines) {
                const trimmed = line.trim();
                if (!trimmed) continue;

                const dayMatch = trimmed.match(dayRegex);
                if (dayMatch && !trimmed.includes('/')) {
                    const dayNameLower = dayMatch[1].toLowerCase();
                    if (weekDayMap[dayNameLower] !== undefined) {
                        currentDay = weekDayMap[dayNameLower];
                    }
                    if (dayMatch[2]) {
                        const [d, m, y] = dayMatch[2].split('.');
                        currentDay = new Date(parseInt(y), parseInt(m) - 1, parseInt(d));
                    }
                    continue;
                }

                if (!currentDay && !trimmed.includes('/')) continue;
                if (!currentDay) currentDay = days[0];

                const rawParts = trimmed.split('/');
                if (rawParts.length < 2) continue;

                const p = rawParts.map(x => x.trim());

                let entryType = 'LIEFERUNG';
                let offset = 0;
                const knownTypes = ['LIEFERUNG','MONTAGE','DEMONTAGE','ABHOLUNG','BEPLANKUNG','GIPSER','SERVICE','ABNAHME','RETOURE'];
                if (knownTypes.includes(p[0].toUpperCase())) {
                    entryType = p[0].toUpperCase();
                    offset = 1;
                }

                const customer   = p[offset]     || '';
                const address    = p[offset + 1] || '';
                const memo       = p[offset + 2] || '';
                const auftragsNr = p.slice(offset + 3).join('/').trim();

                if (!customer) continue;

                const eleMatch = (memo + ' ' + auftragsNr).match(/(\d+)\s*ELE/i);
                const target = eleMatch ? parseInt(eleMatch[1]) : 0;

                result.push({
                    entryType, customer, address, memo, auftragsNr, target,
                    deliveryDate: toLocalDateStr(currentDay),
                    calType: activeCalType,
                });
            }
            return result;
        };

        const handleTextChange = (val) => {
            setText(val);
            setPreview(parseImportText(val));
        };

        const doImport = async () => {
            const entries = parseImportText(text);
            if (entries.length === 0) {
                alert('Keine Aufträge erkannt.\n\nFormat:\nMontag\nKunde AG / Adresse / Memo / AuftragsNr');
                return;
            }
            setSaving(true);
            try {
                const { db, doc, setDoc } = window.FirebaseSDK;
                const path = `teams_cal_${team.id}`;
                for (const e of entries) {
                    const id = `cal-${genId()}`;
                    await setDoc(doc(db, path, id), {
                        ...e, id, image: null,
                        createdAt: new Date().toISOString(),
                        isDone: false, isBilled: false,
                    });
                }
                onDone(entries.length);
            } catch(err) {
                alert('Fehler: ' + err.message);
                setSaving(false);
            }
        };

        return (
            <div style={{ position:'fixed', inset:0, zIndex:50, background:'rgba(15,23,42,0.99)', padding:'16px', display:'flex', flexDirection:'column', gap:12 }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
                    <div>
                        <div style={{ color:'#60a5fa', fontSize:11, fontWeight:900, textTransform:'uppercase', letterSpacing:1 }}>
                            Import → KW {getWeekNumber(calWeek)} — {team.name} ({currentCalLabel})
                        </div>
                        <div style={{ color:'#94a3b8', fontSize:9, marginTop:3 }}>
                            Tagname = Tagesheader · Felder mit <strong style={{color:'#fff'}}>/</strong> trennen · Typ optional
                        </div>
                    </div>
                    <button onClick={onClose} style={{ background:'#334155', border:'none', borderRadius:8, width:32, height:32, cursor:'pointer', color:'#94a3b8', fontSize:16, display:'flex', alignItems:'center', justifyContent:'center' }}>✕</button>
                </div>

                <div style={{ background:'#0f172a', borderRadius:10, padding:'10px 14px', border:'1px solid #1e293b' }}>
                    <div style={{ color:'#475569', fontSize:8, fontWeight:900, textTransform:'uppercase', marginBottom:4 }}>Format:</div>
                    <pre style={{ margin:0, color:'#64748b', fontSize:9, lineHeight:1.8, fontFamily:'monospace' }}>{"Montag\nLIEFERUNG / Knecht AG / Segelhofstr. 5 / 47 ELE\nMueller GmbH / Bahnhofstrasse 10 Zuerich\n\nDienstag\nSchmidt AG / Hauptstrasse 3 / 12 ELE"}</pre>
                </div>

                <div style={{ flex:1, display:'flex', gap:12, minHeight:0 }}>
                    <div style={{ flex:1, display:'flex', flexDirection:'column', gap:6 }}>
                        <div style={{ color:'#64748b', fontSize:9, fontWeight:900, textTransform:'uppercase' }}>Eingabe</div>
                        <textarea
                            autoFocus
                            style={{ flex:1, width:'100%', background:'#1e293b', border:'1px solid #334155', padding:'12px', borderRadius:10, fontSize:11, color:'#f8fafc', fontFamily:'monospace', resize:'none', boxSizing:'border-box', lineHeight:1.6 }}
                            placeholder={"Montag\nKunde AG / Adresse / Memo / AuftragsNr\n\nDienstag\nNächster Kunde / Adresse"}
                            value={text}
                            onChange={e => handleTextChange(e.target.value)}
                        />
                    </div>
                    <div style={{ width:240, display:'flex', flexDirection:'column', gap:6 }}>
                        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                            <div style={{ color:'#64748b', fontSize:9, fontWeight:900, textTransform:'uppercase' }}>Vorschau</div>
                            <div style={{ background: preview.length>0?'#10b981':'#334155', color:'#fff', fontSize:9, fontWeight:900, padding:'2px 8px', borderRadius:20 }}>
                                {preview.length} Aufträge
                            </div>
                        </div>
                        <div style={{ flex:1, overflowY:'auto', display:'flex', flexDirection:'column', gap:4 }}>
                            {preview.length === 0 && (
                                <div style={{ color:'#475569', fontSize:10, textAlign:'center', marginTop:20 }}>
                                    Noch keine Aufträge erkannt.
                                </div>
                            )}
                            {preview.map((e,i) => (
                                <div key={i} style={{ background:'#1e293b', border:'1px solid #334155', borderLeft:'3px solid #10b981', borderRadius:6, padding:'6px 8px' }}>
                                    <div style={{ color:'#94a3b8', fontSize:7, fontWeight:900, marginBottom:2 }}>
                                        {formatDate(e.deliveryDate)} · {e.entryType}
                                    </div>
                                    <div style={{ color:'#fff', fontSize:9, fontWeight:900, lineHeight:1.2 }}>{e.customer}</div>
                                    {e.address && <div style={{ color:'#64748b', fontSize:8 }}>{e.address}</div>}
                                    {e.target>0 && <div style={{ color:'#10b981', fontSize:7, marginTop:1 }}>{e.target} ELE</div>}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>

                <div style={{ display:'flex', gap:12 }}>
                    <button onClick={onClose}
                        style={{ flex:1, padding:'13px', background:'transparent', border:'1px solid #334155', borderRadius:12, color:'#64748b', fontWeight:900, fontSize:10, textTransform:'uppercase', cursor:'pointer' }}>
                        Abbrechen
                    </button>
                    <button onClick={doImport} disabled={saving || preview.length===0}
                        style={{ flex:2, padding:'13px', background: preview.length>0&&!saving ? '#3b82f6' : '#1e293b', border:'none', borderRadius:12, color: preview.length>0&&!saving ? '#fff' : '#475569', fontWeight:900, fontSize:10, textTransform:'uppercase', cursor: preview.length>0&&!saving ? 'pointer' : 'not-allowed' }}>
                        {saving ? '⏳ Wird gespeichert...' : preview.length>0 ? `✓ ${preview.length} Aufträge importieren` : 'Text eingeben...'}
                    </button>
                </div>
            </div>
        );
    }

    // ─────────────────────────────────────────────────────────────
    // CALENDAR VIEW
    // ─────────────────────────────────────────────────────────────
    function CalendarView({ team, onBack, appId, isAdminAccess=false, activeCalType: initialCalType }) {
        const [calEntries, setCalEntries] = useState([]);
        const [calWeek, setCalWeek] = useState(new Date());
        const [editCalEntry, setEditCalEntry] = useState(null);
        const [showCalImport, setShowCalImport] = useState(false);
        const [calImportResult, setCalImportResult] = useState(null);
        const [showCalPdfModal, setShowCalPdfModal] = useState(null);
        const [deleteMode, setDeleteMode] = useState(false);
        const [copyEntry, setCopyEntry] = useState(null);
        const [showStandbyPicker, setShowStandbyPicker] = useState(null);
        const [standbyItems, setStandbyItems] = useState([]);
        const [standbySearch, setStandbySearch] = useState('');
        const [standbyDateModal, setStandbyDateModal] = useState(null);
        const [activeCalType, setActiveCalType] = useState(
            initialCalType || (team.calType === 'beplankung' ? 'beplankung' : 'montage')
        );

        const days = getCalWeekDays(calWeek);
        const currentCalLabel = activeCalType === 'beplankung' ? 'BEPLANKUNG' : 'MONTAGE';

        useEffect(() => {
            const { db, collection, onSnapshot } = window.FirebaseSDK;
            const path = `teams_cal_${team.id}`;
            const unsub = onSnapshot(collection(db, path), (snap) => {
                setCalEntries(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
            }, err => console.error("Error:", err));
            return unsub;
        }, [team.id, appId]);

        useEffect(() => {
            const { db, collection, onSnapshot } = window.FirebaseSDK;
            const unsub = onSnapshot(collection(db, 'standby_items'), snap => {
                setStandbyItems(snap.docs.map(d => ({ id: d.id, ...d.data() })));
            });
            return unsub;
        }, []);

        const filteredEntries = useMemo(() =>
            calEntries.filter(e => (e.calType || 'montage') === activeCalType),
        [calEntries, activeCalType]);

        const entriesForDay = useCallback((dayStr) =>
            filteredEntries.filter(e => e.deliveryDate && e.deliveryDate.substring(0,10) === dayStr),
        [filteredEntries]);

        const colorIndex = useMemo(() => {
            const map = {};
            filteredEntries.forEach((e,i) => { map[e.id] = i % CARD_COLORS.length; });
            return map;
        }, [filteredEntries]);

        const deleteCalEntry = async (id) => {
            const { db, doc, deleteDoc } = window.FirebaseSDK;
            await deleteDoc(doc(db, `teams_cal_${team.id}`, id));
        };

        const toggleDone = async (entry) => {
            const { db, doc, updateDoc } = window.FirebaseSDK;
            await updateDoc(doc(db, `teams_cal_${team.id}`, entry.id), {
                isDone: !entry.isDone,
                doneAt: !entry.isDone ? new Date().toISOString() : null
            });
        };

        const compressCalImage = (file) => new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w=img.width, h=img.height;
                    if(w>1200){h*=1200/w;w=1200;}
                    canvas.width=w; canvas.height=h;
                    canvas.getContext('2d').drawImage(img,0,0,w,h);
                    resolve(canvas.toDataURL('image/jpeg',0.7));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });

        const saveCalEntry = async (entry) => {
            try {
                const { db, doc, updateDoc } = window.FirebaseSDK;
                await updateDoc(doc(db, `teams_cal_${team.id}`, entry.id), {
                    entryType: entry.entryType || 'LIEFERUNG',
                    customer: entry.customer || '',
                    address: entry.address || '',
                    memo: entry.memo || '',
                    auftragsNr: entry.auftragsNr || '',
                    target: parseInt(entry.target) || 0,
                    deliveryDate: entry.deliveryDate,
                    image: entry.image || null,
                    calType: entry.calType || 'montage',
                });
                setEditCalEntry(null);
            } catch(err) {
                alert('Fehler: ' + err.message);
            }
        };

        const saveNewCalEntry = async (entry) => {
            try {
                const { db, doc, setDoc } = window.FirebaseSDK;
                const path = `teams_cal_${team.id}`;
                const id = `cal-${genId()}`;
                const payload = {
                    ...entry, id,
                    createdAt: new Date().toISOString(),
                    isDone: false, isBilled: false,
                    entryType: entry.entryType || 'LIEFERUNG',
                    calType: entry.calType || activeCalType,
                    target: parseInt(entry.target) || 0,
                    image: entry.image || null,
                    memo: entry.memo || '',
                    address: entry.address || '',
                    auftragsNr: entry.auftragsNr || '',
                };
                delete payload.isNew;
                await setDoc(doc(db, path, id), payload);
                setEditCalEntry(null);
            } catch(err) {
                alert('Fehler: ' + err.message);
            }
        };

        const triggerEntryPDF = (entry) => {
            setShowCalPdfModal(entry);
            setTimeout(() => {
                const el = document.getElementById('cal-single-pdf-content');
                if (!el) return;
                html2pdf().set({
                    margin:10, filename:`Auftrag_${(entry.auftragsNr||'export').replace(/\//g,'_')}.pdf`,
                    image:{type:'jpeg',quality:0.98}, html2canvas:{scale:2,useCORS:true,backgroundColor:'#ffffff'},
                    jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},
                }).from(el).save().then(() => setShowCalPdfModal(null));
            }, 300);
        };

        const triggerWeekPDF = () => {
            setTimeout(() => {
                const el = document.getElementById('cal-week-pdf-content');
                if (!el) return;
                html2pdf().set({
                    margin:5, filename:`Kalender_KW${getWeekNumber(calWeek)}.pdf`,
                    image:{type:'jpeg',quality:0.98}, html2canvas:{scale:2,useCORS:true,backgroundColor:'#ffffff'},
                    jsPDF:{unit:'mm',format:'a3',orientation:'landscape'},
                }).from(el).save();
            }, 200);
        };

        const pasteCopyToDay = async (dayStr) => {
            if (!copyEntry) return;
            const { db, doc, setDoc } = window.FirebaseSDK;
            const path = `teams_cal_${team.id}`;
            const id = `cal-${genId()}`;
            await setDoc(doc(db, path, id), { ...copyEntry, id, deliveryDate:dayStr, createdAt:new Date().toISOString(), isDone:false, isBilled:false });
            setCopyEntry(null);
        };

        const insertStandbyItem = async (item, startDateStr, endDateStr) => {
            const { db, doc, setDoc } = window.FirebaseSDK;
            const start = new Date(startDateStr);
            const end = new Date(endDateStr);
            const d = new Date(start);
            while (d <= end) {
                const dayStr = toLocalDateStr(d);
                const dow = d.getDay();
                if (dow !== 0) {
                    const id = `cal-${genId()}`;
                    await setDoc(doc(db, `teams_cal_${team.id}`, id), {
                        id, entryType: 'LIEFERUNG',
                        customer: item.customer, address: item.address,
                        memo: item.memo, auftragsNr: item.auftragsNr,
                        target: item.target || 0, deliveryDate: dayStr,
                        image: null, calType: activeCalType,
                        createdAt: new Date().toISOString(),
                        isDone: false, isBilled: false, fromStandby: item.id,
                    });
                }
                d.setDate(d.getDate() + 1);
            }
            setStandbyDateModal(null);
            setShowStandbyPicker(null);
        };

        const defaultNewDate = toLocalDateStr(days[0]);
        const emptyEntry = { isNew:true, customer:'', address:'', memo:'', auftragsNr:'',
            target:'', image:null, entryType:'LIEFERUNG', deliveryDate:defaultNewDate, calType:activeCalType };

        const calTypeBg = activeCalType === 'beplankung' ? '#059669' : '#2563eb';
        const calTypeLabel = activeCalType === 'beplankung' ? '🏗 BEPLANKUNG / GIPSER' : '🔧 MONTAGE';

        return (
            <div style={{ minHeight:'100vh', background:'#f1f5f9', display:'flex', flexDirection:'column' }}>

                {/* Hidden PDF areas */}
                <div style={{ position:'absolute', left:'-9999px', top:0 }}>
                    {showCalPdfModal && (
                        <div id="cal-single-pdf-content" style={{ padding:'15mm', background:'#fff', color:'#000', fontFamily:'Inter,Arial,sans-serif', width:'190mm' }}>
                            <h1 style={{ fontSize:'22pt', fontWeight:900, borderBottom:'2pt solid #000', paddingBottom:'4mm', marginBottom:'6mm', textTransform:'uppercase' }}>Auftrag</h1>
                            <table style={{ width:'100%', marginBottom:'8mm', fontSize:'11pt' }}>
                                <tbody>
                                    <tr><td style={{ color:'#888', fontWeight:'bold', width:'35mm', paddingBottom:'3mm' }}>Auftragsnr.</td><td style={{ fontWeight:900 }}>{showCalPdfModal.auftragsNr||'—'}</td></tr>
                                    <tr><td style={{ color:'#888', fontWeight:'bold', paddingBottom:'3mm' }}>Kunde</td><td style={{ fontWeight:'bold' }}>{showCalPdfModal.customer}</td></tr>
                                    <tr><td style={{ color:'#888', fontWeight:'bold', paddingBottom:'3mm' }}>Adresse</td><td>{showCalPdfModal.address}</td></tr>
                                    <tr><td style={{ color:'#888', fontWeight:'bold', paddingBottom:'3mm' }}>Datum</td><td>{formatDate(showCalPdfModal.deliveryDate)}</td></tr>
                                    <tr><td style={{ color:'#888', fontWeight:'bold', paddingBottom:'3mm' }}>Memo</td><td>{showCalPdfModal.memo}</td></tr>
                                    {showCalPdfModal.target>0&&<tr><td style={{ color:'#888', fontWeight:'bold' }}>ELE</td><td style={{ fontWeight:900 }}>{showCalPdfModal.target} ELE</td></tr>}
                                </tbody>
                            </table>
                            {showCalPdfModal.image && (
                                <div style={{ textAlign:'center', marginTop:'8mm' }}>
                                    <img src={showCalPdfModal.image} style={{ maxWidth:'100%', maxHeight:'160mm', objectFit:'contain', display:'block', margin:'0 auto' }}/>
                                </div>
                            )}
                        </div>
                    )}
                    <div id="cal-week-pdf-content" style={{ padding:'8mm', background:'#fff', fontFamily:'Inter,Arial,sans-serif', width:'420mm' }}>
                        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'5mm', borderBottom:'1.5pt solid #000', paddingBottom:'3mm' }}>
                            <div>
                                <h1 style={{ fontSize:'16pt', fontWeight:900, margin:0, textTransform:'uppercase' }}>Wochenkalender — {team.name} ({currentCalLabel})</h1>
                                <div style={{ fontSize:'12pt', fontWeight:900, color:'#2563eb', margin:'1mm 0 0 0' }}>KW {getWeekNumber(calWeek)}</div>
                            </div>
                            <p style={{ margin:0, fontSize:'9pt', color:'#666' }}>{formatDate(toLocalDateStr(days[0]))} – {formatDate(toLocalDateStr(days[5]))}</p>
                        </div>
                        <div style={{ display:'grid', gridTemplateColumns:'repeat(6,1fr)', gap:'3mm' }}>
                            {days.map((day,di) => {
                                const dayStr=toLocalDateStr(day), dayEnt=entriesForDay(dayStr);
                                return (
                                    <div key={di}>
                                        <div style={{ background:'#f1f5f9', borderRadius:'4pt', padding:'3mm', marginBottom:'2mm', textAlign:'center' }}>
                                            <div style={{ fontSize:'9pt', fontWeight:900, textTransform:'uppercase', color:'#1e293b' }}>{DAY_NAMES[di]}</div>
                                            <div style={{ fontSize:'7pt', color:'#64748b' }}>{formatDate(dayStr)}</div>
                                            <div style={{ fontSize:'6pt', color:'#3b82f6', fontWeight:'bold' }}>{dayEnt.length} Aufträge</div>
                                        </div>
                                        {dayEnt.map((e,ei) => {
                                            const ci=colorIndex[e.id]||0;
                                            return (
                                                <div key={ei} style={{ background:CARD_COLORS[ci], borderLeft:`2pt solid ${CARD_BORDER[ci]}`, borderRadius:'4pt', padding:'2mm 3mm', marginBottom:'2mm', opacity: e.isDone ? 0.5 : 1 }}>
                                                    {e.auftragsNr&&<div style={{ fontSize:'5.5pt', color:CARD_TEXT[ci], fontWeight:900, opacity:0.7, marginBottom:'1mm' }}>{e.auftragsNr}</div>}
                                                    <div style={{ fontSize:'7pt', fontWeight:900, color:CARD_TEXT[ci], lineHeight:1.2, marginBottom:'1mm' }}>{e.customer}</div>
                                                    <div style={{ fontSize:'6pt', color:CARD_TEXT[ci], opacity:0.8, lineHeight:1.2, marginBottom:'1mm' }}>{e.address}</div>
                                                    <div style={{ fontSize:'6pt', color:CARD_TEXT[ci], opacity:0.7, lineHeight:1.2 }}>{e.memo}</div>
                                                    {e.target>0&&<div style={{ display:'inline-block', background:CARD_BORDER[ci], color:'#fff', fontSize:'5.5pt', fontWeight:900, padding:'0.5mm 2mm', borderRadius:'3pt', marginTop:'1mm' }}>{e.target} ELE</div>}
                                                    {e.isDone&&<div style={{ fontSize:'5.5pt', color:'#10b981', fontWeight:900, marginTop:'1mm' }}>✓ ERLEDIGT</div>}
                                                </div>
                                            );
                                        })}
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>

                {/* TOP NAV */}
                <div style={{ background:'#1e293b', padding:'10px 16px', display:'flex', justifyContent:'space-between', alignItems:'center', position:'sticky', top:0, zIndex:40, borderBottom:'2px solid #334155', flexShrink:0 }}>
                    <div style={{ display:'flex', alignItems:'center', gap:10, flex:'0 0 auto' }}>
                        <button onClick={onBack} style={{ background:'#334155', border:'none', borderRadius:10, width:34, height:34, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer' }}>
                            <Icon name="arrow-left" size={16} className="text-blue-400"/>
                        </button>
                        <div>
                            <div style={{ color:'#94a3b8', fontSize:8, fontWeight:900, textTransform:'uppercase', letterSpacing:1 }}>
                                {isAdminAccess?'ADMIN-ZUGRIFF':'TEAM-ANSICHT'} • Wochenkalender
                            </div>
                            <div style={{ color:'#fff', fontSize:13, fontWeight:900, fontStyle:'italic' }}>
                                {team.name} — KW {getWeekNumber(calWeek)}
                            </div>
                        </div>
                    </div>

                    {/* CAL TYPE TABS */}
                    <div style={{ display:'flex', gap:6, alignItems:'center', flex:'1 1 auto', justifyContent:'center' }}>
                        <button
                            className={`type-tab ${activeCalType==='montage'?'active-montage':'inactive'}`}
                            onClick={() => setActiveCalType('montage')}
                            style={{ fontSize:11, padding:'7px 20px' }}>
                            🔧 Montage
                        </button>
                        <button
                            className={`type-tab ${activeCalType==='beplankung'?'active-beplankung':'inactive'}`}
                            onClick={() => setActiveCalType('beplankung')}
                            style={{ fontSize:11, padding:'7px 20px' }}>
                            🏗 Beplankung
                        </button>
                    </div>

                    <div style={{ display:'flex', gap:6, alignItems:'center', flex:'0 0 auto', flexWrap:'wrap', justifyContent:'flex-end' }}>
                        <button onClick={() => { const d=new Date(calWeek); d.setDate(d.getDate()-7); setCalWeek(d); }} style={{ background:'#334155', border:'none', borderRadius:8, width:30, height:30, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
                            <Icon name="chevron-left" size={14} className="text-blue-400"/>
                        </button>
                        <button onClick={() => setCalWeek(new Date())} style={{ background:'#334155', border:'none', borderRadius:8, padding:'4px 10px', color:'#cbd5e1', fontSize:8, fontWeight:900, textTransform:'uppercase', cursor:'pointer' }}>Heute</button>
                        <button onClick={() => { const d=new Date(calWeek); d.setDate(d.getDate()+7); setCalWeek(d); }} style={{ background:'#334155', border:'none', borderRadius:8, width:30, height:30, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
                            <Icon name="chevron-right" size={14} className="text-blue-400"/>
                        </button>
                        <button onClick={() => setEditCalEntry({...emptyEntry})} style={{ background:'#10b981', border:'none', borderRadius:8, padding:'5px 12px', color:'#fff', fontSize:8, fontWeight:900, textTransform:'uppercase', cursor:'pointer', display:'flex', alignItems:'center', gap:4 }}>
                            <Icon name="plus" size={12}/>Neu
                        </button>
                        <button onClick={() => setShowStandbyPicker({ dayStr: toLocalDateStr(days[0]) })} style={{ background:'#f59e0b', border:'none', borderRadius:8, padding:'5px 12px', color:'#fff', fontSize:8, fontWeight:900, textTransform:'uppercase', cursor:'pointer', display:'flex', alignItems:'center', gap:4 }}>
                            <Icon name="archive" size={12}/>Standby
                        </button>
                        <button onClick={() => setShowCalImport(true)} style={{ background:'#3b82f6', border:'none', borderRadius:8, padding:'5px 12px', color:'#fff', fontSize:8, fontWeight:900, textTransform:'uppercase', cursor:'pointer', display:'flex', alignItems:'center', gap:4 }}>
                            <Icon name="upload" size={12}/>Import
                        </button>
                        <button onClick={triggerWeekPDF} style={{ background:'#475569', border:'none', borderRadius:8, padding:'5px 12px', color:'#fff', fontSize:8, fontWeight:900, textTransform:'uppercase', cursor:'pointer', display:'flex', alignItems:'center', gap:4 }}>
                            <Icon name="download" size={12}/>A3 PDF
                        </button>
                        <button onClick={() => { setDeleteMode(!deleteMode); setCopyEntry(null); }}
                            style={{ background:deleteMode?'#ef4444':'#334155', border:deleteMode?'2px solid #fca5a5':'none', borderRadius:8, padding:'5px 12px', color:'#fff', fontSize:8, fontWeight:900, textTransform:'uppercase', cursor:'pointer', display:'flex', alignItems:'center', gap:4 }}>
                            <Icon name={deleteMode?"x":"trash-2"} size={12}/>{deleteMode?'Fertig':'Löschen'}
                        </button>
                    </div>
                </div>

                {/* Cal type banner */}
                <div style={{ background: calTypeBg, padding:'5px 16px', textAlign:'center', fontSize:9, fontWeight:900, color:'#fff', textTransform:'uppercase', letterSpacing:2 }}>
                    {calTypeLabel} — KW {getWeekNumber(calWeek)} — {formatDate(toLocalDateStr(days[0]))} bis {formatDate(toLocalDateStr(days[5]))}
                </div>

                {deleteMode && (
                    <div style={{ background:'#ef4444', padding:'8px 16px', textAlign:'center', fontSize:10, fontWeight:900, color:'#fff', textTransform:'uppercase', letterSpacing:1 }}>
                        🗑 LÖSCHMODUS — Auftrag anklicken zum Löschen
                    </div>
                )}
                {copyEntry && (
                    <div style={{ background:'#f59e0b', padding:'8px 16px', display:'flex', justifyContent:'space-between', alignItems:'center', fontSize:10, fontWeight:900, color:'#fff' }}>
                        <span>📋 KOPIEREN: „{copyEntry.customer}" — Tag-Spalte anklicken</span>
                        <button onClick={() => setCopyEntry(null)} style={{ background:'rgba(0,0,0,0.2)', border:'none', borderRadius:6, padding:'3px 10px', color:'#fff', cursor:'pointer', fontSize:9, fontWeight:900 }}>Abbrechen</button>
                    </div>
                )}

                {/* KALENDER GRID */}
                <div style={{ flex:1, overflowX:'auto', overflowY:'auto' }}>
                    <div style={{ minWidth:760 }}>
                        <div style={{ display:'grid', gridTemplateColumns:'repeat(6,1fr)', borderBottom:'2px solid #000', background:'#1e293b' }}>
                            {DAY_NAMES.map((name,di) => (
                                <div key={di} style={{ textAlign:'center', padding:'6px 4px', borderRight:di<5?'1px solid #334155':'none' }}>
                                    <div style={{ fontSize:10, fontWeight:900, color:'#fff', textTransform:'uppercase', letterSpacing:1 }}>{name}</div>
                                    <div style={{ fontSize:9, color:'#94a3b8', marginTop:1 }}>{formatDate(toLocalDateStr(days[di]))}</div>
                                    <div style={{ fontSize:9, color:'#60a5fa', marginTop:1 }}>{entriesForDay(toLocalDateStr(days[di])).length} Aufträge</div>
                                </div>
                            ))}
                        </div>

                        <div style={{ display:'grid', gridTemplateColumns:'repeat(6,1fr)', background:'#fff', alignItems:'start' }}>
                            {days.map((day,di) => {
                                const dayStr=toLocalDateStr(day), dayEnt=entriesForDay(dayStr);
                                const isPasteTarget = copyEntry && !deleteMode;
                                return (
                                    <div key={di} className={`cal-col${isPasteTarget?' paste-target-col':''}`}
                                        onClick={() => { if(isPasteTarget) pasteCopyToDay(dayStr); }}
                                        style={{ cursor:isPasteTarget?'copy':'default' }}>
                                        {dayEnt.length===0 && (
                                            <div style={{ height:40, display:'flex', alignItems:'center', justifyContent:'center' }}>
                                                {isPasteTarget
                                                    ? <span style={{ fontSize:9, color:'#f59e0b', fontWeight:900 }}>+ Hier einfügen</span>
                                                    : <span style={{ fontSize:9, color:'#cbd5e1', fontStyle:'italic' }}>—</span>
                                                }
                                            </div>
                                        )}
                                        {dayEnt.map((e) => {
                                            const ci=colorIndex[e.id]||0;
                                            return (
                                                <div key={e.id}
                                                    className={`cal-card-item${deleteMode?' delete-mode-card':''} ${e.isDone?'done-card':''}`}
                                                    style={{ background:CARD_COLORS[ci], borderLeftColor:CARD_BORDER[ci], color:CARD_TEXT[ci], cursor:'pointer' }}
                                                    onClick={(ev) => {
                                                        ev.stopPropagation();
                                                        if(deleteMode) { if(confirm(`"${e.customer}" löschen?`)) deleteCalEntry(e.id); }
                                                        else if(copyEntry) { pasteCopyToDay(dayStr); }
                                                        else { setEditCalEntry({...e}); }
                                                    }}>
                                                    {e.image && <div className="green-dot"></div>}
                                                    {deleteMode && <div style={{ position:'absolute', top:3, left:3, background:'#ef4444', borderRadius:'50%', width:14, height:14, display:'flex', alignItems:'center', justifyContent:'center', fontSize:9, color:'#fff', fontWeight:900 }}>✕</div>}
                                                    {e.isDone && <div className="done-stamp">✓ Erledigt</div>}
                                                    {e.isBilled && <div className="billed-stamp">✓ Abgerechnet</div>}

                                                    <div style={{ fontSize:8, fontWeight:900, letterSpacing:1, textTransform:'uppercase', marginBottom:3, padding:'1px 5px', background:CARD_BORDER[ci], color:'#fff', borderRadius:2, display:'inline-block', marginLeft:deleteMode?16:0 }}>
                                                        {e.entryType||'LIEFERUNG'}
                                                    </div>
                                                    {e.auftragsNr && <div style={{ fontSize:8, fontWeight:900, opacity:0.75, marginBottom:2, textTransform:'uppercase', paddingRight:e.image?10:0 }}>{e.auftragsNr}</div>}
                                                    <div style={{ fontSize:10, fontWeight:900, lineHeight:1.3, marginBottom:2, textTransform:'uppercase' }}>{e.customer}</div>
                                                    <div style={{ fontSize:9, fontWeight:700, lineHeight:1.3, marginBottom:2, opacity:0.85 }}>{e.address}</div>
                                                    {e.memo && <div style={{ fontSize:8, lineHeight:1.3, opacity:0.75 }}>{e.memo}</div>}
                                                    {e.target>0 && <div style={{ marginTop:3, display:'inline-block', background:CARD_BORDER[ci], color:'#fff', fontSize:8, fontWeight:900, padding:'1px 5px', borderRadius:3 }}>{e.target} ELE</div>}

                                                    {!deleteMode && !copyEntry && (
                                                        <div style={{ display:'flex', gap:3, marginTop:5, justifyContent:'flex-end' }}>
                                                            <button onClick={(ev) => { ev.stopPropagation(); toggleDone(e); }}
                                                                title={e.isDone?"Als offen markieren":"Als erledigt markieren"}
                                                                style={{ background: e.isDone ? 'rgba(16,185,129,0.25)' : 'rgba(16,185,129,0.1)', border:`1px solid ${e.isDone?'#10b981':'rgba(16,185,129,0.3)'}`, borderRadius:3, padding:'2px 5px', cursor:'pointer', fontSize:8, color:'#10b981', lineHeight:1, fontWeight:900, display:'flex', alignItems:'center', gap:2 }}>
                                                                {e.isDone ? '✓ Erledigt' : '○ Erledigen'}
                                                            </button>
                                                            <button onClick={(ev) => { ev.stopPropagation(); setCopyEntry({...e}); }}
                                                                style={{ background:'rgba(37,99,235,0.15)', border:'none', borderRadius:3, padding:'2px 4px', cursor:'pointer', fontSize:9, color:'#2563eb', lineHeight:1 }}>⧉</button>
                                                            <button onClick={(ev) => { ev.stopPropagation(); if(confirm(`"${e.customer}" löschen?`)) deleteCalEntry(e.id); }}
                                                                style={{ background:'rgba(220,38,38,0.15)', border:'none', borderRadius:3, padding:'2px 4px', cursor:'pointer', fontSize:9, color:'#dc2626', lineHeight:1 }}>✕</button>
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                        {isPasteTarget && dayEnt.length>0 && (
                                            <div style={{ margin:'4px 0', padding:'6px', background:'rgba(245,158,11,0.15)', border:'1px dashed #f59e0b', borderRadius:4, textAlign:'center', fontSize:9, color:'#f59e0b', fontWeight:900 }}>+ Hier einfügen</div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>

                {/* EDIT / NEU MODAL */}
                {editCalEntry && (
                    <div style={{ position:'fixed', inset:0, zIndex:50, background:'rgba(15,23,42,0.96)', display:'flex', alignItems:'center', justifyContent:'center', padding:16, overflowY:'auto' }}>
                        <div style={{ width:'100%', maxWidth:400, background:'rgba(51,65,85,0.98)', backdropFilter:'blur(12px)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:24, padding:24, display:'flex', flexDirection:'column', gap:12 }}>
                            <h3 style={{ color:'#fff', fontSize:11, fontWeight:900, textTransform:'uppercase', fontStyle:'italic', margin:0 }}>
                                {editCalEntry.isNew ? 'Neuer Eintrag' : 'Auftrag bearbeiten'}
                            </h3>
                            {!editCalEntry.isNew && (
                                <button onClick={() => triggerEntryPDF(editCalEntry)} style={{ alignSelf:'flex-start', background:'#3b82f6', border:'none', borderRadius:8, padding:'6px 12px', color:'#fff', fontSize:9, fontWeight:900, textTransform:'uppercase', cursor:'pointer', display:'flex', alignItems:'center', gap:6 }}>
                                    <Icon name="download" size={12}/>PDF exportieren
                                </button>
                            )}
                            <div style={{ display:'flex', gap:6 }}>
                                <button onClick={() => setEditCalEntry({...editCalEntry, calType:'montage'})}
                                    style={{ flex:1, padding:'8px', borderRadius:8, border:'none', fontSize:9, fontWeight:900, textTransform:'uppercase', cursor:'pointer', background: editCalEntry.calType==='beplankung' ? '#1e293b' : '#2563eb', color: editCalEntry.calType==='beplankung' ? '#64748b' : '#fff' }}>
                                    🔧 Montage
                                </button>
                                <button onClick={() => setEditCalEntry({...editCalEntry, calType:'beplankung'})}
                                    style={{ flex:1, padding:'8px', borderRadius:8, border:'none', fontSize:9, fontWeight:900, textTransform:'uppercase', cursor:'pointer', background: editCalEntry.calType==='beplankung' ? '#059669' : '#1e293b', color: editCalEntry.calType==='beplankung' ? '#fff' : '#64748b' }}>
                                    🏗 Beplankung
                                </button>
                            </div>
                            <input style={{ width:'100%', padding:'10px 12px', borderRadius:10, background:'#0f172a', border:'2px solid #3b82f6', color:'#60a5fa', fontSize:12, fontWeight:900, textTransform:'uppercase', letterSpacing:1, boxSizing:'border-box' }}
                                placeholder="Typ (z.B. LIEFERUNG)" value={editCalEntry.entryType||'LIEFERUNG'}
                                onChange={e => setEditCalEntry({...editCalEntry, entryType:e.target.value.toUpperCase()})}/>
                            <input style={{ width:'100%', padding:'10px 12px', borderRadius:10, background:'#1e293b', border:'1px solid rgba(255,255,255,0.1)', color:'#fff', fontSize:11, boxSizing:'border-box' }}
                                placeholder="Kunde *" value={editCalEntry.customer}
                                onChange={e => setEditCalEntry({...editCalEntry, customer:e.target.value})}/>
                            <input style={{ width:'100%', padding:'10px 12px', borderRadius:10, background:'#1e293b', border:'1px solid rgba(255,255,255,0.1)', color:'#fff', fontSize:11, boxSizing:'border-box' }}
                                placeholder="Adresse" value={editCalEntry.address}
                                onChange={e => setEditCalEntry({...editCalEntry, address:e.target.value})}/>
                            <input style={{ width:'100%', padding:'10px 12px', borderRadius:10, background:'#1e293b', border:'1px solid rgba(255,255,255,0.1)', color:'#fff', fontSize:11, boxSizing:'border-box' }}
                                placeholder="Memo / Hausinfo" value={editCalEntry.memo}
                                onChange={e => setEditCalEntry({...editCalEntry, memo:e.target.value})}/>
                            <input style={{ width:'100%', padding:'10px 12px', borderRadius:10, background:'#1e293b', border:'1px solid rgba(255,255,255,0.1)', color:'#fff', fontSize:11, boxSizing:'border-box' }}
                                placeholder="Auftragsnr." value={editCalEntry.auftragsNr}
                                onChange={e => setEditCalEntry({...editCalEntry, auftragsNr:e.target.value})}/>
                            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
                                <input type="number" style={{ padding:'10px 12px', borderRadius:10, background:'#1e293b', border:'1px solid rgba(255,255,255,0.1)', color:'#fff', fontSize:11, boxSizing:'border-box' }}
                                    placeholder="ELE" value={editCalEntry.target||''}
                                    onChange={e => setEditCalEntry({...editCalEntry, target:e.target.value})}/>
                                <input type="date" style={{ padding:'10px 12px', borderRadius:10, background:'#1e293b', border:'1px solid rgba(255,255,255,0.1)', color:'#fff', fontSize:11, boxSizing:'border-box' }}
                                    value={editCalEntry.deliveryDate?.substring(0,10)||''}
                                    onChange={e => setEditCalEntry({...editCalEntry, deliveryDate:e.target.value})}/>
                            </div>
                            <div>
                                <input type="file" accept="image/*" className="hidden" id="cal-img-upload-modal"
                                    onChange={async(ev) => {
                                        if(!ev.target.files[0]) return;
                                        const b64 = await compressCalImage(ev.target.files[0]);
                                        setEditCalEntry(prev => ({...prev, image:b64}));
                                        ev.target.value='';
                                    }}/>
                                <label htmlFor="cal-img-upload-modal" style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:6, padding:'10px', border:'1px dashed rgba(255,255,255,0.2)', borderRadius:10, color:'#94a3b8', cursor:'pointer', fontSize:9, fontWeight:700, textTransform:'uppercase' }}>
                                    <Icon name="camera" size={14}/>{editCalEntry.image?'Foto ersetzen':'Foto anhängen'}
                                </label>
                                {editCalEntry.image && (
                                    <div style={{ position:'relative', marginTop:6 }}>
                                        <img src={editCalEntry.image} style={{ width:'100%', height:80, objectFit:'cover', borderRadius:8, border:'1px solid rgba(255,255,255,0.1)' }}/>
                                        <button onClick={() => setEditCalEntry(p => ({...p, image:null}))} style={{ position:'absolute', top:4, right:4, background:'#ef4444', border:'none', borderRadius:'50%', width:18, height:18, cursor:'pointer', color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', fontSize:10 }}>✕</button>
                                    </div>
                                )}
                            </div>
                            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginTop:4 }}>
                                <button onClick={() => setEditCalEntry(null)} style={{ padding:'12px', background:'transparent', border:'none', color:'#64748b', fontWeight:900, fontSize:10, textTransform:'uppercase', cursor:'pointer' }}>Abbrechen</button>
                                <button onClick={() => { if(!editCalEntry.customer) return; if(editCalEntry.isNew) saveNewCalEntry(editCalEntry); else saveCalEntry(editCalEntry); }}
                                    style={{ padding:'12px', background:'#3b82f6', border:'none', borderRadius:12, color:'#fff', fontWeight:900, fontSize:10, textTransform:'uppercase', cursor:'pointer' }}>Speichern</button>
                            </div>
                        </div>
                    </div>
                )}

                {/* STANDBY PICKER MODAL */}
                {showStandbyPicker && (
                    <div style={{ position:'fixed', inset:0, zIndex:55, background:'rgba(15,23,42,0.99)', display:'flex', flexDirection:'column', padding:0 }}>
                        <div style={{ background:'#1e293b', padding:'12px 16px', display:'flex', justifyContent:'space-between', alignItems:'center', borderBottom:'2px solid #f59e0b44' }}>
                            <div>
                                <div style={{ color:'#f59e0b', fontSize:10, fontWeight:900, textTransform:'uppercase', letterSpacing:1 }}>📦 Standby — Auftrag auswählen</div>
                                <div style={{ color:'#94a3b8', fontSize:9, marginTop:2 }}>Auftrag wählen → Zeitraum festlegen → In Kalender einfügen</div>
                            </div>
                            <button onClick={() => { setShowStandbyPicker(null); setStandbySearch(''); }} style={{ background:'#334155', border:'none', borderRadius:8, width:32, height:32, cursor:'pointer', color:'#94a3b8', fontSize:16, display:'flex', alignItems:'center', justifyContent:'center' }}>✕</button>
                        </div>
                        <div style={{ padding:'10px 16px', background:'#0f172a', borderBottom:'1px solid #1e293b' }}>
                            <input value={standbySearch} onChange={e => setStandbySearch(e.target.value)}
                                placeholder="🔍 Suchen..."
                                autoFocus
                                style={{ width:'100%', background:'#1e293b', border:'1px solid #334155', borderRadius:8, padding:'9px 12px', color:'#fff', fontSize:11, boxSizing:'border-box' }}/>
                        </div>
                        <div style={{ flex:1, overflowY:'auto', padding:'10px 16px', display:'flex', flexDirection:'column', gap:8 }}>
                            {standbyItems.length === 0 && (
                                <div style={{ textAlign:'center', color:'#475569', padding:40 }}>
                                    <div style={{ fontSize:32, marginBottom:8 }}>📦</div>
                                    <div style={{ fontSize:12, fontWeight:700 }}>Standby ist leer</div>
                                    <div style={{ fontSize:10, marginTop:4 }}>Zuerst Aufträge im Admin → Standby erfassen</div>
                                </div>
                            )}
                            {standbyItems
                                .filter(s => !standbySearch ||
                                    s.customer?.toLowerCase().includes(standbySearch.toLowerCase()) ||
                                    s.address?.toLowerCase().includes(standbySearch.toLowerCase()) ||
                                    s.auftragsNr?.toLowerCase().includes(standbySearch.toLowerCase()))
                                .map(item => (
                                <div key={item.id}
                                    onClick={() => setStandbyDateModal({ item, startDate: showStandbyPicker.dayStr, endDate: showStandbyPicker.dayStr })}
                                    style={{ background:'#1e293b', border:'1px solid #334155', borderLeft:'3px solid #f59e0b', borderRadius:10, padding:'12px 14px', cursor:'pointer' }}
                                    onMouseEnter={e => e.currentTarget.style.background='#263348'}
                                    onMouseLeave={e => e.currentTarget.style.background='#1e293b'}>
                                    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
                                        <div>
                                            <div style={{ display:'flex', gap:6, marginBottom:4, flexWrap:'wrap' }}>
                                                {item.auftragsNr && <span style={{ fontSize:8, color:'#3b82f6', fontWeight:700 }}>{item.auftragsNr}</span>}
                                                {item.target > 0 && <span style={{ fontSize:8, color:'#10b981', fontWeight:900 }}>{item.target} ELE</span>}
                                            </div>
                                            <div style={{ color:'#fff', fontSize:12, fontWeight:900, textTransform:'uppercase' }}>{item.customer}</div>
                                            {item.address && <div style={{ color:'#94a3b8', fontSize:10, marginTop:2 }}>{item.address}</div>}
                                            {item.memo && <div style={{ color:'#64748b', fontSize:9, marginTop:2 }}>{item.memo}</div>}
                                        </div>
                                        <div style={{ background:'#f59e0b', color:'#fff', fontSize:8, fontWeight:900, padding:'4px 8px', borderRadius:6, textTransform:'uppercase', flexShrink:0, marginLeft:8 }}>Auswählen →</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                )}

                {/* STANDBY DATUM MODAL */}
                {standbyDateModal && (
                    <div style={{ position:'fixed', inset:0, zIndex:60, background:'rgba(15,23,42,0.97)', display:'flex', alignItems:'center', justifyContent:'center', padding:16 }}>
                        <div style={{ width:'100%', maxWidth:420, background:'#1e293b', border:'2px solid #f59e0b44', borderRadius:20, padding:24, display:'flex', flexDirection:'column', gap:16 }}>
                            <div>
                                <div style={{ color:'#f59e0b', fontSize:10, fontWeight:900, textTransform:'uppercase', letterSpacing:1, marginBottom:4 }}>Zeitraum festlegen</div>
                                <div style={{ color:'#fff', fontSize:14, fontWeight:900, textTransform:'uppercase' }}>{standbyDateModal.item.customer}</div>
                                {standbyDateModal.item.address && <div style={{ color:'#94a3b8', fontSize:10, marginTop:2 }}>{standbyDateModal.item.address}</div>}
                            </div>
                            <div style={{ background:'#0f172a', borderRadius:12, padding:16, display:'flex', flexDirection:'column', gap:12 }}>
                                <div>
                                    <div style={{ color:'#94a3b8', fontSize:9, fontWeight:900, textTransform:'uppercase', marginBottom:6 }}>Von (Startdatum)</div>
                                    <input type="date"
                                        value={standbyDateModal.startDate}
                                        onChange={e => setStandbyDateModal({...standbyDateModal, startDate: e.target.value, endDate: e.target.value})}
                                        style={{ width:'100%', background:'#1e293b', border:'1px solid #334155', borderRadius:8, padding:'10px 12px', color:'#fff', fontSize:12, boxSizing:'border-box' }}/>
                                </div>
                                <div>
                                    <div style={{ color:'#94a3b8', fontSize:9, fontWeight:900, textTransform:'uppercase', marginBottom:6 }}>Bis (Enddatum)</div>
                                    <input type="date"
                                        value={standbyDateModal.endDate}
                                        onChange={e => setStandbyDateModal({...standbyDateModal, endDate: e.target.value})}
                                        style={{ width:'100%', background:'#1e293b', border:'1px solid #334155', borderRadius:8, padding:'10px 12px', color:'#fff', fontSize:12, boxSizing:'border-box' }}/>
                                </div>
                                {standbyDateModal.startDate && standbyDateModal.endDate && standbyDateModal.endDate >= standbyDateModal.startDate && (
                                    <div style={{ background:'rgba(245,158,11,0.1)', border:'1px solid rgba(245,158,11,0.3)', borderRadius:8, padding:'8px 12px', fontSize:9, color:'#f59e0b', fontWeight:700 }}>
                                        ✓ {formatDate(standbyDateModal.startDate)} bis {formatDate(standbyDateModal.endDate)} (Mo–Sa)
                                    </div>
                                )}
                            </div>
                            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
                                <button onClick={() => setStandbyDateModal(null)}
                                    style={{ padding:'12px', background:'transparent', border:'1px solid #334155', borderRadius:10, color:'#64748b', fontWeight:900, fontSize:10, textTransform:'uppercase', cursor:'pointer' }}>Zurück</button>
                                <button
                                    disabled={!standbyDateModal.endDate || standbyDateModal.endDate < standbyDateModal.startDate}
                                    onClick={() => insertStandbyItem(standbyDateModal.item, standbyDateModal.startDate, standbyDateModal.endDate)}
                                    style={{ padding:'12px', background: standbyDateModal.endDate >= standbyDateModal.startDate ? '#f59e0b' : '#334155', border:'none', borderRadius:10, color:'#fff', fontWeight:900, fontSize:10, textTransform:'uppercase', cursor:'pointer' }}>
                                    ✓ In Kalender einfügen
                                </button>
                            </div>
                        </div>
                    </div>
                )}

                {showCalImport && (
                    <ImportModal
                        calWeek={calWeek}
                        team={team}
                        currentCalLabel={currentCalLabel}
                        activeCalType={activeCalType}
                        appId={appId}
                        days={days}
                        onClose={() => setShowCalImport(false)}
                        onDone={(count) => { setShowCalImport(false); setCalImportResult(count); }}
                    />
                )}

                {calImportResult !== null && (
                    <div style={{ position:'fixed', inset:0, zIndex:60, background:'rgba(15,23,42,0.95)', display:'flex', alignItems:'center', justifyContent:'center', padding:24 }}>
                        <div style={{ background:'rgba(51,65,85,0.98)', backdropFilter:'blur(12px)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:24, padding:32, width:'100%', maxWidth:300, display:'flex', flexDirection:'column', alignItems:'center', gap:20 }}>
                            <div style={{ width:64, height:64, background:'#10b981', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center' }}>
                                <Icon name="check" size={32} className="text-white"/>
                            </div>
                            <div style={{ textAlign:'center' }}>
                                <div style={{ color:'#94a3b8', fontSize:9, fontWeight:900, textTransform:'uppercase', marginBottom:4 }}>Import KW {getWeekNumber(calWeek)}</div>
                                <div style={{ color:'#fff', fontSize:48, fontWeight:900, fontStyle:'italic', lineHeight:1 }}>{calImportResult}</div>
                                <div style={{ color:'#10b981', fontSize:11, fontWeight:900, textTransform:'uppercase', marginTop:4 }}>Aufträge erfasst</div>
                            </div>
                            <button onClick={() => setCalImportResult(null)} style={{ width:'100%', padding:'14px', background:'#3b82f6', border:'none', borderRadius:12, color:'#fff', fontWeight:900, fontSize:10, textTransform:'uppercase', cursor:'pointer' }}>OK</button>
                        </div>
                    </div>
                )}
            </div>
        );
    }

    // ─────────────────────────────────────────────────────────────
    // ADMIN BILLING VIEW
    // ─────────────────────────────────────────────────────────────
    function AdminBillingView({ teams, appId, onBack }) {
        const [allEntries, setAllEntries] = useState([]);
        const [billingWeek, setBillingWeek] = useState(new Date());
        const [filterCalType, setFilterCalType] = useState('all');

        const days = getCalWeekDays(billingWeek);

        useEffect(() => {
            const { db, collection, onSnapshot } = window.FirebaseSDK;
            const unsubs = [];
            setAllEntries([]);
            teams.forEach(team => {
                const path = `teams_cal_${team.id}`;
                const unsub = onSnapshot(collection(db, path), (snap) => {
                    const entries = snap.docs.map(doc => ({
                        id: doc.id, ...doc.data(), teamId: team.id, teamName: team.name, teamColor: team.color
                    }));
                    setAllEntries(prev => {
                        const filtered = prev.filter(e => e.teamId !== team.id);
                        return [...filtered, ...entries];
                    });
                });
                unsubs.push(unsub);
            });
            return () => unsubs.forEach(u => u());
        }, [teams, appId]);

        const doneEntries = useMemo(() =>
            allEntries.filter(e => e.isDone && !e.isBilled &&
                (filterCalType === 'all' || (e.calType||'montage') === filterCalType)),
        [allEntries, filterCalType]);

        const doneEntriesForDay = useCallback((dayStr) =>
            doneEntries.filter(e => e.deliveryDate && e.deliveryDate.substring(0,10) === dayStr),
        [doneEntries]);

        const billedEntries = useMemo(() =>
            allEntries.filter(e => e.isBilled &&
                (filterCalType === 'all' || (e.calType||'montage') === filterCalType)),
        [allEntries, filterCalType]);

        const billedEntriesForDay = useCallback((dayStr) =>
            billedEntries.filter(e => e.deliveryDate && e.deliveryDate.substring(0,10) === dayStr),
        [billedEntries]);

        const markBilled = async (entry) => {
            const { db, doc, updateDoc } = window.FirebaseSDK;
            await updateDoc(doc(db, `teams_cal_${entry.teamId}`, entry.id), {
                isBilled: !entry.isBilled,
                billedAt: !entry.isBilled ? new Date().toISOString() : null
            });
        };

        const totalDone = doneEntries.length;
        const totalBilled = billedEntries.length;

        return (
            <div style={{ minHeight:'100vh', background:'#0f172a', display:'flex', flexDirection:'column' }}>
                <div style={{ background:'#1e293b', padding:'12px 20px', display:'flex', justifyContent:'space-between', alignItems:'center', borderBottom:'2px solid #334155', position:'sticky', top:0, zIndex:40 }}>
                    <div style={{ display:'flex', alignItems:'center', gap:12 }}>
                        <button onClick={onBack} style={{ background:'#334155', border:'none', borderRadius:10, width:34, height:34, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer' }}>
                            <Icon name="arrow-left" size={16} className="text-blue-400"/>
                        </button>
                        <div>
                            <div style={{ color:'#94a3b8', fontSize:8, fontWeight:900, textTransform:'uppercase', letterSpacing:1 }}>ADMIN — Abrechnung</div>
                            <div style={{ color:'#fff', fontSize:14, fontWeight:900, fontStyle:'italic' }}>
                                KW {getWeekNumber(billingWeek)} — {formatDate(toLocalDateStr(days[0]))} bis {formatDate(toLocalDateStr(days[5]))}
                            </div>
                        </div>
                    </div>
                    <div style={{ display:'flex', gap:8, alignItems:'center', flexWrap:'wrap' }}>
                        <button onClick={() => setFilterCalType('all')} style={{ background:filterCalType==='all'?'#475569':'#1e293b', border:'none', borderRadius:8, padding:'5px 10px', color:filterCalType==='all'?'#fff':'#64748b', fontSize:8, fontWeight:900, textTransform:'uppercase', cursor:'pointer' }}>Alle</button>
                        <button onClick={() => setFilterCalType('montage')} style={{ background:filterCalType==='montage'?'#2563eb':'#1e293b', border:'none', borderRadius:8, padding:'5px 10px', color:filterCalType==='montage'?'#fff':'#64748b', fontSize:8, fontWeight:900, textTransform:'uppercase', cursor:'pointer' }}>🔧 Montage</button>
